<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>録音 & 文字起こし | ひゅうがのTR-Labo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }

    header.site {
      background: rgba(255,255,255,0.88);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid #e2e8f0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand {
      max-width: 760px;
      margin: 0 auto;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 9px;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #475569;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { background: #f1f5f9; }
    .logo {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800;
      font-size: 0.78rem;
      box-shadow: 0 4px 10px rgba(14,165,233,0.25);
    }
    .brand-name {
      font-size: 1rem;
      font-weight: 700;
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    main { max-width: 760px; margin: 0 auto; padding: 1.25rem 1rem 2rem; }
    .hero { text-align: center; padding: 0.25rem 0 1rem; }
    .hero h1 {
      font-size: clamp(1.4rem, 4.8vw, 1.85rem);
      font-weight: 800;
      letter-spacing: -0.015em;
      margin-bottom: 0.5rem;
    }
    .hero h1 .accent {
      background: linear-gradient(135deg, #0284c7, #06b6d4);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: #64748b; font-size: 0.88rem; line-height: 1.65; }

    .panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .panel h2 {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.65rem;
      color: #0f172a;
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.7rem; }
    .field:first-child { margin-top: 0; }
    .field label {
      font-size: 0.78rem; color: #475569; font-weight: 600;
      padding: 0 0.1rem;
    }
    .field input[type="text"], .field select {
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #0f172a;
      padding: 0.65rem 0.75rem;
      border-radius: 9px;
      font-family: inherit;
      font-size: 0.92rem;
      width: 100%;
      -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus {
      outline: none; border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .record-area {
      background: #0f172a;
      color: white;
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      margin-top: 1rem;
    }
    .record-area.rec {
      background: linear-gradient(135deg, #7f1d1d, #0f172a);
    }
    .timer {
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 2.3rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      margin-bottom: 0.35rem;
    }
    .rec-state {
      font-size: 0.82rem;
      opacity: 0.7;
      margin-bottom: 0.9rem;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .rec-state .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #64748b;
    }
    .rec-state.live .dot { background: #ef4444; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }

    .wave-wrap {
      position: relative;
      height: 72px;
      margin: 0.5rem 0 1rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }
    .wave-wrap canvas { width: 100%; height: 100%; display: block; }
    .level-bar {
      margin-top: 0.35rem;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }
    .level-bar > span {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
      transition: width 0.08s linear;
    }

    .speakers {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.75rem;
    }
    .spk {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 999px;
      min-height: auto;
      min-width: 0;
      width: auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .spk:active { transform: scale(0.94); }
    .spk.active {
      background: #38bdf8;
      color: #0b3a5e;
      border-color: #38bdf8;
      box-shadow: 0 2px 10px rgba(56,189,248,0.35);
    }
    .spk.add { background: transparent; color: rgba(255,255,255,0.7); border-style: dashed; }

    .live-transcript {
      background: #0b1220;
      border-radius: 10px;
      margin-top: 0.8rem;
      padding: 0.7rem 0.85rem;
      font-size: 0.9rem;
      line-height: 1.55;
      text-align: left;
      min-height: 64px;
      max-height: 180px;
      overflow-y: auto;
      color: #e2e8f0;
    }
    .live-transcript .seg { margin-bottom: 0.4rem; }
    .live-transcript .seg:last-child { margin-bottom: 0; }
    .live-transcript .spk-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.08rem 0.45rem;
      border-radius: 4px;
      margin-right: 0.4rem;
      background: rgba(56,189,248,0.25);
      color: #7dd3fc;
    }
    .live-transcript .interim { opacity: 0.5; font-style: italic; }
    .live-transcript .empty { opacity: 0.4; font-style: italic; }

    .editor .seg-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid #f1f5f9;
      align-items: flex-start;
    }
    .editor .seg-row:last-child { border-bottom: none; }
    .seg-time {
      font-size: 0.72rem;
      color: #64748b;
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
      padding-top: 0.5rem;
      width: 58px;
    }
    .seg-spk-sel {
      flex: 0 0 auto;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      padding: 0.4rem 0.5rem;
      font-size: 0.78rem;
      background: #fff;
      color: #0f172a;
      -webkit-appearance: none; appearance: none;
    }
    .seg-text {
      flex: 1;
      border: 1px solid transparent;
      background: transparent;
      color: #0f172a;
      font-family: inherit;
      font-size: 0.88rem;
      line-height: 1.55;
      resize: vertical;
      min-height: 38px;
      padding: 0.35rem 0.4rem;
      border-radius: 7px;
    }
    .seg-text:focus { outline: none; border-color: #38bdf8; background: #f0f9ff; }
    .seg-del {
      flex: 0 0 auto;
      width: 32px; height: 32px;
      min-height: auto;
      background: #fff;
      border: 1px solid #fecaca;
      color: #ef4444;
      border-radius: 7px;
      font-size: 0.85rem;
      padding: 0;
      cursor: pointer;
    }

    .speakers-edit {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }
    .spk-edit {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 999px;
      padding: 0.25rem 0.3rem 0.25rem 0.75rem;
    }
    .spk-edit input {
      border: none;
      background: transparent;
      font-size: 0.82rem;
      font-weight: 600;
      color: #0f172a;
      width: 92px;
      font-family: inherit;
      padding: 0;
    }
    .spk-edit input:focus { outline: none; }
    .spk-edit .cnt {
      font-size: 0.68rem;
      color: #64748b;
      margin-right: 0.35rem;
    }

    audio { width: 100%; margin-top: 0.5rem; }

    button.btn {
      border: none;
      border-radius: 11px;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      transition: transform 0.08s, opacity 0.15s;
      min-height: 48px;
      color: #fff;
    }
    button.btn:active { transform: scale(0.98); opacity: 0.92; }
    button.btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-rec {
      background: linear-gradient(135deg, #ef4444, #f97316);
      box-shadow: 0 4px 14px rgba(239,68,68,0.3);
      width: 100%;
      min-height: 56px;
      font-size: 1rem;
    }
    .btn-stop {
      background: #fff; color: #0f172a; border: 1px solid #cbd5e1;
      width: 100%; min-height: 56px; font-size: 1rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      box-shadow: 0 4px 14px rgba(14,165,233,0.28);
      width: 100%;
    }
    .btn-secondary { background: #fff; color: #0f172a; border: 1px solid #cbd5e1; width: 100%; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 0.65rem; }
    .btn-row .btn { flex: 1; }

    .alert {
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.55;
      margin-top: 0.6rem;
    }
    .alert.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    .hidden { display: none !important; }
    .meta { font-size: 0.75rem; color: #64748b; display: flex; gap: 0.75rem; flex-wrap: wrap; }

    footer {
      max-width: 760px; margin: 0 auto;
      padding: 1rem; color: #94a3b8;
      font-size: 0.74rem; text-align: center;
      padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem);
    }
  </style>
</head>
<body>
  <header class="site">
    <div class="brand">
      <a class="back-btn" href="../" aria-label="戻る">←</a>
      <div class="logo">TR</div>
      <div class="brand-name">🎙️ 録音 & 文字起こし</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>録音しながら、<span class="accent">しゃべった人ごとに</span>文字起こし。</h1>
      <p>小さな容量でNotebookLMに渡せる音声+テキストを、端末内だけで生成。</p>
    </section>

    <div class="panel" id="settingsPanel">
      <h2>収録設定</h2>
      <div class="field">
        <label for="bitrate">音質 / 容量</label>
        <select id="bitrate">
          <option value="12000">12 kbps (極小・1h≈5.5MB)</option>
          <option value="24000" selected>24 kbps (小・1h≈11MB・推奨)</option>
          <option value="48000">48 kbps (標準・1h≈22MB)</option>
          <option value="96000">96 kbps (高音質・1h≈43MB)</option>
        </select>
      </div>
      <div class="field">
        <label for="lang">文字起こし言語</label>
        <select id="lang">
          <option value="ja-JP" selected>日本語</option>
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="zh-CN">中文 (简体)</option>
          <option value="ko-KR">한국어</option>
        </select>
      </div>
      <div class="field">
        <label for="title">収録タイトル (ファイル名)</label>
        <input type="text" id="title" placeholder="例: 企画会議 2026-04-23" />
      </div>
      <div id="capsMsg"></div>
    </div>

    <div class="record-area" id="recordArea">
      <div class="rec-state" id="recState"><span class="dot"></span><span id="recStateText">待機中</span></div>
      <div class="timer" id="timer">00:00:00</div>
      <div class="wave-wrap"><canvas id="wave"></canvas></div>
      <div class="level-bar"><span id="levelFill"></span></div>
      <div class="speakers hidden" id="speakers"></div>
      <div class="live-transcript hidden" id="liveTranscript"><div class="empty">ここに発言がリアルタイムに表示されます…</div></div>
      <div style="margin-top:0.75rem;">
        <button class="btn btn-rec" id="recBtn">🎙️ 録音開始</button>
        <button class="btn btn-stop hidden" id="stopBtn">■ 停止</button>
      </div>
    </div>

    <div class="panel editor hidden" id="editorPanel">
      <h2>録音後エディタ</h2>
      <audio id="playback" controls></audio>
      <div class="meta" id="audioMeta" style="margin-top:0.5rem;"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="autoDiaBtn">🤖 話者を自動分類</button>
      </div>
      <div class="field">
        <label>話者(タップで名前編集)</label>
        <div class="speakers-edit" id="speakersEdit"></div>
      </div>
      <div class="field">
        <label>発言セグメント (編集可)</label>
        <div id="segList"></div>
      </div>
      <div class="field">
        <label for="txtFormat">テキスト出力の形式 (NotebookLM向け)</label>
        <select id="txtFormat">
          <option value="clean" selected>クリーン (話者: 発言)</option>
          <option value="timestamped">タイムスタンプ付き [時] 話者: 発言</option>
          <option value="dialog">対話台本 (空行区切り)</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveAudioBtn">🎙️ 音声を保存</button>
        <button class="btn btn-primary" id="saveTextBtn">📝 文字起こしを保存</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="previewTextBtn">📋 テキストをプレビュー/コピー</button>
      </div>
      <div id="saveHint" class="alert info" style="font-size:0.78rem;"></div>
      <div id="saveStatus"></div>
    </div>

    <p class="alert info" style="margin-top:1rem;">
      🔒 録音も文字起こしも端末内処理。ネット経由で音声がサーバーに送られることはありません (一部ブラウザの音声認識は除く)。
    </p>
  </main>

  <footer>© ひゅうがのTR-Labo</footer>

  <script>
    // ---- helpers ----
    function pad(n, w=2) { return String(n).padStart(w, '0'); }
    function fmtHMS(sec) {
      sec = Math.max(0, Math.floor(sec));
      return pad(Math.floor(sec / 3600)) + ':' + pad(Math.floor(sec / 60) % 60) + ':' + pad(sec % 60);
    }
    function fmtSize(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1024 / 1024).toFixed(2) + ' MB';
    }
    function safeFilename(name, fallback) {
      let out = (name || fallback || 'recording').trim();
      out = out.replace(/[\\/:*?"<>|]/g, '_');
      return out;
    }
    function todayStamp() {
      const d = new Date();
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + '_' + pad(d.getHours()) + pad(d.getMinutes());
    }

    // ---- capability detection ----
    const hasMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const hasSR = typeof SR === 'function';
    (function showCaps() {
      const box = document.getElementById('capsMsg');
      const lines = [];
      if (!hasMedia) lines.push('<div class="alert error">マイクにアクセスできません (このブラウザは非対応)。</div>');
      if (!hasSR) lines.push('<div class="alert warn">このブラウザは自動文字起こしに非対応です。録音のみ動作します (iPhoneのSafariなど)。文字起こしはNotebookLMやPCのChromeで後処理できます。</div>');
      box.innerHTML = lines.join('');
    })();

    // Pick a supported mime type for audio recording.
    function pickAudioMime() {
      const candidates = [
        'audio/webm;codecs=opus',
        'audio/ogg;codecs=opus',
        'audio/mp4;codecs=mp4a.40.2',
        'audio/mp4',
        'audio/webm',
      ];
      for (const m of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m;
      }
      return '';
    }
    function extFromMime(m) {
      if (!m) return 'webm';
      if (m.includes('ogg')) return 'ogg';
      if (m.includes('mp4')) return 'm4a';
      return 'webm';
    }

    // ---- state ----
    const recBtn = document.getElementById('recBtn');
    const stopBtn = document.getElementById('stopBtn');
    const recordArea = document.getElementById('recordArea');
    const recState = document.getElementById('recState');
    const recStateText = document.getElementById('recStateText');
    const timerEl = document.getElementById('timer');
    const titleEl = document.getElementById('title');
    const bitrateEl = document.getElementById('bitrate');
    titleEl.value = '録音_' + todayStamp();

    let mediaStream = null;
    let recorder = null;
    let chunks = [];
    let startedAt = 0;
    let timerHandle = null;
    let recordedBlob = null;
    let recordedMime = '';
    let audioCtx = null;
    let analyser = null;
    let sourceNode = null;
    let waveRaf = 0;

    // Speakers
    const DEFAULT_SPEAKERS = ['話者A', '話者B', '話者C', '話者D'];
    let speakers = DEFAULT_SPEAKERS.slice();
    let currentSpeaker = 0;

    // Transcript segments: { t, speaker, text, feat: {pitch, centroid} }
    const segments = [];
    let srActive = false;
    let speechRec = null;

    // Audio feature timeline (sampled every ~200ms) for simple voice clustering.
    // Each sample: { t, pitch, centroid, energy }
    const featTimeline = [];
    let featTimer = 0;

    function startFeatureSampling() {
      if (!analyser) return;
      const freq = new Float32Array(analyser.frequencyBinCount);
      const sampleRate = (audioCtx && audioCtx.sampleRate) || 48000;
      const binHz = sampleRate / 2 / freq.length;
      featTimer = setInterval(() => {
        analyser.getFloatFrequencyData(freq); // dB
        let sumA = 0, sumFA = 0, peakIdx = 0, peakVal = -Infinity, energy = 0;
        // Search pitch in 80–400 Hz band
        const iLow = Math.max(1, Math.floor(80 / binHz));
        const iHigh = Math.min(freq.length - 1, Math.ceil(400 / binHz));
        for (let i = 1; i < freq.length; i++) {
          const db = freq[i];
          if (!isFinite(db) || db < -90) continue;
          const amp = Math.pow(10, db / 20);
          const f = i * binHz;
          sumA += amp;
          sumFA += amp * f;
          energy += amp;
          if (i >= iLow && i <= iHigh && db > peakVal) { peakVal = db; peakIdx = i; }
        }
        const centroid = sumA > 0 ? (sumFA / sumA) : 0;
        const pitch = peakIdx > 0 ? peakIdx * binHz : 0;
        const t = (performance.now() - startedAt) / 1000;
        if (energy > 0.0001) featTimeline.push({ t, pitch, centroid, energy });
      }, 200);
    }
    function stopFeatureSampling() {
      if (featTimer) { clearInterval(featTimer); featTimer = 0; }
    }
    function featureNear(t, window = 3.0) {
      // Average the most recent <=window seconds before t
      if (!featTimeline.length) return null;
      const lo = t - window;
      let sumP = 0, sumC = 0, n = 0;
      for (let i = featTimeline.length - 1; i >= 0; i--) {
        const s = featTimeline[i];
        if (s.t > t + 0.2) continue;
        if (s.t < lo) break;
        if (s.pitch > 0) sumP += s.pitch;
        if (s.centroid > 0) sumC += s.centroid;
        n++;
      }
      if (!n) return null;
      return { pitch: sumP / n, centroid: sumC / n };
    }

    // ---- Waveform / level meter ----
    const waveCanvas = document.getElementById('wave');
    const waveCtx = waveCanvas.getContext('2d');
    const levelFill = document.getElementById('levelFill');
    function resizeWave() {
      const r = waveCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      waveCanvas.width = Math.max(64, Math.floor(r.width * dpr));
      waveCanvas.height = Math.max(32, Math.floor(r.height * dpr));
    }
    window.addEventListener('resize', resizeWave);
    resizeWave();

    function startWaveLoop() {
      if (!analyser) return;
      const data = new Uint8Array(analyser.fftSize);
      const levelBuf = new Float32Array(6);
      let levelIdx = 0;
      const draw = () => {
        analyser.getByteTimeDomainData(data);
        const W = waveCanvas.width, H = waveCanvas.height;
        waveCtx.clearRect(0, 0, W, H);
        // grid
        waveCtx.strokeStyle = 'rgba(255,255,255,0.08)';
        waveCtx.lineWidth = 1;
        waveCtx.beginPath();
        waveCtx.moveTo(0, H / 2);
        waveCtx.lineTo(W, H / 2);
        waveCtx.stroke();
        // waveform
        waveCtx.strokeStyle = '#38bdf8';
        waveCtx.lineWidth = 2 * (window.devicePixelRatio || 1);
        waveCtx.beginPath();
        const step = data.length / W;
        let peak = 0;
        for (let x = 0; x < W; x++) {
          const i = Math.floor(x * step);
          const v = (data[i] - 128) / 128;
          if (Math.abs(v) > peak) peak = Math.abs(v);
          const y = H / 2 + v * (H / 2 - 4);
          if (x === 0) waveCtx.moveTo(x, y);
          else waveCtx.lineTo(x, y);
        }
        waveCtx.stroke();
        // level meter (smoothed peak)
        levelBuf[levelIdx++ % levelBuf.length] = peak;
        let avg = 0; for (const v of levelBuf) avg += v; avg /= levelBuf.length;
        levelFill.style.width = Math.min(100, Math.round(avg * 140)) + '%';
        waveRaf = requestAnimationFrame(draw);
      };
      draw();
    }
    function stopWaveLoop() {
      if (waveRaf) cancelAnimationFrame(waveRaf);
      waveRaf = 0;
      const W = waveCanvas.width, H = waveCanvas.height;
      waveCtx.clearRect(0, 0, W, H);
      levelFill.style.width = '0%';
    }

    // ---- Speakers UI ----
    const speakersBox = document.getElementById('speakers');
    const liveBox = document.getElementById('liveTranscript');
    function renderSpeakers() {
      speakersBox.innerHTML = '';
      speakers.forEach((name, i) => {
        const b = document.createElement('button');
        b.className = 'spk' + (i === currentSpeaker ? ' active' : '');
        b.textContent = name;
        b.addEventListener('click', () => { currentSpeaker = i; renderSpeakers(); });
        speakersBox.appendChild(b);
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'spk add';
      addBtn.textContent = '+ 追加';
      addBtn.addEventListener('click', () => {
        if (speakers.length >= 12) return;
        const nextLetter = String.fromCharCode('A'.charCodeAt(0) + speakers.length);
        speakers.push('話者' + nextLetter);
        currentSpeaker = speakers.length - 1;
        renderSpeakers();
      });
      speakersBox.appendChild(addBtn);
    }
    renderSpeakers();

    // ---- Live transcript rendering ----
    function appendSegment(text, speakerIdx, elapsedSec) {
      if (!text.trim()) return;
      const feat = featureNear(elapsedSec, 3.0);
      segments.push({
        t: elapsedSec,
        speaker: speakerIdx,
        text: text.trim(),
        feat,
      });
      renderLive();
    }
    function renderLive(interim) {
      if (!segments.length && !interim) {
        liveBox.innerHTML = '<div class="empty">ここに発言がリアルタイムに表示されます…</div>';
        return;
      }
      const parts = segments.map(s => {
        const tag = `<span class="spk-tag">${escapeHtml(speakers[s.speaker] || '話者?')}</span>`;
        return `<div class="seg">${tag}${escapeHtml(s.text)}</div>`;
      });
      if (interim) {
        const tag = `<span class="spk-tag">${escapeHtml(speakers[currentSpeaker] || '話者?')}</span>`;
        parts.push(`<div class="seg interim">${tag}${escapeHtml(interim)}</div>`);
      }
      liveBox.innerHTML = parts.join('');
      liveBox.scrollTop = liveBox.scrollHeight;
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // ---- Speech recognition ----
    function startSpeechRecognition() {
      if (!hasSR) return;
      try {
        speechRec = new SR();
      } catch (e) { return; }
      speechRec.continuous = true;
      speechRec.interimResults = true;
      speechRec.lang = document.getElementById('lang').value || 'ja-JP';
      speechRec.onresult = (ev) => {
        let interim = '';
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          const r = ev.results[i];
          const text = r[0] && r[0].transcript ? r[0].transcript : '';
          if (r.isFinal) {
            const sec = (performance.now() - startedAt) / 1000;
            appendSegment(text, currentSpeaker, sec);
          } else {
            interim += text;
          }
        }
        if (interim) renderLive(interim);
      };
      speechRec.onerror = (ev) => {
        // "no-speech" just means silence; "network" is transient; auto-restart
        if (ev.error === 'no-speech' || ev.error === 'network') return;
        console.warn('SR error:', ev.error);
      };
      speechRec.onend = () => {
        // Auto-restart while we are still recording
        if (srActive) {
          try { speechRec.start(); } catch (e) {}
        }
      };
      try {
        speechRec.start();
        srActive = true;
      } catch (e) { /* ignore */ }
    }
    function stopSpeechRecognition() {
      srActive = false;
      if (speechRec) {
        try { speechRec.onend = null; speechRec.stop(); } catch (e) {}
      }
      speechRec = null;
    }

    function updateTimer() {
      const sec = (performance.now() - startedAt) / 1000;
      timerEl.textContent = fmtHMS(sec);
    }

    async function startRecording() {
      if (!hasMedia) return;
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            channelCount: 1,
            sampleRate: 16000,
          },
        });
      } catch (e) {
        alert('マイクへのアクセスが拒否されました: ' + (e.message || e));
        return;
      }
      const mime = pickAudioMime();
      recordedMime = mime;
      const bps = parseInt(bitrateEl.value, 10);
      try {
        recorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime, audioBitsPerSecond: bps } : { audioBitsPerSecond: bps });
      } catch (e) {
        alert('録音を開始できません: ' + (e.message || e));
        return;
      }
      chunks = [];
      recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      recorder.onstop = () => {
        const type = recorder.mimeType || mime || 'audio/webm';
        recordedBlob = new Blob(chunks, { type });
        recordedMime = type;
        onRecordingStopped();
      };
      recorder.start(1000);
      startedAt = performance.now();
      timerHandle = setInterval(updateTimer, 250);
      recordArea.classList.add('rec');
      recState.classList.add('live');
      recStateText.textContent = '録音中';
      recBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');

      // audio analyser for waveform + per-segment features
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sourceNode = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.4;
        sourceNode.connect(analyser);
        resizeWave();
        startWaveLoop();
        startFeatureSampling();
      } catch (e) { /* waveform is optional */ }

      // Start SR + show speaker UI
      segments.length = 0;
      renderLive();
      document.getElementById('speakers').classList.remove('hidden');
      document.getElementById('liveTranscript').classList.remove('hidden');
      if (hasSR) startSpeechRecognition();
    }

    function stopRecording() {
      if (!recorder) return;
      try { recorder.stop(); } catch (e) {}
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
      stopWaveLoop();
      stopFeatureSampling();
      stopSpeechRecognition();
      if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
      analyser = null; sourceNode = null;
    }

    function onRecordingStopped() {
      recState.classList.remove('live');
      recStateText.textContent = '停止しました';
      recBtn.classList.remove('hidden');
      recBtn.textContent = '🎙️ 続けて録音';
      stopBtn.classList.add('hidden');
      recordArea.classList.remove('rec');
      document.getElementById('speakers').classList.add('hidden');
      document.getElementById('liveTranscript').classList.add('hidden');
      showEditor();
    }

    // ---- Post-recording editor ----
    const editorPanel = document.getElementById('editorPanel');
    const playback = document.getElementById('playback');
    const audioMeta = document.getElementById('audioMeta');
    const segListEl = document.getElementById('segList');
    const speakersEditEl = document.getElementById('speakersEdit');

    function showEditor() {
      if (!recordedBlob) return;
      const url = URL.createObjectURL(recordedBlob);
      playback.src = url;
      const dur = (performance.now() - startedAt) / 1000;
      audioMeta.innerHTML = `
        <span>⏱ ${fmtHMS(dur)}</span>
        <span>💾 ${fmtSize(recordedBlob.size)}</span>
        <span>🎵 ${recordedMime || 'audio'}</span>
        <span>📝 ${segments.length}発言</span>
      `;
      editorPanel.classList.remove('hidden');
      editorPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      renderSpeakersEdit();
      renderSegList();
    }

    function renderSpeakersEdit() {
      const counts = speakers.map(() => 0);
      segments.forEach(s => { if (s.speaker != null) counts[s.speaker] = (counts[s.speaker] || 0) + 1; });
      speakersEditEl.innerHTML = '';
      speakers.forEach((name, i) => {
        const chip = document.createElement('div');
        chip.className = 'spk-edit';
        chip.innerHTML = `<input type="text" value="${escapeHtml(name)}" data-idx="${i}" /><span class="cnt">${counts[i] || 0}件</span>`;
        const input = chip.querySelector('input');
        input.addEventListener('input', () => {
          speakers[i] = input.value || ('話者' + String.fromCharCode('A'.charCodeAt(0) + i));
          renderSegList();
        });
        speakersEditEl.appendChild(chip);
      });
    }

    function renderSegList() {
      segListEl.innerHTML = '';
      segments.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'seg-row';
        const opts = speakers.map((n, j) => `<option value="${j}"${j === s.speaker ? ' selected' : ''}>${escapeHtml(n)}</option>`).join('');
        row.innerHTML = `
          <span class="seg-time">${fmtHMS(s.t)}</span>
          <select class="seg-spk-sel">${opts}</select>
          <textarea class="seg-text" rows="1">${escapeHtml(s.text)}</textarea>
          <button class="seg-del" aria-label="削除">✕</button>
        `;
        const ta = row.querySelector('.seg-text');
        ta.addEventListener('input', () => { s.text = ta.value; });
        ta.addEventListener('focus', () => { try { playback.currentTime = s.t; } catch (e) {} });
        row.querySelector('.seg-spk-sel').addEventListener('change', (e) => {
          s.speaker = parseInt(e.target.value, 10);
          renderSpeakersEdit();
        });
        row.querySelector('.seg-del').addEventListener('click', () => {
          segments.splice(i, 1);
          renderSpeakersEdit();
          renderSegList();
        });
        segListEl.appendChild(row);
      });
    }

    // ---- Automatic speaker clustering (heuristic) ----
    // Simple k-means over 2D features [pitch (Hz), centroid (Hz)] normalized.
    function autoClusterSpeakers() {
      const featsIdx = segments.map((s, i) => s.feat ? i : -1).filter(i => i >= 0);
      if (featsIdx.length < 2) {
        alert('声の特徴量が足りません (短すぎる録音か、発言が少ない)。');
        return;
      }
      const kPrompt = prompt('話者は何人いますか? (2〜6)', Math.min(6, Math.max(2, speakers.length)));
      if (!kPrompt) return;
      const K = Math.max(2, Math.min(6, parseInt(kPrompt, 10) || 2));

      // Normalize features
      const raw = featsIdx.map(i => [segments[i].feat.pitch, segments[i].feat.centroid]);
      const mean = [0, 0], std = [1, 1];
      for (const r of raw) { mean[0] += r[0]; mean[1] += r[1]; }
      mean[0] /= raw.length; mean[1] /= raw.length;
      let v0 = 0, v1 = 0;
      for (const r of raw) { v0 += (r[0] - mean[0]) ** 2; v1 += (r[1] - mean[1]) ** 2; }
      std[0] = Math.sqrt(v0 / raw.length) || 1;
      std[1] = Math.sqrt(v1 / raw.length) || 1;
      const pts = raw.map(r => [(r[0] - mean[0]) / std[0], (r[1] - mean[1]) / std[1]]);

      // Seed centroids with k-means++ lite: pick the k most spread points
      const centroids = [pts[0].slice()];
      while (centroids.length < K) {
        let best = 0, bestDist = -1;
        for (let i = 0; i < pts.length; i++) {
          let m = Infinity;
          for (const c of centroids) {
            const d = (pts[i][0] - c[0]) ** 2 + (pts[i][1] - c[1]) ** 2;
            if (d < m) m = d;
          }
          if (m > bestDist) { bestDist = m; best = i; }
        }
        centroids.push(pts[best].slice());
      }

      // Lloyd iterations
      const assign = new Array(pts.length).fill(0);
      for (let iter = 0; iter < 30; iter++) {
        let changed = 0;
        for (let i = 0; i < pts.length; i++) {
          let bi = 0, bd = Infinity;
          for (let k = 0; k < K; k++) {
            const d = (pts[i][0] - centroids[k][0]) ** 2 + (pts[i][1] - centroids[k][1]) ** 2;
            if (d < bd) { bd = d; bi = k; }
          }
          if (assign[i] !== bi) { assign[i] = bi; changed++; }
        }
        const sums = Array.from({ length: K }, () => [0, 0, 0]);
        for (let i = 0; i < pts.length; i++) {
          sums[assign[i]][0] += pts[i][0];
          sums[assign[i]][1] += pts[i][1];
          sums[assign[i]][2] += 1;
        }
        for (let k = 0; k < K; k++) {
          if (sums[k][2] > 0) {
            centroids[k][0] = sums[k][0] / sums[k][2];
            centroids[k][1] = sums[k][1] / sums[k][2];
          }
        }
        if (!changed) break;
      }

      // Order clusters by average pitch (low → high) so speaker names are stable
      const avgPitch = centroids.map((c, k) => {
        let sum = 0, n = 0;
        for (let i = 0; i < pts.length; i++) if (assign[i] === k) { sum += raw[i][0]; n++; }
        return { k, avg: n ? sum / n : 0 };
      }).sort((a, b) => a.avg - b.avg);
      const remap = {};
      avgPitch.forEach((x, order) => { remap[x.k] = order; });

      // Ensure we have K speakers
      while (speakers.length < K) speakers.push('話者' + String.fromCharCode('A'.charCodeAt(0) + speakers.length));
      speakers.length = Math.max(speakers.length, K);

      // Apply assignments
      for (let j = 0; j < featsIdx.length; j++) {
        segments[featsIdx[j]].speaker = remap[assign[j]];
      }

      renderSpeakersEdit();
      renderSegList();
    }

    document.getElementById('autoDiaBtn').addEventListener('click', autoClusterSpeakers);

    // ---- Smart save (Web Share / FS Access / anchor) ----
    const hasShare = typeof navigator.share === 'function' && typeof navigator.canShare === 'function';
    const hasFSSave = typeof window.showSaveFilePicker === 'function';
    function canShareFile(file) {
      try { return hasShare && navigator.canShare({ files: [file] }); } catch (e) { return false; }
    }
    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }
    async function smartSave(blob, filename) {
      const mime = blob.type || 'application/octet-stream';
      if (hasShare) {
        const file = new File([blob], filename, { type: mime });
        if (canShareFile(file)) {
          try {
            await navigator.share({ files: [file] });
            return { ok: true, text: '共有シートで選んだ場所に保存しました' };
          } catch (e) {
            if (e && e.name === 'AbortError') return { ok: false, text: 'キャンセルしました' };
          }
        }
      }
      if (hasFSSave) {
        try {
          const extMatch = filename.match(/\.[^.]+$/);
          const ext = extMatch ? extMatch[0] : '';
          const handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: ext ? [{ description: ext.slice(1).toUpperCase(), accept: { [mime]: [ext] } }] : [],
          });
          const w = await handle.createWritable();
          await w.write(blob);
          await w.close();
          return { ok: true, text: '選択した場所に保存しました' };
        } catch (e) {
          if (e && e.name === 'AbortError') return { ok: false, text: 'キャンセルしました' };
        }
      }
      downloadBlob(blob, filename);
      return { ok: true, text: 'ブラウザの「ダウンロード」フォルダに保存しました' };
    }

    (function setHint() {
      const el = document.getElementById('saveHint');
      if (!el) return;
      if (hasShare) {
        el.innerHTML = '📱 共有シートから「<b>"ファイル"に保存</b>」で <b>iCloud Drive / この端末</b>、NotebookLMアプリが入っていれば直接受け渡しも可能です。';
      } else if (hasFSSave) {
        el.innerHTML = '💻 保存先ダイアログが開くので、任意のフォルダを選べます。NotebookLMの「ソースを追加」にドラッグで取り込めます。';
      } else {
        el.innerHTML = 'ℹ️ ダウンロードフォルダに保存されます。NotebookLMにそのままアップロードできます。';
      }
    })();

    // ---- Transcript text generation ----
    function buildTranscriptText(format) {
      const title = (titleEl.value || '録音').trim();
      const dateStr = new Date().toLocaleString('ja-JP');
      const totalSec = recordedBlob ? ((performance.now() - startedAt) / 1000) : 0;
      const header = [
        `# ${title}`,
        `収録日時: ${dateStr}`,
        `長さ: ${fmtHMS(totalSec)}`,
        `話者: ${speakers.filter((_, i) => segments.some(s => s.speaker === i)).join(', ')}`,
        '',
      ].join('\n');

      if (format === 'timestamped') {
        const body = segments.map(s =>
          `[${fmtHMS(s.t)}] ${speakers[s.speaker] || '話者?'}: ${s.text}`
        ).join('\n');
        return header + body + '\n';
      }
      if (format === 'dialog') {
        const body = segments.map(s =>
          `${speakers[s.speaker] || '話者?'}:\n${s.text}`
        ).join('\n\n');
        return header + body + '\n';
      }
      // clean (default)
      const body = segments.map(s =>
        `${speakers[s.speaker] || '話者?'}: ${s.text}`
      ).join('\n');
      return header + body + '\n';
    }

    function audioExt() {
      if (!recordedMime) return 'webm';
      if (recordedMime.includes('ogg')) return 'ogg';
      if (recordedMime.includes('mp4')) return 'm4a';
      return 'webm';
    }

    function showSaveStatus(res, extra) {
      const box = document.getElementById('saveStatus');
      const cls = res.ok ? 'success' : 'info';
      box.innerHTML = `<div class="alert ${cls}">${extra ? '✅ ' + extra + ' / ' : ''}${res.text}</div>`;
    }

    document.getElementById('saveAudioBtn').addEventListener('click', async () => {
      if (!recordedBlob) return;
      const base = safeFilename(titleEl.value, 'recording');
      const res = await smartSave(recordedBlob, base + '.' + audioExt());
      showSaveStatus(res, `音声 (${fmtSize(recordedBlob.size)})`);
    });

    document.getElementById('saveTextBtn').addEventListener('click', async () => {
      if (!segments.length) { alert('文字起こしがありません'); return; }
      const fmt = document.getElementById('txtFormat').value;
      const text = buildTranscriptText(fmt);
      const base = safeFilename(titleEl.value, 'transcript');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const res = await smartSave(blob, base + '.txt');
      showSaveStatus(res, `文字起こし (${fmtSize(blob.size)})`);
    });

    document.getElementById('previewTextBtn').addEventListener('click', async () => {
      const fmt = document.getElementById('txtFormat').value;
      const text = buildTranscriptText(fmt);
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById('saveStatus').innerHTML = `<div class="alert success">📋 クリップボードにコピーしました (${text.length}文字)</div>`;
      } catch (e) {
        // fallback: show in a textarea modal-like
        const win = window.open('', '_blank');
        if (win) { win.document.body.innerText = text; }
        else alert(text.slice(0, 500) + (text.length > 500 ? '…' : ''));
      }
    });

    recBtn.addEventListener('click', startRecording);
    stopBtn.addEventListener('click', stopRecording);
  </script>
</body>
</html>
