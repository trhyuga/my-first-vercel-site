<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>回転 | PDFツール</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <a class="back" href="../">← PDFツール</a>
      <div class="title-bar"><h1 class="grad-teal">🔄 PDF回転</h1></div>
      <div class="spacer"></div>
    </header>

    <div class="dropzone" id="dz">
      <input type="file" id="fi" accept="application/pdf" hidden />
      <div class="icon">🔄</div>
      <p><b>タップしてPDFを選択</b></p>
      <p class="sub">ページごとに回転方向を指定できます</p>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <div class="file-item">
        <span class="name" id="srcName"></span>
        <span class="size" id="srcSize"></span>
      </div>
      <div class="field-row">
        <button class="btn-secondary" id="rotateAllL">⟲ 全部左90°</button>
        <button class="btn-secondary" id="rotateAllR">⟳ 全部右90°</button>
        <button class="btn-secondary" id="rotateAll180">⤭ 全部180°</button>
      </div>
      <p class="info-hint">各サムネイルをタップで右回り90°ずつ回転。再度タップで一周。</p>
      <div class="thumb-grid" id="grid"></div>
      <div class="field">
        <label for="fname">出力ファイル名</label>
        <input type="text" id="fname" value="rotated" />
      </div>
      <button class="btn-primary" id="run">🔄 回転を適用してダウンロード</button>
      <button class="btn-secondary" id="clear">別のPDFを選ぶ</button>
    </div>

    <div id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
  <script src="../shared.js"></script>
  <script>
    const { fmtSize, download, safeFilename, bindDropzone, showError, clearBox, setupPdfJs, renderPageToCanvas, refuseIfEncrypted, appendPrintButton } = PDFApp;
    setupPdfJs();
    const dz = document.getElementById('dz');
    const fi = document.getElementById('fi');
    const controls = document.getElementById('controls');
    const grid = document.getElementById('grid');
    const srcName = document.getElementById('srcName');
    const srcSize = document.getElementById('srcSize');
    const fname = document.getElementById('fname');
    const msg = document.getElementById('msg');

    let currentFile = null;
    let bytes = null;
    let rotations = []; // additional degrees per page: 0/90/180/270
    let originalRotations = []; // page original rotation

    bindDropzone(dz, fi, async (fs) => {
      const f = fs[0];
      if (!f) return;
      currentFile = f;
      bytes = new Uint8Array(await f.arrayBuffer());
      srcName.textContent = f.name;
      srcSize.textContent = fmtSize(f.size);
      fname.value = safeFilename(f.name.replace(/\.pdf$/i, '') + '_rotated', 'rotated');
      clearBox(msg);
      dz.style.display = 'none';
      controls.style.display = 'flex';
      await renderThumbs();
    });

    async function renderThumbs() {
      grid.innerHTML = '';
      const pdf = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      const n = pdf.numPages;
      rotations = new Array(n).fill(0);
      originalRotations = new Array(n).fill(0);
      for (let i = 1; i <= n; i++) {
        const page = await pdf.getPage(i);
        originalRotations[i - 1] = page.rotate || 0;
        const canvas = await renderPageToCanvas(pdf, i, 0.4);
        const wrap = document.createElement('div');
        wrap.className = 'thumb';
        wrap.dataset.idx = String(i - 1);
        wrap.appendChild(canvas);
        const num = document.createElement('div');
        num.className = 'num';
        num.textContent = i;
        wrap.appendChild(num);
        wrap.addEventListener('click', () => {
          const idx = parseInt(wrap.dataset.idx, 10);
          rotations[idx] = (rotations[idx] + 90) % 360;
          canvas.style.transform = `rotate(${rotations[idx]}deg)`;
        });
        grid.appendChild(wrap);
      }
    }

    function setAll(deg) {
      for (let i = 0; i < rotations.length; i++) rotations[i] = deg;
      grid.querySelectorAll('canvas').forEach(c => c.style.transform = `rotate(${deg}deg)`);
    }
    document.getElementById('rotateAllL').addEventListener('click', () => setAll(270));
    document.getElementById('rotateAllR').addEventListener('click', () => setAll(90));
    document.getElementById('rotateAll180').addEventListener('click', () => setAll(180));

    document.getElementById('clear').addEventListener('click', () => {
      // Shrink any rendered thumbnail canvases before dropping references so
      // the GPU/canvas backing store releases sooner on big PDFs.
      grid.querySelectorAll('canvas').forEach(c => { c.width = 0; c.height = 0; });
      currentFile = null;
      bytes = null;
      rotations.length = 0;
      originalRotations.length = 0;
      dz.style.display = 'block';
      controls.style.display = 'none';
      grid.innerHTML = '';
      clearBox(msg);
    });

    document.getElementById('run').addEventListener('click', async () => {
      if (!bytes) return;
      const runBtn = document.getElementById('run');
      runBtn.disabled = true;
      const orig = runBtn.textContent;
      runBtn.textContent = '処理中...';
      try {
        const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        refuseIfEncrypted(doc);
        const pages = doc.getPages();
        pages.forEach((p, i) => {
          // Take the page's current rotation from pdf-lib itself rather than
          // re-using the value pdf.js reported at thumbnail time — keeps the
          // math correct even if the two libraries normalize rotation
          // differently (e.g. negative degrees, multiples of 360).
          const currentDeg = p.getRotation().angle || 0;
          const total = ((currentDeg + (rotations[i] || 0)) % 360 + 360) % 360;
          p.setRotation(PDFLib.degrees(total));
        });
        const out = await doc.save();
        const outBlob = new Blob([out], { type: 'application/pdf' });
        download(outBlob, safeFilename(fname.value, 'rotated') + '.pdf');
        appendPrintButton(msg, outBlob);
      } catch (e) {
        showError(msg, '失敗: ' + (e.message || e));
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = orig;
      }
    });
  </script>
</body>
</html>
