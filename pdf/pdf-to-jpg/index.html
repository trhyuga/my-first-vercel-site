<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>PDF→JPG | PDFツール</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <a class="back" href="../">← PDFツール</a>
      <div class="title-bar"><h1 class="grad-blue">📸 PDF→JPG</h1></div>
      <div class="spacer"></div>
    </header>

    <div class="dropzone" id="dz">
      <input type="file" id="fi" accept="application/pdf" hidden />
      <div class="icon">📸</div>
      <p><b>タップしてPDFを選択</b></p>
      <p class="sub">各ページをJPG画像に変換</p>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <div class="file-item">
        <span class="name" id="srcName"></span>
        <span class="size" id="srcSize"></span>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="dpi">解像度 (DPI)</label>
          <select id="dpi">
            <option value="100">100 (低)</option>
            <option value="150" selected>150 (標準)</option>
            <option value="200">200 (高)</option>
            <option value="300">300 (最高)</option>
          </select>
        </div>
        <div class="field">
          <label for="format">形式</label>
          <select id="format">
            <option value="jpeg" selected>JPG</option>
            <option value="png">PNG</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="fname">ファイル名(連番が付与されます)</label>
        <input type="text" id="fname" value="page" />
      </div>
      <button class="btn-primary blue" id="runImg">📷 画像で保存 (写真 / ファイル)</button>
      <button class="btn-secondary" id="runZip">📦 ZIPでまとめてダウンロード</button>
      <button class="btn-secondary" id="clear">別のPDFを選ぶ</button>
      <div class="progress" id="prog" style="display:none;">
        <span id="progText">準備中...</span>
        <div class="progress-bar"><span id="progBar" style="width:0%"></span></div>
      </div>
    </div>

    <div id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="../shared.js"></script>
  <script>
    const { fmtSize, download, safeFilename, bindDropzone, showError, clearBox, setupPdfJs } = PDFApp;
    setupPdfJs();
    const dz = document.getElementById('dz');
    const fi = document.getElementById('fi');
    const controls = document.getElementById('controls');
    const srcName = document.getElementById('srcName');
    const srcSize = document.getElementById('srcSize');
    const fname = document.getElementById('fname');
    const msg = document.getElementById('msg');
    const prog = document.getElementById('prog');
    const progText = document.getElementById('progText');
    const progBar = document.getElementById('progBar');

    let bytes = null;
    let originalName = '';

    bindDropzone(dz, fi, async (fs) => {
      const f = fs[0]; if (!f) return;
      bytes = new Uint8Array(await f.arrayBuffer());
      originalName = f.name.replace(/\.pdf$/i, '');
      srcName.textContent = f.name;
      srcSize.textContent = fmtSize(f.size);
      fname.value = safeFilename(originalName + '_page', 'page');
      clearBox(msg);
      dz.style.display = 'none';
      controls.style.display = 'flex';
    });

    document.getElementById('clear').addEventListener('click', () => {
      bytes = null;
      dz.style.display = 'block';
      controls.style.display = 'none';
      clearBox(msg);
      prog.style.display = 'none';
    });

    function setProgress(pct, text) {
      prog.style.display = 'block';
      progText.textContent = text;
      progBar.style.width = pct + '%';
    }

    // Render every page of the loaded PDF to a {blob, name} array.
    // Used by both action buttons (image-share and zip-download), so the
    // PDF only gets parsed and rasterised once even if the user wants
    // both outputs.
    async function renderAllPages() {
      const dpi = parseInt(document.getElementById('dpi').value, 10);
      const format = document.getElementById('format').value;
      const mime = format === 'png' ? 'image/png' : 'image/jpeg';
      const ext = format === 'png' ? 'png' : 'jpg';
      const scale = dpi / 72;
      const base = safeFilename(fname.value, 'page');
      let pdf;
      try {
        pdf = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      } catch (e) {
        if (e && (e.name === 'PasswordException' || /password/i.test(String(e.message || e)))) {
          throw new Error('このPDFはパスワードで保護されています。「🔓 パスワード解除」で解錠してから再度お試しください。');
        }
        throw e;
      }
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        setProgress(Math.round((i - 1) / pdf.numPages * 90), `ページ ${i}/${pdf.numPages} をレンダリング中...`);
        const page = await pdf.getPage(i);
        const vp = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = Math.ceil(vp.width);
        canvas.height = Math.ceil(vp.height);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        const blob = await new Promise(r => canvas.toBlob(r, mime, 0.92));
        const name = `${base}_${String(i).padStart(3, '0')}.${ext}`;
        pages.push({ blob, name, mime });
      }
      return { pages, base, ext, mime };
    }

    // Image-save path. Web Share API on iOS / Android opens the system
    // share sheet with both "写真に保存" and "ファイルに保存" entries —
    // perfect for "save these JPGs as actual photos in the camera roll".
    // Desktop browsers (no canShare for files) fall back to triggering
    // N sequential anchor downloads, which lands the JPGs in the user's
    // download folder one by one.
    async function shareImages(pages) {
      const files = pages.map(p => new File([p.blob], p.name, { type: p.mime }));
      if (navigator.canShare && files.length && navigator.canShare({ files })) {
        try {
          await navigator.share({ files });
          return;
        } catch (e) {
          if (e && e.name !== 'AbortError') {
            // share() failed for a non-cancel reason — fall through to
            // the legacy multi-anchor download so the user still gets
            // the files.
            console.warn('share failed, falling back to anchor download', e);
          } else {
            return;  // user cancelled — that's fine, don't double-fire
          }
        }
      }
      for (const f of files) {
        const url = URL.createObjectURL(f);
        const a = document.createElement('a');
        a.href = url; a.download = f.name; a.target = '_blank'; a.rel = 'noopener';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 60000);
        // 100 ms gap so the browser doesn't coalesce the downloads.
        await new Promise(r => setTimeout(r, 120));
      }
    }

    async function buildAndDownloadZip(pages, base) {
      const zip = new JSZip();
      for (const p of pages) zip.file(p.name, p.blob);
      setProgress(95, 'ZIPを生成中...');
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const zipName = safeFilename(fname.value, originalName || 'pdf-to-images');
      download(zipBlob, zipName + '.zip');
    }

    function disableRunButtons(disabled) {
      document.getElementById('runImg').disabled = disabled;
      document.getElementById('runZip').disabled = disabled;
    }

    document.getElementById('runImg').addEventListener('click', async () => {
      if (!bytes) return;
      const btn = document.getElementById('runImg');
      const orig = btn.textContent;
      disableRunButtons(true);
      btn.textContent = '処理中...';
      clearBox(msg);
      try {
        const { pages } = await renderAllPages();
        setProgress(95, '保存先を選択中...');
        await shareImages(pages);
        setProgress(100, '✅ 保存完了');
      } catch (e) {
        showError(msg, '失敗: ' + (e.message || e));
      } finally {
        disableRunButtons(false);
        btn.textContent = orig;
        setTimeout(() => prog.style.display = 'none', 800);
      }
    });

    document.getElementById('runZip').addEventListener('click', async () => {
      if (!bytes) return;
      const btn = document.getElementById('runZip');
      const orig = btn.textContent;
      disableRunButtons(true);
      btn.textContent = '処理中...';
      clearBox(msg);
      try {
        const { pages, base } = await renderAllPages();
        await buildAndDownloadZip(pages, base);
        setProgress(100, '✅ ZIP保存完了');
      } catch (e) {
        showError(msg, '失敗: ' + (e.message || e));
      } finally {
        disableRunButtons(false);
        btn.textContent = orig;
        setTimeout(() => prog.style.display = 'none', 800);
      }
    });
  </script>
</body>
</html>
