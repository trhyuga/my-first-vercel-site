<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>画像→PDF | PDFツール</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    /* ---- Per-image editor (rotate + crop) ---- */
    .thumb { position: relative; }
    .thumb .edit {
      position: absolute; top: 0.25rem; left: 0.3rem;
      background: rgba(14,165,233,0.92);
      color: #fff; border: none;
      width: 24px; height: 24px; border-radius: 6px;
      font-size: 0.78rem; padding: 0; min-height: auto; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .editor-modal {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.9);
      z-index: 100;
      display: none;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .editor-modal.active { display: flex; }
    .editor-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: rgba(15,23,42,0.95);
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .editor-header .title { flex: 1; font-size: 0.95rem; font-weight: 700; }
    .editor-header button {
      padding: 0.4rem 0.8rem; font-size: 0.85rem;
      min-height: 38px; border-radius: 8px; font-family: inherit;
      cursor: pointer; font-weight: 600;
    }
    .editor-header .close-btn { background: rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); }
    .editor-header .save-btn { background: linear-gradient(135deg, #0ea5e9, #06b6d4); color:#fff; border:none; box-shadow: 0 4px 14px rgba(14,165,233,0.3); }
    .edit-stage {
      flex: 1; min-height: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      background: repeating-conic-gradient(#222 0% 25%, #2a2a2a 0% 50%) 50% / 24px 24px;
    }
    .edit-canvas-wrap {
      position: relative;
      max-width: 100%; max-height: 100%;
    }
    .edit-canvas-wrap canvas {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 220px);
      max-height: calc(100dvh - 220px);
      object-fit: contain;
    }
    .crop-box {
      position: absolute;
      border: 2px solid #0ea5e9;
      box-sizing: border-box;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(15,23,42,0.55);
    }
    .crop-handle {
      position: absolute;
      width: 28px; height: 28px;
      background: #0ea5e9;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      pointer-events: auto;
      touch-action: none;
      cursor: grab;
    }
    .crop-handle:active { cursor: grabbing; }
    .crop-handle.tl { top: -14px; left: -14px; }
    .crop-handle.tr { top: -14px; right: -14px; }
    .crop-handle.bl { bottom: -14px; left: -14px; }
    .crop-handle.br { bottom: -14px; right: -14px; }
    .editor-controls {
      background: rgba(15,23,42,0.95);
      padding: 0.7rem 0.75rem;
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.08);
      justify-content: center;
    }
    .editor-controls button {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.55rem 0.9rem;
      border-radius: 9px;
      font-size: 0.85rem; font-weight: 600;
      min-height: 40px; cursor: pointer;
      font-family: inherit;
    }
    .editor-controls button:active { transform: scale(0.96); background: rgba(255,255,255,0.14); }
    .editor-hint {
      color: rgba(255,255,255,0.6);
      font-size: 0.72rem;
      text-align: center;
      padding: 0.2rem 0.5rem 0.5rem;
      background: rgba(15,23,42,0.95);
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <a class="back" href="../">← PDFツール</a>
      <div class="title-bar"><h1 class="grad-green">🖼️ 画像→PDF</h1></div>
      <div class="spacer"></div>
    </header>

    <div class="dropzone" id="dz">
      <input type="file" id="fi" accept="image/*" multiple hidden />
      <div class="icon">🖼️</div>
      <p><b>タップで画像を複数選択</b></p>
      <p class="sub">JPG / PNG / WebP など、ドラッグ&ドロップ対応</p>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <div class="field">
        <label style="display:flex;align-items:center;gap:0.55rem;cursor:pointer;font-weight:600;">
          <input type="checkbox" id="autoRectify" style="width:18px;height:18px;accent-color:#0ea5e9;flex:0 0 auto;" />
          <span>📐 ドキュメント自動整形 (歪み補正・背景除去)</span>
        </label>
        <div class="info-hint" style="margin:0.2rem 0 0 1.5rem;">
          紙資料を撮った写真の四隅を検出して真っ直ぐに伸ばし、机や床などの周りを切り捨てて整形PDFを作ります。<br>
          初回のみ画像処理エンジン (約9MB) のダウンロードあり。端末内処理。
        </div>
        <button type="button" id="rectifyPreview" style="margin:0.4rem 0 0 1.5rem; padding:0.4rem 0.8rem; border:1px solid #cbd5e1; border-radius:8px; background:#f1f5f9; cursor:pointer; font-size:0.85rem; font-weight:600;">
          👁 整形プレビュー (PDFは作らずサムネだけ更新)
        </button>
        <button type="button" id="rectifyRestore" style="margin:0.4rem 0 0 0.4rem; padding:0.4rem 0.8rem; border:1px solid #cbd5e1; border-radius:8px; background:#f1f5f9; cursor:pointer; font-size:0.85rem; font-weight:600;">
          ↺ 元画像に戻す
        </button>
        <label style="display:flex; align-items:center; gap:0.4rem; margin:0.4rem 0 0 1.5rem; cursor:pointer; font-size:0.82rem; color:#475569;">
          <input type="checkbox" id="rectifyDebug" style="width:16px; height:16px; accent-color:#0ea5e9;" />
          <span>🔍 検出した四隅をオーバーレイ表示 (デバッグ)</span>
        </label>
        <div id="rectifyProgressWrap" style="display:none; margin:0.5rem 0 0 1.5rem;">
          <div id="rectifyProgressLabel" style="font-size:0.78rem; color:#475569; margin-bottom:0.2rem;"></div>
          <div style="height:6px; background:#e2e8f0; border-radius:6px; overflow:hidden;">
            <div id="rectifyProgressBar" style="height:100%; width:0%; background:linear-gradient(90deg, #0ea5e9, #06b6d4); transition:width 0.2s;"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>ページサイズ</label>
        <select id="pageSize">
          <option value="fit">画像サイズに合わせる</option>
          <option value="A4P" selected>A4 縦</option>
          <option value="A4L">A4 横</option>
          <option value="Letter">Letter</option>
          <option value="B5P">B5 縦</option>
        </select>
      </div>
      <div class="thumb-grid" id="grid"></div>
      <div class="field">
        <label for="fname">出力ファイル名</label>
        <input type="text" id="fname" value="images" />
      </div>
      <button class="btn-primary green" id="run">📄 PDFを作成してダウンロード</button>
      <button class="btn-secondary" id="clear">クリア</button>
    </div>

    <div id="msg"></div>
  </div>

  <!-- Per-image rotate + crop editor -->
  <div class="editor-modal" id="editorModal" aria-hidden="true">
    <div class="editor-header">
      <button class="close-btn" id="edClose" type="button">✕ キャンセル</button>
      <div class="title" id="edTitle">画像を編集</div>
      <button class="save-btn" id="edSave" type="button">✓ 保存</button>
    </div>
    <div class="edit-stage">
      <div class="edit-canvas-wrap" id="edWrap">
        <canvas id="edCanvas"></canvas>
        <div class="crop-box" id="edCrop">
          <div class="crop-handle tl" data-corner="tl"></div>
          <div class="crop-handle tr" data-corner="tr"></div>
          <div class="crop-handle bl" data-corner="bl"></div>
          <div class="crop-handle br" data-corner="br"></div>
        </div>
      </div>
    </div>
    <div class="editor-controls">
      <button type="button" id="edRotL">⟲ 左90°</button>
      <button type="button" id="edRot180">⤭ 180°</button>
      <button type="button" id="edRotR">⟳ 右90°</button>
      <button type="button" id="edCropFull">🗖 枠リセット</button>
      <button type="button" id="edReset">↺ 全リセット</button>
    </div>
    <div class="editor-hint">四隅の丸をドラッグして切り抜き範囲を調整 · 保存で適用</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../shared.js"></script>
  <script>
    const { fmtSize, download, safeFilename, bindDropzone, showError, clearBox, appendPrintButton } = PDFApp;

    const SIZES = {
      A4P: [595.28, 841.89],
      A4L: [841.89, 595.28],
      Letter: [612, 792],
      B5P: [498.89, 708.66],
    };

    const dz = document.getElementById('dz');
    const fi = document.getElementById('fi');
    const controls = document.getElementById('controls');
    const grid = document.getElementById('grid');
    const fname = document.getElementById('fname');
    const msg = document.getElementById('msg');

    const images = []; // {file, dataUrl}

    // When the debug checkbox is on AND the image was rectified (so we
    // have a corner-overlay image cached), the thumb shows the original
    // with the detected 4 corners drawn on top. Otherwise it shows
    // im.dataUrl, which is whatever the latest pipeline produced
    // (rectified after preview, or original after upload / restore).
    function thumbSrcFor(im) {
      const dbg = document.getElementById('rectifyDebug');
      if (dbg && dbg.checked && im.cornerOverlayDataUrl) return im.cornerOverlayDataUrl;
      return im.dataUrl;
    }

    function render() {
      grid.innerHTML = '';
      images.forEach((im, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'thumb';
        const img = new Image();
        img.src = thumbSrcFor(im);
        wrap.appendChild(img);
        const num = document.createElement('div');
        num.className = 'num'; num.textContent = i + 1;
        wrap.appendChild(num);
        const del = document.createElement('button');
        del.className = 'del'; del.textContent = '✕';
        del.addEventListener('click', (e) => { e.stopPropagation(); images.splice(i, 1); render(); });
        wrap.appendChild(del);
        const edit = document.createElement('button');
        edit.className = 'edit'; edit.textContent = '✎';
        edit.title = '回転・トリミング';
        edit.addEventListener('click', (e) => { e.stopPropagation(); openEditor(i); });
        wrap.appendChild(edit);
        grid.appendChild(wrap);
      });
      controls.style.display = images.length ? 'flex' : 'none';
    }

    // ---- Per-image editor (rotate + crop) ----
    const edModal = document.getElementById('editorModal');
    const edCanvas = document.getElementById('edCanvas');
    const edCrop = document.getElementById('edCrop');
    const edWrap = document.getElementById('edWrap');
    const edTitle = document.getElementById('edTitle');
    const editorState = {
      index: -1,
      img: null,
      rotation: 0, // 0, 90, 180, 270
      crop: { x: 0, y: 0, w: 0, h: 0 },
    };

    function redrawEditorCanvas() {
      const img = editorState.img;
      if (!img) return;
      const r = ((editorState.rotation % 360) + 360) % 360;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const cw = (r === 90 || r === 270) ? ih : iw;
      const ch = (r === 90 || r === 270) ? iw : ih;
      edCanvas.width = cw; edCanvas.height = ch;
      const ctx = edCanvas.getContext('2d');
      ctx.save();
      ctx.translate(cw / 2, ch / 2);
      ctx.rotate(r * Math.PI / 180);
      ctx.drawImage(img, -iw / 2, -ih / 2);
      ctx.restore();
    }

    function resetCropToFull() {
      editorState.crop = { x: 0, y: 0, w: edCanvas.width, h: edCanvas.height };
    }

    function updateCropBox() {
      const rect = edCanvas.getBoundingClientRect();
      const wrapRect = edWrap.getBoundingClientRect();
      const ox = rect.left - wrapRect.left;
      const oy = rect.top - wrapRect.top;
      if (!edCanvas.width || !edCanvas.height) return;
      const sx = rect.width / edCanvas.width;
      const sy = rect.height / edCanvas.height;
      const cr = editorState.crop;
      edCrop.style.left = (ox + cr.x * sx) + 'px';
      edCrop.style.top = (oy + cr.y * sy) + 'px';
      edCrop.style.width = (cr.w * sx) + 'px';
      edCrop.style.height = (cr.h * sy) + 'px';
    }

    function openEditor(idx) {
      const im = images[idx];
      if (!im) return;
      editorState.index = idx;
      editorState.rotation = 0;
      const img = new Image();
      img.onload = () => {
        editorState.img = img;
        redrawEditorCanvas();
        resetCropToFull();
        edTitle.textContent = `画像を編集 (${idx + 1}/${images.length})`;
        edModal.classList.add('active');
        edModal.setAttribute('aria-hidden', 'false');
        // Position the crop box after layout has settled.
        requestAnimationFrame(() => { updateCropBox(); setTimeout(updateCropBox, 80); });
      };
      img.src = im.dataUrl;
    }
    function closeEditor() {
      edModal.classList.remove('active');
      edModal.setAttribute('aria-hidden', 'true');
      editorState.img = null;
      editorState.index = -1;
    }

    document.getElementById('edClose').addEventListener('click', closeEditor);
    document.getElementById('edRotL').addEventListener('click', () => {
      editorState.rotation = (editorState.rotation + 270) % 360;
      redrawEditorCanvas(); resetCropToFull(); updateCropBox();
    });
    document.getElementById('edRotR').addEventListener('click', () => {
      editorState.rotation = (editorState.rotation + 90) % 360;
      redrawEditorCanvas(); resetCropToFull(); updateCropBox();
    });
    document.getElementById('edRot180').addEventListener('click', () => {
      editorState.rotation = (editorState.rotation + 180) % 360;
      redrawEditorCanvas(); resetCropToFull(); updateCropBox();
    });
    document.getElementById('edCropFull').addEventListener('click', () => {
      resetCropToFull(); updateCropBox();
    });
    document.getElementById('edReset').addEventListener('click', () => {
      editorState.rotation = 0;
      redrawEditorCanvas();
      resetCropToFull(); updateCropBox();
    });

    // Corner-drag → resize crop. Pointer events handle mouse + touch.
    edCrop.querySelectorAll('.crop-handle').forEach(h => {
      h.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        h.setPointerCapture(e.pointerId);
        const corner = h.dataset.corner;
        const startX = e.clientX, startY = e.clientY;
        const startCrop = { ...editorState.crop };
        function onMove(ev) {
          const rect = edCanvas.getBoundingClientRect();
          const sx = edCanvas.width / rect.width;
          const sy = edCanvas.height / rect.height;
          const dxC = (ev.clientX - startX) * sx;
          const dyC = (ev.clientY - startY) * sy;
          let { x, y, w, height: _, ...rest } = startCrop; // use w + h keys
          x = startCrop.x; y = startCrop.y; w = startCrop.w; const hh = startCrop.h;
          let nx = x, ny = y, nw = w, nh = hh;
          if (corner.includes('l')) { nx = x + dxC; nw = w - dxC; }
          if (corner.includes('r')) { nw = w + dxC; }
          if (corner.includes('t')) { ny = y + dyC; nh = hh - dyC; }
          if (corner.includes('b')) { nh = hh + dyC; }
          // Clamp inside canvas + enforce min size
          const MIN = 30;
          if (nx < 0) { nw += nx; nx = 0; }
          if (ny < 0) { nh += ny; ny = 0; }
          if (nx + nw > edCanvas.width)  nw = edCanvas.width  - nx;
          if (ny + nh > edCanvas.height) nh = edCanvas.height - ny;
          if (nw < MIN) nw = MIN;
          if (nh < MIN) nh = MIN;
          editorState.crop = { x: nx, y: ny, w: nw, h: nh };
          updateCropBox();
        }
        function onUp() {
          try { h.releasePointerCapture(e.pointerId); } catch (_) {}
          h.removeEventListener('pointermove', onMove);
          h.removeEventListener('pointerup', onUp);
          h.removeEventListener('pointercancel', onUp);
        }
        h.addEventListener('pointermove', onMove);
        h.addEventListener('pointerup', onUp);
        h.addEventListener('pointercancel', onUp);
      });
    });

    window.addEventListener('resize', () => { if (edModal.classList.contains('active')) updateCropBox(); });

    document.getElementById('edSave').addEventListener('click', () => {
      const idx = editorState.index;
      if (idx < 0 || !images[idx]) { closeEditor(); return; }
      const cr = editorState.crop;
      // Crop the rotated canvas to the selected region.
      const out = document.createElement('canvas');
      out.width = Math.max(1, Math.round(cr.w));
      out.height = Math.max(1, Math.round(cr.h));
      out.getContext('2d').drawImage(
        edCanvas,
        Math.round(cr.x), Math.round(cr.y), out.width, out.height,
        0, 0, out.width, out.height
      );
      const newUrl = out.toDataURL('image/jpeg', 0.92);
      images[idx].dataUrl = newUrl;
      // Replace the underlying file with a same-name blob so the embed path
      // uses the edited bytes even on the direct-embed fast path.
      const byteString = atob(newUrl.split(',')[1]);
      const buf = new Uint8Array(byteString.length);
      for (let i = 0; i < byteString.length; i++) buf[i] = byteString.charCodeAt(i);
      const origName = images[idx].file && images[idx].file.name ? images[idx].file.name.replace(/\.[^.]+$/, '') : 'edited';
      images[idx].file = new File([buf], origName + '.jpg', { type: 'image/jpeg' });
      render();
      closeEditor();
    });

    bindDropzone(dz, fi, async (fs) => {
      for (const f of fs) {
        if (!f.type.startsWith('image/')) continue;
        const dataUrl = await new Promise((r) => {
          const fr = new FileReader();
          fr.onload = () => r(fr.result);
          fr.readAsDataURL(f);
        });
        images.push({ file: f, dataUrl });
      }
      render();
    });

    document.getElementById('clear').addEventListener('click', () => {
      images.length = 0; render(); clearBox(msg);
    });

    async function fileToBytes(file) {
      return new Uint8Array(await file.arrayBuffer());
    }

    // ---- Document auto-rectify (OpenCV.js + jscanify) ----
    // Both libraries are loaded only when the user enables the toggle, since
    // OpenCV.js is ~9 MB.
    let cvReady = null;
    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = res; s.onerror = () => rej(new Error('script load failed: ' + src));
        document.head.appendChild(s);
      });
    }
    // Helpers for the visible progress bar / label.
    const progressWrap  = document.getElementById('rectifyProgressWrap');
    const progressBar   = document.getElementById('rectifyProgressBar');
    const progressLabel = document.getElementById('rectifyProgressLabel');
    function showProgress(pct, label) {
      if (!progressWrap) return;
      progressWrap.style.display = '';
      // Clamp to 0-100. Compressed (gzip / brotli) responses report a
      // Content-Length smaller than the bytes the reader yields, so the
      // raw ratio can overshoot — we saw "341%" on iOS over 4G.
      progressBar.style.width = Math.max(0, Math.min(100, Math.round(pct * 100))) + '%';
      if (label != null) progressLabel.textContent = label;
    }
    function hideProgress() {
      if (!progressWrap) return;
      progressWrap.style.display = 'none';
    }
    // Pre-download the opencv.js bytes only to drive the progress bar — the
    // actual `cv` global is then loaded via a normal <script src=URL> tag,
    // which the browser serves from cache (same URL + headers) without a
    // second roundtrip. Why this dance: OpenCV.js is an Emscripten module
    // whose WASM payload (opencv_js.wasm) is fetched RELATIVE to the
    // script's URL. Injecting it as a Blob URL puts the script at
    // blob:.../<uuid>, so the WASM resolves to blob:.../<uuid>/opencv_js.wasm
    // → 404 → cv.onRuntimeInitialized never fires → the bar sits at 100%
    // and the user is stuck (exact symptom we hit on iOS 4G).
    async function downloadForProgress(url, onProgress) {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) throw new Error('fetch failed ' + res.status + ' ' + url);
      const total = parseInt(res.headers.get('Content-Length'), 10) || 0;
      const reader = res.body && res.body.getReader ? res.body.getReader() : null;
      if (!reader) {
        await res.arrayBuffer();
        if (onProgress) onProgress(1);
        return;
      }
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.byteLength;
        if (onProgress && total > 0) onProgress(Math.min(1, received / total));
      }
      if (onProgress) onProgress(1);
    }
    // Try a sequence of URLs until one loads. Local-first per user choice —
    // ./opencv.js is the in-repo mirror (~10 MB, served same-origin from
    // Vercel) and is by far the fastest path because there's no DNS / TLS /
    // CDN roundtrip. The CDN URLs are kept as fallbacks for the case where
    // the local file ever goes missing or gets stale. To refresh the local
    // mirror to a newer build run `bash update-opencv.sh` in this folder.
    //
    // For each URL we ALSO pre-register an onRuntimeInitialized callback
    // on window.Module BEFORE running the script. The opencv.js bundle uses
    // `if (typeof Module === 'undefined') Module = {}` then `cv(Module)` —
    // so a Module we put on window first is preserved and our callback gets
    // called as soon as the WASM runtime is ready. Without the pre-register
    // the previous code attached cv.onRuntimeInitialized AFTER the script
    // ran, racing with WASM compile; on faster init paths the callback was
    // assigned AFTER Emscripten had already fired its no-op handler, so cv
    // never reported ready and the page sat at "初期化中…" forever.
    async function loadCvScript(onProgress) {
      const urls = [
        './opencv.js',
        'https://docs.opencv.org/4.10.0/opencv.js',
        'https://docs.opencv.org/4.5.0/opencv.js',
        'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js',
      ];
      let lastErr = null;
      for (const url of urls) {
        const prevModule = window.Module;
        try {
          await downloadForProgress(url, onProgress);
          // Race-free init signal.
          const initialized = new Promise((res) => {
            window.Module = Object.assign({}, prevModule || {}, {
              onRuntimeInitialized() { res(); },
            });
          });
          await loadScript(url);             // browser cache hit from the fetch above
          if (onProgress) onProgress(1);
          if (progressLabel) progressLabel.textContent = '画像処理エンジンを初期化中…';
          // Wait for: explicit Module callback OR cv.Mat polling OR timeout.
          // Polling is a safety net for builds that don't honour the Module
          // hook (some derivative bundles populate cv.Mat synchronously).
          await Promise.race([
            initialized,
            new Promise((res) => {
              const t = setInterval(() => {
                if (typeof cv !== 'undefined' && cv && cv.Mat) {
                  clearInterval(t); res();
                }
              }, 100);
            }),
            new Promise((_, rej) => setTimeout(
              () => rej(new Error('OpenCV initialization timed out (60s)')),
              60000
            )),
          ]);
          // If cv ended up as a factory / Promise (some 4.10 derivatives),
          // resolve it now and replace the global so the rest of the code
          // can use it directly.
          if (typeof cv !== 'undefined' && !cv.Mat) {
            if (typeof cv === 'function') {
              const m = await cv();
              if (m && m.Mat) window.cv = m;
            } else if (typeof cv === 'object' && cv && typeof cv.then === 'function') {
              const m = await cv;
              if (m && m.Mat) window.cv = m;
            }
          }
          window.Module = prevModule;        // restore so we don't leak globals
          if (typeof cv === 'undefined' || !cv.Mat) {
            throw new Error('cv.Mat missing after init from ' + url);
          }
          return;
        } catch (e) {
          window.Module = prevModule;        // restore on failure too
          lastErr = e;
          if (onProgress) onProgress(0);     // reset bar before the next URL
        }
      }
      throw lastErr || new Error('all opencv.js URLs failed');
    }
    // jscanify@1.2.0 ships its source at src/jscanify.js (no built dist),
    // so the original /dist/jscanify.min.js URL was a 404. The local
    // ./jscanify.js mirror is preferred (same-origin, no DNS) and the
    // jsdelivr / unpkg URLs are fallbacks.
    async function loadJscanify() {
      if (typeof jscanify !== 'undefined') return;
      const urls = [
        './jscanify.js',
        'https://cdn.jsdelivr.net/npm/jscanify@1.2.0/src/jscanify.js',
        'https://cdn.jsdelivr.net/npm/jscanify@1.2.0',
        'https://unpkg.com/jscanify@1.2.0/src/jscanify.js',
      ];
      let lastErr = null;
      for (const url of urls) {
        try { await loadScript(url); if (typeof jscanify !== 'undefined') return; }
        catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('jscanify load failed');
    }
    async function ensureCv(onProgress) {
      if (cvReady) return cvReady;
      cvReady = (async () => {
        // loadCvScript handles the byte download, the script execution AND
        // the WASM-runtime-ready wait (it pre-installs window.Module so
        // onRuntimeInitialized fires reliably).
        await loadCvScript(onProgress);
        await loadJscanify();
      })();
      return cvReady;
    }

    // Run jscanify against an image element. Returns a rectified canvas, or
    // null when the corner detector couldn't find a 4-sided contour (e.g.
    // photos that aren't of a document at all). Output canvas size targets
    // A4 portrait at ~150 DPI but uses the detected quad's aspect ratio so
    // a Letter page or a notebook spread isn't squashed to A4.
    //
    // jscanify@1.2.0 API: findPaperContour(cvMat) → cv.Mat,
    //                     getCornerPoints(contour) → {tl, tr, bl, br},
    //                     extractPaper(image, w, h, cornerPoints?) → canvas.
    // The previous implementation called getCornerPoints(imgEl) directly,
    // which reads contour.data32S off an HTMLImageElement — undefined →
    // throws → caught → every image went through unrectified.
    // Render the original image with the detected 4 corners drawn on top
    // so the user can verify what jscanify actually thought was the paper.
    // Toggleable via the "🔍 検出した四隅をオーバーレイ表示" checkbox; without
    // this the rectify result alone made it impossible to tell whether
    // perspective correction actually fired or jscanify just picked the
    // image bounds (= no-op warp).
    function makeCornerOverlay(imgEl, corners) {
      const W = imgEl.naturalWidth || imgEl.width;
      const H = imgEl.naturalHeight || imgEl.height;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      ctx.drawImage(imgEl, 0, 0, W, H);
      const tl = corners.topLeftCorner, tr = corners.topRightCorner;
      const br = corners.bottomRightCorner, bl = corners.bottomLeftCorner;
      // Translucent fill + bright outline so the quad reads at any thumb
      // size on any background.
      ctx.fillStyle = 'rgba(255, 200, 0, 0.20)';
      ctx.strokeStyle = 'rgba(255, 80, 0, 0.95)';
      ctx.lineWidth = Math.max(4, Math.round(Math.min(W, H) * 0.008));
      ctx.beginPath();
      ctx.moveTo(tl.x, tl.y);
      ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y);
      ctx.lineTo(bl.x, bl.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Corner dots so the user can tell which corner is which.
      const r = Math.max(8, Math.round(Math.min(W, H) * 0.012));
      ctx.fillStyle = '#ff3030';
      for (const p of [tl, tr, br, bl]) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      return c;
    }

    // Apply an unsharp mask + light CLAHE pass to the rectified canvas in
    // place. Compensates for the softness on the camera-far side (where
    // warpPerspective stretches a smaller pixel patch over more output
    // pixels) and lifts low-contrast text on uneven lighting. CLAHE is
    // applied to the L channel only so colours stay neutral; the unsharp
    // mask is mild (sigma 1.4, amount 0.6) — bumping it to amount=1.0
    // turned out to clip both ends around text edges, which painted a
    // dark halo on the paper background and made the whole page read
    // as grey/black. 0.6 keeps the sharpness gain without the halo.
    function sharpenCanvasInPlace(canvas) {
      let src = null, lab = null, channels = null, clahe = null, blurred = null, dst = null;
      try {
        src = cv.imread(canvas);
        // ----- CLAHE on L channel for local contrast lift -----
        // Clip 1.5 (down from 2.0) — the stronger setting was visibly
        // darkening the paper background on document scans, where most
        // pixels are already near-white and CLAHE was compressing the
        // bright end of the histogram.
        try {
          lab = new cv.Mat();
          cv.cvtColor(src, lab, cv.COLOR_RGBA2RGB);
          cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
          channels = new cv.MatVector();
          cv.split(lab, channels);
          if (typeof cv.CLAHE === 'function') {
            clahe = new cv.CLAHE(1.5, new cv.Size(8, 8));
            const L = channels.get(0);
            clahe.apply(L, L);
          }
          cv.merge(channels, lab);
          cv.cvtColor(lab, lab, cv.COLOR_Lab2RGB);
          cv.cvtColor(lab, src, cv.COLOR_RGB2RGBA);
        } catch (_) { /* CLAHE optional — fall through to unsharp only */ }
        // ----- Unsharp mask (mild) -----
        blurred = new cv.Mat();
        dst = new cv.Mat();
        cv.GaussianBlur(src, blurred, new cv.Size(0, 0), 1.4);
        cv.addWeighted(src, 1.6, blurred, -0.6, 0, dst);
        cv.imshow(canvas, dst);
      } catch (e) {
        console.warn('sharpen failed', e);
      } finally {
        if (src)      try { src.delete(); } catch (_) {}
        if (lab)      try { lab.delete(); } catch (_) {}
        if (channels) try { channels.delete(); } catch (_) {}
        if (clahe)    try { clahe.delete(); } catch (_) {}
        if (blurred)  try { blurred.delete(); } catch (_) {}
        if (dst)      try { dst.delete(); } catch (_) {}
      }
    }

    // Returns null when no paper was detected, otherwise
    //   { canvas: <HTMLCanvasElement>, corners: {tl,tr,bl,br} }.
    // Caller uses canvas as the rectified result and corners to render the
    // debug overlay if the user wants to verify the detection.
    function rectifyWithJscanify(imgEl) {
      let src = null, contour = null;
      try {
        const scanner = new jscanify();
        src = cv.imread(imgEl);
        contour = scanner.findPaperContour(src);
        if (!contour || (typeof contour.empty === 'function' && contour.empty())) {
          return null;
        }
        const corners = scanner.getCornerPoints(contour);
        if (!corners) return null;
        const tl = corners.topLeftCorner, tr = corners.topRightCorner;
        const bl = corners.bottomLeftCorner, br = corners.bottomRightCorner;
        if (!tl || !tr || !bl || !br) return null;
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        const wTop = dist(tl, tr), wBot = dist(bl, br);
        const hLft = dist(tl, bl), hRgt = dist(tr, br);
        const w = Math.max(wTop, wBot), h = Math.max(hLft, hRgt);
        if (!isFinite(w) || !isFinite(h) || w < 50 || h < 50) return null;
        // Reject "the corners cover essentially the whole frame" — that
        // happens when findPaperContour can't see a real paper edge and
        // falls back to the image bounds. Without this guard the result
        // is a no-op warp on every photo of e.g. a person or a sky.
        const imgArea = (imgEl.naturalWidth || imgEl.width) * (imgEl.naturalHeight || imgEl.height);
        const detectedArea = w * h;
        if (imgArea > 0) {
          if (detectedArea > imgArea * 0.97) return null;
          if (detectedArea < imgArea * 0.05) return null;
        }
        // Force A4 aspect (1:√2). The user's input is presumed to be a
        // printed A4 sheet, so we map the detected quad to the standard
        // A4 rectangle at ~150 DPI (1240×1754) regardless of how skewed
        // the camera shot was — the previous "preserve detected aspect"
        // path output 1:1.2-ish rectangles when the camera tilt squashed
        // the quad, which then printed at the wrong size on A4 paper.
        const A4_LONG = 1754;
        const A4_SHORT = 1240;
        const isLandscape = w > h;
        const outW = isLandscape ? A4_LONG : A4_SHORT;
        const outH = isLandscape ? A4_SHORT : A4_LONG;
        // jscanify's contour detection tends to fall a few pixels INSIDE
        // the actual paper edge (the threshold step erodes the boundary).
        // Push each corner outward from the quad centroid by ~2.5% so the
        // warp captures the full sheet rather than leaving a ghostly
        // background border on the rectified output. Clamp to image bounds
        // so we never sample beyond what the camera saw.
        const W = imgEl.naturalWidth || imgEl.width;
        const H = imgEl.naturalHeight || imgEl.height;
        const cx = (tl.x + tr.x + br.x + bl.x) / 4;
        const cy = (tl.y + tr.y + br.y + bl.y) / 4;
        const PAD = 1.025;
        const expand = (p) => ({
          x: Math.max(0, Math.min(W - 1, cx + (p.x - cx) * PAD)),
          y: Math.max(0, Math.min(H - 1, cy + (p.y - cy) * PAD)),
        });
        const expandedCorners = {
          topLeftCorner:     expand(tl),
          topRightCorner:    expand(tr),
          bottomRightCorner: expand(br),
          bottomLeftCorner:  expand(bl),
        };
        // Pass cornerPoints as 4th arg so extractPaper doesn't redo
        // findPaperContour internally (saves a second OpenCV pass).
        const canvas = scanner.extractPaper(imgEl, outW, outH, expandedCorners);
        if (!canvas) return null;
        // Sharpen in place — when the camera was tilted, the side that
        // was further from the lens captured fewer pixels per unit area,
        // and warpPerspective stretches them out so the side reads as
        // soft / blurry. Unsharp masking lifts edge contrast across the
        // whole image, which compensates for the perceived softness of
        // the camera-far side without over-sharpening the near side.
        sharpenCanvasInPlace(canvas);
        // Return the EXPANDED corners so the debug overlay shows the
        // actual quad we warped, not the smaller contour jscanify found.
        return { canvas, corners: expandedCorners };
      } catch (e) {
        console.warn('rectify failed', e);
        return null;
      } finally {
        // OpenCV.js Mats live in the WASM heap and must be explicitly
        // freed — without this the heap grows by ~12-30 MB per page on
        // typical phone-camera input and crashes after ~10-15 images.
        if (src && typeof src.delete === 'function') {
          try { src.delete(); } catch (_) {}
        }
        if (contour && typeof contour.delete === 'function') {
          try { contour.delete(); } catch (_) {}
        }
      }
    }

    // Returns Promise< { canvas, corners, sourceImg } | null >. Loads
    // jscanify lazily. sourceImg is the loaded HTMLImageElement of the
    // pre-rectify input — handed back so the caller can render the
    // corner-overlay debug thumb without re-loading.
    async function rectifyImageEntry(im) {
      await ensureCv();
      const img = await new Promise((r, rej) => {
        const x = new Image();
        x.onload = () => r(x); x.onerror = rej;
        x.src = im.dataUrl;
      });
      const result = rectifyWithJscanify(img);
      if (!result) return null;
      return { ...result, sourceImg: img };
    }

    // Preview-only rectify: runs the same pipeline as the PDF export but
    // stops after updating the on-page thumbnails, so the user can see
    // the corner-detection result without committing to a PDF download.
    // Stashes the pre-rectify dataUrl on im.originalDataUrl the first
    // time so subsequent previews don't compound on already-rectified
    // canvases (jscanify on its own clean output produces garbage).
    // 元画像に戻す: drop the rectified result + cached overlay and restore
    // im.dataUrl from the originalDataUrl stash. After this the thumbs
    // look the same as right after upload (any in-editor rotate/crop made
    // BEFORE the first preview is also undone, since originalDataUrl
    // captured the dataUrl at that point).
    document.getElementById('rectifyRestore').addEventListener('click', () => {
      if (!images.length) return;
      let restored = 0;
      for (const im of images) {
        if (im.originalDataUrl && im.dataUrl !== im.originalDataUrl) {
          im.dataUrl = im.originalDataUrl;
          restored++;
        }
        im.cornerOverlayDataUrl = null;
      }
      render();
      clearBox(msg);
      const note = document.createElement('div');
      note.className = 'success';
      note.textContent = `↺ ${restored}件を元画像に戻しました`;
      msg.appendChild(note);
    });

    // Debug overlay toggle: just re-render — thumbSrcFor() picks the
    // overlay dataUrl when this checkbox is checked.
    document.getElementById('rectifyDebug').addEventListener('change', () => {
      render();
    });

    document.getElementById('rectifyPreview').addEventListener('click', async () => {
      if (!images.length) { showError(msg, '画像を1枚以上選んでください'); return; }
      const btn = document.getElementById('rectifyPreview');
      const orig = btn.textContent;
      btn.disabled = true;
      clearBox(msg);
      try {
        btn.textContent = '画像処理エンジンを準備中…';
        showProgress(0, '画像処理エンジンを準備中…');
        await ensureCv((p) => {
          showProgress(p, `画像処理エンジンを準備中… ${Math.round(p * 100)}%`);
        });
        let ok = 0, skipped = 0;
        for (let i = 0; i < images.length; i++) {
          const im = images[i];
          const pct = Math.round(((i) / images.length) * 100);
          btn.textContent = `整形プレビュー中… ${i + 1} / ${images.length}`;
          showProgress(i / images.length,
            `整形プレビュー中… ${i + 1} / ${images.length} (${pct}%)`);
          // Preserve the original so a re-run starts from the same source
          // each time. Without this a second click would re-rectify the
          // already-rectified canvas (= cropped further or fails).
          if (!im.originalDataUrl) im.originalDataUrl = im.dataUrl;
          else im.dataUrl = im.originalDataUrl;
          // Drop any previous overlay so we don't show stale corners while
          // the new ones are being computed.
          im.cornerOverlayDataUrl = null;
          const rectified = await rectifyImageEntry(im).catch(() => null);
          if (rectified) {
            try {
              im.dataUrl = rectified.canvas.toDataURL('image/jpeg', 0.85);
              // Cache the corner-overlay image so the debug toggle is
              // instant (no recompute when flipping the checkbox).
              try {
                im.cornerOverlayDataUrl = makeCornerOverlay(rectified.sourceImg, rectified.corners)
                  .toDataURL('image/jpeg', 0.7);
              } catch (_) {}
              ok++;
            } catch (_) { skipped++; }
          } else {
            skipped++;
          }
          render();
        }
        showProgress(1, '完了');
        const note = document.createElement('div');
        note.className = 'success';
        note.textContent = `📐 整形: ${ok}件 / 自動検出できず原画像のまま: ${skipped}件 (PDFはまだ作っていません)`;
        msg.appendChild(note);
      } catch (e) {
        showError(msg, '整形プレビュー失敗: ' + (e.message || e));
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
        // Leave the bar visible at 100% briefly so the user sees completion,
        // then hide it.
        setTimeout(hideProgress, 800);
      }
    });

    document.getElementById('run').addEventListener('click', async () => {
      if (!images.length) { showError(msg, '画像を1枚以上選んでください'); return; }
      const runBtn = document.getElementById('run');
      runBtn.disabled = true;
      const orig = runBtn.textContent;
      runBtn.textContent = '処理中...';
      try {
        const doc = await PDFLib.PDFDocument.create();
        const sizeKey = document.getElementById('pageSize').value;
        // Margin selector was removed (always "なし") — keep marginPt = 0
        // so the existing fit-vs-bordered branching below still compiles.
        const marginPt = 0;
        const autoRectify = document.getElementById('autoRectify').checked;

        // Re-encode via canvas for cases where pdf-lib can't embed the raw
        // bytes (interlaced PNG, 16-bit PNG, WebP, HEIC, etc.).
        async function reencodeAsJpg(im) {
          const dataUrl = im.dataUrl;
          const img = await new Promise((r) => { const x = new Image(); x.onload = () => r(x); x.src = dataUrl; });
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
          return await doc.embedJpg(new Uint8Array(await blob.arrayBuffer()));
        }
        async function rectifiedToJpg(canvas) {
          const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
          return await doc.embedJpg(new Uint8Array(await blob.arrayBuffer()));
        }
        let rectifiedCount = 0;
        let rectifySkipped = 0;
        if (autoRectify) {
          runBtn.textContent = '画像処理エンジンを準備中...';
          showProgress(0, '画像処理エンジンを準備中…');
          try {
            await ensureCv((p) => {
              showProgress(p, `画像処理エンジンを準備中… ${Math.round(p * 100)}%`);
            });
          }
          catch (e) {
            showError(msg, '整形エンジンの読み込みに失敗: ' + (e.message || e) + ' (整形なしで続行します)');
          }
          runBtn.textContent = '処理中...';
        }
        for (let pi = 0; pi < images.length; pi++) {
          const im = images[pi];
          const pct = Math.round((pi / images.length) * 100);
          if (autoRectify) {
            showProgress(pi / images.length,
              `整形 + PDF化中… ${pi + 1} / ${images.length} (${pct}%)`);
          } else {
            showProgress(pi / images.length,
              `PDF化中… ${pi + 1} / ${images.length} (${pct}%)`);
          }
          const bytes = await fileToBytes(im.file);
          let embed;
          if (autoRectify) {
            const rectified = await rectifyImageEntry(im).catch(() => null);
            if (rectified) {
              embed = await rectifiedToJpg(rectified.canvas);
              rectifiedCount++;
              // Update the UI thumbnail too so the user can see what landed
              // in the PDF after rectification, plus cache the corner-overlay
              // for the debug toggle.
              try {
                if (!im.originalDataUrl) im.originalDataUrl = im.dataUrl;
                im.dataUrl = rectified.canvas.toDataURL('image/jpeg', 0.85);
                im.cornerOverlayDataUrl = makeCornerOverlay(rectified.sourceImg, rectified.corners)
                  .toDataURL('image/jpeg', 0.7);
                render();
              } catch (e) {}
            } else {
              rectifySkipped++;
              try {
                if (im.file.type === 'image/png' || /\.png$/i.test(im.file.name)) {
                  embed = await doc.embedPng(bytes);
                } else if (im.file.type === 'image/jpeg' || /\.jpe?g$/i.test(im.file.name)) {
                  embed = await doc.embedJpg(bytes);
                } else { embed = await reencodeAsJpg(im); }
              } catch (e) { embed = await reencodeAsJpg(im); }
            }
          } else {
            try {
              if (im.file.type === 'image/png' || /\.png$/i.test(im.file.name)) {
                embed = await doc.embedPng(bytes);
              } else if (im.file.type === 'image/jpeg' || /\.jpe?g$/i.test(im.file.name)) {
                embed = await doc.embedJpg(bytes);
              } else { embed = await reencodeAsJpg(im); }
            } catch (e) { embed = await reencodeAsJpg(im); }
          }
          let pageW, pageH;
          if (sizeKey === 'fit') {
            pageW = embed.width; pageH = embed.height;
          } else {
            [pageW, pageH] = SIZES[sizeKey];
          }
          const page = doc.addPage([pageW, pageH]);
          if (sizeKey === 'fit') {
            page.drawImage(embed, { x: 0, y: 0, width: pageW, height: pageH });
          } else {
            const innerW = pageW - marginPt * 2;
            const innerH = pageH - marginPt * 2;
            const scale = Math.min(innerW / embed.width, innerH / embed.height);
            const w = embed.width * scale;
            const h = embed.height * scale;
            page.drawImage(embed, { x: (pageW - w) / 2, y: (pageH - h) / 2, width: w, height: h });
          }
        }
        showProgress(1, 'PDF化完了');
        const outBlob = new Blob([await doc.save()], { type: 'application/pdf' });
        download(outBlob, safeFilename(fname.value, 'images') + '.pdf');
        appendPrintButton(msg, outBlob);
        if (autoRectify) {
          const note = document.createElement('div');
          note.className = 'success';
          note.textContent = `📐 整形: ${rectifiedCount}件 / 自動検出できず原画像のまま: ${rectifySkipped}件`;
          msg.appendChild(note);
        }
      } catch (e) {
        showError(msg, '失敗: ' + (e.message || e));
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = orig;
        setTimeout(hideProgress, 800);
      }
    });
  </script>
</body>
</html>
