<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>公文書→PDF | PDFツール</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    /* ========== レイアウト ========== */
    .intro-note {
      font-size: 0.82rem; color: #475569; line-height: 1.65;
      background: #ecfeff;
      border: 1px solid #67e8f9;
      border-radius: 12px;
      padding: 0.7rem 0.9rem;
      margin: 0 0 1rem;
    }
    .intro-note b { color: #0e7490; }
    .intro-note code {
      background: #fff; padding: 1px 5px; border-radius: 4px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.92em;
    }

    .filelist {
      display: flex; flex-direction: column; gap: 0.35rem;
      margin: 0.6rem 0;
    }
    .fileitem {
      display: flex; align-items: center; gap: 0.5rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.45rem 0.65rem;
      font-size: 0.86rem;
    }
    .fileitem .kind {
      flex: 0 0 auto;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em;
      padding: 1px 7px; border-radius: 999px;
      color: #fff;
    }
    .fileitem .kind.xml      { background: #0284c7; }
    .fileitem .kind.xsl      { background: #0e7490; }
    .fileitem .kind.other    { background: #64748b; }
    .fileitem .kind.attached { background: #b45309; }
    .fileitem .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; color: #0f172a; }
    .fileitem .size { flex: 0 0 auto; color: #64748b; font-size: 0.78rem; }
    .fileitem .pair { color: #475569; font-size: 0.75rem; }
    .fileitem .badge {
      font-size: 0.72rem; color: #b91c1c;
      background: #fee2e2; padding: 1px 6px; border-radius: 4px;
    }
    .fileitem .download-btn {
      background: #0ea5e9; color: #fff; border: 0;
      padding: 0.25rem 0.55rem; border-radius: 6px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }

    /* タブ (複数 XML がある場合) */
    .doc-tabs {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
      margin: 0.8rem 0 0.5rem;
    }
    .doc-tab {
      background: #f1f5f9; color: #475569;
      border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .doc-tab.active {
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      color: #fff;
      border-color: transparent;
    }

    /* プレビュー領域 */
    .preview-pane {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 0.6rem;
      max-height: 72vh;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 0.5rem;
    }
    .preview-pane:empty { display: none; }

    /* Shadow DOM ホスト: XSL 出力をここに入れる。隔離されているので
       ホストページ側の CSS とは干渉しない。 */
    .xslt-host {
      display: block;
      background: #fff;
      margin: 0 auto;
    }

    .action-row {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin: 0.7rem 0;
    }
    .action-row .btn-primary,
    .action-row .btn-secondary { min-width: 0; }

    .empty-state {
      text-align: center; color: #94a3b8;
      padding: 2rem 1rem;
      font-size: 0.85rem;
    }
    .empty-state b { color: #475569; }

    /* 印刷モード: プレビュー領域だけ A4 で書き出す。
       visibility: hidden + position: absolute 方式 (doc-pdf の旧版) は、
       Edge の印刷エンジンで content area の幅を 60% 程度に勘違いして
       縮小レンダリングする事象があったので、display: none で UI 要素を
       完全に消し、preview-pane を通常フローで A4 全幅に展開する方式に
       切り替えた。 */
    @media print {
      @page { size: A4 portrait; margin: 5mm; }
      html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
      body > header,
      body > main > .intro-note,
      body > main > .dropzone,
      body > main > #fileListBox,
      body > main > .action-row,
      body > main > .doc-tabs,
      body > main > #msg,
      body > main > footer,
      body > main > script {
        display: none !important;
      }
      body > main { padding: 0 !important; margin: 0 !important; max-width: none !important; width: 100% !important; }
      .preview-pane {
        max-height: none !important;
        overflow: visible !important;
        border: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
        width: 100% !important;
      }
      .xslt-host { width: 100% !important; max-width: none !important; }
    }
  </style>
</head>
<body>
  <header class="site">
    <div class="brand">
      <a class="back-btn" href="../" aria-label="戻る">←</a>
      <div class="logo">TR</div>
      <div class="brand-name">📜 公文書→PDF</div>
    </div>
  </header>

  <main class="container">
    <div class="intro-note">
      e-Gov / 年金機構 / 法務省 などから受け取った <b>公文書の XML + XSL</b> を、
      ブラウザ上で PDF に変換します。<br>
      <b>ZIP のままドロップ</b> もOK ── ZIP 内の <code>.xml</code>/<code>.xsl</code> は
      自動でペアにして変換、添付資料 (PDF / JPG 等) はそのまま個別にダウンロードできます。
      ファイルは <b>すべて端末内で処理</b> ── サーバーには一切送信されません。
    </div>

    <!-- ========== ドロップゾーン ========== -->
    <div class="dropzone" id="dz">
      <input type="file" id="fi" multiple accept=".xml,.xsl,.xslt,.zip,application/xml,text/xml,application/zip" hidden />
      <div class="icon">📜</div>
      <p><b>タップしてファイルを選択 / ドラッグ&ドロップ</b></p>
      <p class="sub">.xml / .xsl / .zip (複数選択可)</p>
      <div class="fmt-list" style="margin-top:0.6rem;">
        <span class="fmt-chip">XML</span>
        <span class="fmt-chip">XSL</span>
        <span class="fmt-chip">ZIP</span>
      </div>
    </div>

    <!-- ========== ファイル一覧 ========== -->
    <div id="fileListBox"></div>

    <!-- ========== アクション ========== -->
    <div class="action-row" id="actionRow" style="display:none;">
      <button class="btn-primary" id="printBtn" style="flex:1;min-width:200px;">🖨️ PDFとして保存 (印刷ダイアログ)</button>
      <button class="btn-secondary" id="clearBtn">クリア</button>
    </div>

    <!-- ========== ドキュメントタブ (複数 XML 用) ========== -->
    <div class="doc-tabs" id="docTabs"></div>

    <!-- ========== プレビュー ========== -->
    <div class="preview-pane" id="previewPane"></div>

    <!-- ========== メッセージ ========== -->
    <div id="msg"></div>
  </main>

  <!-- JSZip — ZIP 解凍用 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="../shared.js"></script>
  <script>
    /* ===========================================================
     * 公文書→PDF 変換ツール (フルクライアントサイド)
     *
     * - XML + XSL を受け取り、ブラウザの XSLTProcessor で変換 → 表示
     * - ZIP の場合は JSZip で解凍してから処理
     * - 印刷ダイアログ → 「PDF として保存」で書き出し
     *
     * 過去 (doc-pdf) で苦戦した教訓:
     *   1. XSLTProcessor の出力は HTML パーサーを通っていないので
     *      <table><td> のような <tr> 省略構造が崩れる。
     *      → DOMParser('text/html') で再パースして HTML5 の
     *        auto-insertion (<tbody>/<tr>) を効かせる。
     *   2. XSL の <style> はホストページに漏らせない (body{} 等)。
     *      → Shadow DOM に隔離する。
     *   3. <table class="outline" cellpadding="20"> が内側 640px の
     *      テーブルを overflow させて A4 はみ出しの原因になる。
     *      → DOM レベルで cellpadding=0 に書き換える。
     * =========================================================== */

    const { fmtSize, bindDropzone, showError, clearBox, download } = PDFApp;

    // ----- 状態 -----
    /** @type {{name:string, kind:'xml'|'xsl'|'other', text?:string, blob?:Blob, fromZip?:string}[]} */
    let files = [];        // 取り込んだファイル一覧 (XML / XSL は text を保持)
    let activeDocIdx = 0;  // 現在表示中の XML インデックス

    // ----- DOM ハンドル -----
    const dz = document.getElementById('dz');
    const fi = document.getElementById('fi');
    const fileListBox = document.getElementById('fileListBox');
    const actionRow = document.getElementById('actionRow');
    const docTabs = document.getElementById('docTabs');
    const previewPane = document.getElementById('previewPane');
    const msg = document.getElementById('msg');

    // ----- ヘルパー -----
    function extOf(name) { return (String(name).match(/\.([^.]+)$/) || [,''])[1].toLowerCase(); }
    function basename(name) { return String(name).split(/[/\\]/).pop(); }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    function classifyByExt(name) {
      const e = extOf(name);
      if (e === 'xml') return 'xml';
      if (e === 'xsl' || e === 'xslt') return 'xsl';
      return 'other';
    }

    // 公文書 XML の <pre> ブロック (機構からのお知らせ 等) は元の帳票で
    // ビジュアル整列するため全角スペースが大量に詰まっており、ブラウザで
    // 折り返した時に「なりま　　　す」のような不自然な改行になる。
    //   1. 句点「。」直後の中黒「・」 → 改行 + 「・」 (箇条書きの行始まり)
    //   2. 全角スペースが 2 つ以上連続してから現れる中黒 → 改行 + 「・」
    //   3. その他の連続する全角スペース (2 つ以上) を撤去
    //   4. 各行末尾の空白を削除
    function cleanNoticeText(text) {
      if (!text) return text;
      let s = String(text);
      // 1) 句点 + 空白 + 中黒 → 句点 + 改行 + 中黒
      s = s.replace(/。[ 　]*・/g, '。\n・');
      // 2) 2 つ以上の空白 + 中黒 → 改行 + 中黒
      s = s.replace(/[ 　]{2,}・/g, '\n・');
      // 3) 残った 2 つ以上の連続全角スペースを削除 (ビジュアル整列のためのパディング)
      s = s.replace(/[ 　]{2,}/g, '');
      // 4) 各行末の空白を整理
      s = s.split('\n').map(l => l.replace(/[ 　]+$/, '')).join('\n');
      return s;
    }

    // ----- ZIP 展開 -----
    async function unpackZip(file) {
      const zip = await JSZip.loadAsync(await file.arrayBuffer());
      const out = [];
      const entries = Object.values(zip.files).filter(e => !e.dir);
      for (const e of entries) {
        const name = basename(e.name); // ZIP内パスから basename のみ
        const kind = classifyByExt(name);
        const lastModified = e.date ? e.date.getTime() : null;
        if (kind === 'xml' || kind === 'xsl') {
          const text = await e.async('text');
          out.push({ name, kind, text, fromZip: file.name, lastModified });
        } else {
          const blob = await e.async('blob');
          out.push({ name, kind: 'other', blob, fromZip: file.name, lastModified });
        }
      }
      return out;
    }

    // ----- 取り込み: ドロップ / ファイル選択 -----
    async function addFiles(fs) {
      clearBox(msg);
      for (const f of fs) {
        const e = extOf(f.name);
        try {
          if (e === 'zip') {
            const entries = await unpackZip(f);
            files.push(...entries);
          } else if (e === 'xml' || e === 'xsl' || e === 'xslt') {
            const text = await f.text();
            files.push({
              name: f.name, kind: classifyByExt(f.name), text,
              lastModified: f.lastModified || null,
            });
          } else {
            files.push({ name: f.name, kind: 'other', blob: f, lastModified: f.lastModified || null });
          }
        } catch (err) {
          showError(msg, `${f.name} の読み込みに失敗: ${err.message || err}`);
        }
      }
      activeDocIdx = 0;
      refreshUI();
    }

    bindDropzone(dz, fi, (fs) => addFiles(fs));

    document.getElementById('clearBtn').addEventListener('click', () => {
      files = [];
      activeDocIdx = 0;
      refreshUI();
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      printActiveDocument();
    });

    // 印刷時は親ページの @media print と layout 干渉を完全に避けるため、
    // XSLT 出力を独立した <iframe srcdoc> ドキュメントに展開して、その
    // iframe.contentWindow.print() でブラウザに印刷させる。iframe には
    // 自前の @page (A4 portrait, 8mm margin) を流し込むので、Edge の
    // print engine が親側 CSS の position:absolute / visibility:hidden を
    // 誤解釈してコンテンツを縮小する事故を回避できる。
    function printActiveDocument() {
      const xmls = files.filter(f => f.kind === 'xml');
      if (xmls.length === 0) return;
      const xmlEntry = xmls[activeDocIdx] || xmls[0];
      const xslEntry = findXslFor(xmlEntry);
      if (!xslEntry) {
        showError(msg, '対応する XSL が見つかりません');
        return;
      }
      let buildResult;
      try {
        buildResult = buildStandaloneHtml(xmlEntry.text, xslEntry.text, xmlEntry);
      } catch (e) {
        showError(msg, '印刷用 HTML の生成に失敗: ' + (e.message || e));
        return;
      }
      // ブラウザの「PDF として保存」ダイアログは iframe の <title> ではなく
      // 親ウィンドウの document.title をデフォルトファイル名に使う。print()
      // を呼ぶ前に親タイトルを差し替え、afterprint で元に戻す。
      const originalTitle = document.title;
      document.title = buildResult.filename;
      const restoreTitle = () => {
        document.title = originalTitle;
        window.removeEventListener('afterprint', restoreTitle);
      };
      window.addEventListener('afterprint', restoreTitle);
      // 念のため一定時間後にも復元 (afterprint が発火しないブラウザ用)
      setTimeout(restoreTitle, 60000);

      const iframe = document.createElement('iframe');
      iframe.setAttribute('aria-hidden', 'true');
      iframe.style.cssText = 'position:fixed; left:-99999px; top:0; width:1024px; height:1500px; border:0; visibility:hidden;';
      iframe.srcdoc = buildResult.html;
      iframe.addEventListener('load', () => {
        setTimeout(() => {
          try {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
          } catch (err) {
            console.warn('iframe print failed, falling back', err);
            window.print();
          }
          setTimeout(() => { try { iframe.remove(); } catch (_) {} }, 8000);
        }, 250);
      });
      document.body.appendChild(iframe);
    }

    // 「PDF として保存」のデフォルトファイル名: 「氏名_YYYYMMDD_書類名」
    //
    //   氏名: XML の 被保険者漢字氏名 / 申請者氏名 / 氏名 / NAME など
    //   YYYYMMDD の優先順位:
    //     1. 資格取得年月日_元号 + _年 + _月 + _日 (和暦 → 西暦変換)
    //     2. 通知年月日 (CDATA 文字列 「令和 8年 4月 6日」をパース)
    //     3. ファイル作成日 (File.lastModified)
    //     4. 到達番号_項目 の左 8 桁 (これ自体が YYYYMMDD で始まる)
    //   書類名: XSLT 出力の <title> / <td class="title"> / XML の <TITLE>

    const ERA_OFFSETS = { M: 1867, T: 1911, S: 1925, H: 1988, R: 2018, '明治': 1867, '大正': 1911, '昭和': 1925, '平成': 1988, '令和': 2018 };
    function pad(s, n) { return String(s).padStart(n, '0'); }
    function ymd8FromEraParts(era, y, m, d) {
      const off = ERA_OFFSETS[String(era).trim()];
      if (!off) return '';
      const yi = parseInt(y, 10), mi = parseInt(m, 10), di = parseInt(d, 10);
      if (!Number.isFinite(yi) || !Number.isFinite(mi) || !Number.isFinite(di)) return '';
      return pad(off + yi, 4) + pad(mi, 2) + pad(di, 2);
    }
    function buildDateString(xd, xmlEntry) {
      const q = (n) => { const e = xd.querySelector(n); return e ? (e.textContent || '').trim() : ''; };
      // 1) 資格取得年月日 (元号 / 年 / 月 / 日)
      const era = q('資格取得年月日_元号');
      if (era) {
        const r = ymd8FromEraParts(era, q('資格取得年月日_年'), q('資格取得年月日_月'), q('資格取得年月日_日'));
        if (r) return r;
      }
      // 2) 通知年月日 (CDATA 「令和 8年 4月 6日」 など)
      const notif = q('通知年月日');
      if (notif) {
        const m = notif.match(/(明治|大正|昭和|平成|令和)?\s*(\d+)\s*年\s*(\d+)\s*月\s*(\d+)\s*日/);
        if (m) {
          const r = ymd8FromEraParts(m[1] || '令和', m[2], m[3], m[4]);
          if (r) return r;
        }
        // 数値表記 (例 "2026/04/06" や "2026-04-06" や "20260406")
        const m2 = notif.match(/(\d{4})\D*(\d{1,2})\D*(\d{1,2})/);
        if (m2) return pad(m2[1], 4) + pad(m2[2], 2) + pad(m2[3], 2);
      }
      // 3) ファイル作成日 (File.lastModified)
      if (xmlEntry && xmlEntry.lastModified) {
        const d = new Date(xmlEntry.lastModified);
        if (!isNaN(d)) {
          return pad(d.getFullYear(), 4) + pad(d.getMonth() + 1, 2) + pad(d.getDate(), 2);
        }
      }
      // 4) 到達番号 左 8 桁
      const arrival = q('到達番号_項目') || q('到達番号');
      if (arrival) {
        const m = arrival.match(/^(\d{8})/);
        if (m) return m[1];
      }
      return '';
    }
    function buildPersonName(xd) {
      const NAME_FIELDS = [
        '被保険者漢字氏名', '被保険者氏名',
        '申請者漢字氏名', '申請者氏名',
        '氏名', 'NAME', 'PersonName',
      ];
      for (const f of NAME_FIELDS) {
        const el = xd.querySelector(f);
        if (el && el.textContent && el.textContent.trim()) {
          return el.textContent.trim();
        }
      }
      return '';
    }
    function buildBookTitle(xd, htmlDoc) {
      if (htmlDoc) {
        const t = htmlDoc.querySelector('title');
        if (t && t.textContent.trim()) return t.textContent.trim();
        const cls = htmlDoc.querySelector('.title, td.title, p.title');
        if (cls && cls.textContent.trim()) return cls.textContent.trim();
      }
      const xt = xd.querySelector('TITLE') || xd.querySelector('title');
      if (xt && xt.textContent.trim()) return xt.textContent.trim();
      return '';
    }
    function safeFilenamePart(s) {
      return String(s || '').replace(/[\\/:*?"<>|]+/g, '').replace(/\s+/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
    }
    function buildDocTitle(xmlText, htmlDoc, xmlEntry) {
      let xd = null;
      try { xd = new DOMParser().parseFromString(xmlText, 'application/xml'); } catch (_) {}
      const person = xd ? buildPersonName(xd) : '';
      const ymd = xd ? buildDateString(xd, xmlEntry) : '';
      const title = xd ? buildBookTitle(xd, htmlDoc) : '';
      const parts = [person, ymd, title].map(safeFilenamePart).filter(Boolean);
      return parts.length ? parts.join('_') : 'document';
    }

    // XSLT を当てて、印刷用に独立した完全な HTML ドキュメント文字列を返す。
    // 戻り値: { html, filename } — html は iframe srcdoc 用、filename は
    // 親ウィンドウの document.title を一時的に差し替える際に使う名前。
    //   1. XSLTProcessor で変換 → fragment
    //   2. <html> ラップを取り出すか、無ければ minimal HTML に包む
    //   3. DOMParser('text/html') を一度通して tbody/tr 等を auto-insertion
    //   4. <table class="outline"> の cellpadding / cellspacing を 0 へ
    //   5. <pre> を <div> へ置換、page-break-after の空 div を撤去
    //   6. <head> に @page A4 + リセット CSS を注入
    //   7. シリアライズして文字列で返す
    function buildStandaloneHtml(xmlText, xslText, xmlEntry) {
      const xmlDoc = new DOMParser().parseFromString(xmlText, 'application/xml');
      if (xmlDoc.querySelector('parsererror')) throw new Error('XML が解釈できませんでした');
      const xslDoc = new DOMParser().parseFromString(xslText, 'application/xml');
      if (xslDoc.querySelector('parsererror')) throw new Error('XSL が解釈できませんでした');
      const proc = new XSLTProcessor();
      proc.importStylesheet(xslDoc);
      let frag;
      try { frag = proc.transformToFragment(xmlDoc, document); }
      catch (e) {
        const out = proc.transformToDocument(xmlDoc);
        frag = document.createDocumentFragment();
        if (out && out.documentElement) frag.appendChild(out.documentElement);
      }
      // 先頭要素を空白を飛ばして取得
      let first = frag.firstChild;
      while (first && first.nodeType !== 1) first = first.nextSibling;

      // raw HTML 文字列を組み立て
      let raw;
      if (first && first.tagName && first.tagName.toUpperCase() === 'HTML') {
        raw = '<!DOCTYPE html>' + new XMLSerializer().serializeToString(first);
      } else {
        // <html> ラップが無い場合 (kagami.xsl のようなフラグメント XSL)
        const div = document.createElement('div');
        div.appendChild(frag);
        raw = '<!DOCTYPE html><html><head></head><body>' + div.innerHTML + '</body></html>';
      }

      // text/html で再パース → tbody/tr auto-insertion 等を効かせる
      const doc = new DOMParser().parseFromString(raw, 'text/html');

      // outline テーブルの padding/spacing を 0 に (XSL の構造的 overflow 救済)
      for (const t of doc.querySelectorAll('table.outline')) {
        t.setAttribute('cellpadding', '0');
        t.setAttribute('cellspacing', '0');
      }
      for (const td of doc.querySelectorAll('td.outline')) {
        td.style.setProperty('padding', '0', 'important');
      }
      // <pre> も <div> に置換 (screen 側と同じ処理) + テキスト整形
      for (const p of doc.querySelectorAll('pre')) {
        const div = doc.createElement('div');
        for (const a of p.attributes) div.setAttribute(a.name, a.value);
        div.textContent = cleanNoticeText(p.textContent || '');
        div.style.setProperty('white-space', 'pre-wrap', 'important');
        div.style.setProperty('overflow-wrap', 'anywhere', 'important');
        div.style.setProperty('word-break', 'break-word', 'important');
        div.style.setProperty('font-family', 'inherit');
        p.replaceWith(div);
      }

      // XSL が <div style="page-break-after:always" /> を空のページ区切りと
      // して挿入してくる (7100001.xsl は kagami と 教示文 の間に挿入)。
      // 元々の意図は次の outline を新ページ送りすることだが、空 div + 改ページ
      // の組合せで Chrome/Edge は 1 ページ余分な空白ページを作ってしまう。
      // 後続の outline テーブルには page-break-inside:avoid + 大きい高さが
      // あるので、本来の改ページ div を撤去しても自然に改ページされる。
      for (const d of doc.querySelectorAll('div[style*="page-break-after"]')) {
        d.remove();
      }
      // 各 outline テーブルの直前に 6mm の空白 div (= 上余白) を挿入する。
      //   - kagami / kyoji それぞれが新ページ起点で同じ上余白を持つようにする
      //     (body padding-top では 1 ページ目しか効かない)
      //   - 2 番目以降の outline 用 spacer には page-break-before:always も
      //     付けて改ページ起点を兼ねる
      const outlines = Array.from(doc.querySelectorAll('table.outline'));
      for (let i = 0; i < outlines.length; i++) {
        const t = outlines[i];
        const spacer = doc.createElement('div');
        spacer.style.height = '6mm';
        if (i > 0) {
          spacer.style.setProperty('page-break-before', 'always');
          spacer.style.setProperty('break-before', 'page');
        }
        t.parentNode.insertBefore(spacer, t);
      }

      // ===== ファイル名のデフォルト =====
      const filename = buildDocTitle(xmlText, doc, xmlEntry);
      let titleEl = doc.querySelector('title');
      if (!titleEl) {
        titleEl = doc.createElement('title');
        (doc.head || doc.documentElement).appendChild(titleEl);
      }
      titleEl.textContent = filename;

      // @page + 印刷用リセット CSS を head に注入。
      //   - margin: 3mm (本物の e-Gov 帳票に近い)
      //   - body { zoom: 1.10 } で 640×940px の outline を A4 に近く拡大
      //   - page-break-inside:avoid は table.outline 限定 (外側の
      //     <table width="100%"> ラッパーに掛けると、ブラウザが全 outline を
      //     1 ページに収めようとして余分な空白ページを挿入する)。
      //   - 上余白は body padding-top ではなく outline 直前の spacer div で
      //     入れる (上で挿入済み) ─ そうしないと kyoji 側 (2 ページ目) に
      //     上余白が乗らない。
      const inject = doc.createElement('style');
      inject.textContent = `
        @page { size: A4 portrait; margin: 3mm; }
        html, body { margin: 0 !important; padding: 0 !important; background: #fff; }
        body { zoom: 1.10; }
        table.outline { page-break-inside: avoid; }
      `;
      (doc.head || doc.documentElement).appendChild(inject);

      return {
        html: '<!DOCTYPE html>' + doc.documentElement.outerHTML,
        filename,
      };
    }

    // ----- XSLT 適用 -----
    // XSL を XML に適用し、結果をスタイル隔離された <div> (Shadow DOM 持ち) として返す。
    function applyXslt(xmlText, xslText) {
      const xmlDoc = new DOMParser().parseFromString(xmlText, 'application/xml');
      if (xmlDoc.querySelector('parsererror')) throw new Error('XML が解釈できませんでした');
      const xslDoc = new DOMParser().parseFromString(xslText, 'application/xml');
      if (xslDoc.querySelector('parsererror')) throw new Error('XSL が解釈できませんでした');
      const proc = new XSLTProcessor();
      proc.importStylesheet(xslDoc);
      let frag;
      try {
        frag = proc.transformToFragment(xmlDoc, document);
      } catch (e) {
        const out = proc.transformToDocument(xmlDoc);
        frag = document.createDocumentFragment();
        if (out && out.documentElement) frag.appendChild(out.documentElement);
      }

      // 先頭の空白テキストノードを飛ばして最初の Element を探す。
      // <xsl:output method="html" indent="yes"> 時は <html> の前に空白が
      // 入ることがあり、firstChild だと拾ってしまう。
      let first = frag.firstChild;
      while (first && first.nodeType !== 1) first = first.nextSibling;

      const host = document.createElement('div');
      host.className = 'xslt-host';
      const shadow = host.attachShadow({ mode: 'open' });

      const isHtmlWrap = first && first.tagName && first.tagName.toUpperCase() === 'HTML';
      if (isHtmlWrap) {
        // case-insensitive で head / body を取り出す
        let head = null, body = null;
        for (const c of first.childNodes) {
          if (c.nodeType !== 1) continue;
          const n = (c.nodeName || '').toUpperCase();
          if (n === 'HEAD' && !head) head = c;
          else if (n === 'BODY' && !body) body = c;
        }

        // <head> 内の <style> / <link> を Shadow Root に持ち込み
        if (head) {
          for (const c of head.childNodes) {
            if (c.nodeType !== 1) continue;
            const n = (c.nodeName || '').toUpperCase();
            if (n === 'STYLE' || n === 'LINK') shadow.appendChild(c.cloneNode(true));
          }
        }

        // <body> の中身を DOMParser('text/html') で再パースして
        // tbody/tr などの auto-insertion を効かせる。
        // XSLTProcessor は API ベースで DOM を組むため、<table><td>...
        // のように <tr> 省略があると HTML パーサーの自動挿入が走らず、
        // 結果テーブルが崩れる。'text/html' で文字列からパースし直すと
        // 外部ファイル読み込みと同じ経路を通るので確実に直る。
        if (body) {
          let innerSrc;
          try { innerSrc = body.innerHTML; }
          catch (_) { innerSrc = new XMLSerializer().serializeToString(body); }
          const reparsed = new DOMParser().parseFromString(
            '<!DOCTYPE html><html><body>' + innerSrc + '</body></html>',
            'text/html'
          );
          const wrap = document.createElement('body');
          if (body.getAttribute('style')) wrap.setAttribute('style', body.getAttribute('style'));
          while (reparsed.body.firstChild) wrap.appendChild(reparsed.body.firstChild);

          // outline テーブルの cellpadding=20 / 22 は内側 640px テーブルを
          // overflow させるので DOM レベルで 0 に書き換える (CSS の
          // !important より確実)。
          for (const t of wrap.querySelectorAll('table.outline')) {
            t.setAttribute('cellpadding', '0');
            t.setAttribute('cellspacing', '0');
          }
          for (const td of wrap.querySelectorAll('td.outline')) {
            td.style.setProperty('padding', '0', 'important');
          }
          // <pre> の white-space:pre (UA 既定) は line-break:anywhere や
          // overflow-wrap:break-word を無効化してしまうため、テキストが
          // 右側にあふれる。Shadow 内 <style> の override が効かない
          // ブラウザ挙動への一番確実な対処は、要素そのものを <div> に
          // 置換して UA 既定の影響を完全に外すこと。class や中身は維持。
          // 同時に、原本帳票が視覚整列のために大量に挿入した全角スペースも
          // ここで詰めて、不自然な折り返しを消す。
          for (const p of wrap.querySelectorAll('pre')) {
            const div = document.createElement('div');
            for (const a of p.attributes) div.setAttribute(a.name, a.value);
            div.textContent = cleanNoticeText(p.textContent || '');
            div.style.setProperty('white-space', 'pre-wrap', 'important');
            div.style.setProperty('overflow-wrap', 'anywhere', 'important');
            div.style.setProperty('word-break', 'break-word', 'important');
            div.style.setProperty('font-family', 'inherit');
            p.replaceWith(div);
          }
          shadow.appendChild(wrap);
        }

        // Shadow 内の基本リセット
        // 公文書 XSL は <pre class="oshirase"> のような長文ブロックを
        // 「白抜き枠の中に詰める」が、デフォルトの <pre> は white-space:pre で
        // 一切折り返さない。XSL 側は line-break:anywhere / overflow-wrap:break-word
        // を当てているが、white-space:pre が優先されてしまうため右側にあふれる。
        // → pre-wrap で「空白は保ちつつ折り返す」挙動に上書きして救済する。
        const reset = document.createElement('style');
        reset.textContent = `
          html, body { margin: 0 !important; padding: 0 !important; background: transparent !important; }
          pre { white-space: pre-wrap !important; overflow-wrap: anywhere; word-break: break-word; }
          @media print {
            html, body { margin: 0 !important; padding: 0 !important; }
            table { page-break-inside: avoid; }
          }
        `;
        shadow.appendChild(reset);
      } else {
        // <html> ラップが無い出力 (kagami.xsl のような簡素な XSL) は
        // フラグメントをそのまま Shadow に投入。XSL のクラスベース CSS が
        // 無い前提なので、ホスト側で見やすい基本スタイルを当てる。
        const baseStyle = document.createElement('style');
        baseStyle.textContent = `
          :host { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
          p { margin: 0.4em 0; line-height: 1.7; }
          p[align="right"], p[align="RIGHT"] { text-align: right; }
          p[align="center"], p[align="CENTER"] { text-align: center; }
          p[align="left"], p[align="LEFT"] { text-align: left; }
          h1, h2, h3, h4 { line-height: 1.3; }
        `;
        shadow.appendChild(baseStyle);
        shadow.appendChild(frag);
      }

      return host;
    }

    // ----- ファイル一覧の表示 + ペアリング判定 -----
    function findXslFor(xmlEntry) {
      // 1) <?xml-stylesheet href="..."?> を見て href を取り出す
      let hrefBase = null;
      const m = String(xmlEntry.text).match(/<\?xml-stylesheet[^?]*href=["']([^"']+)["']/);
      if (m) hrefBase = basename(m[1]);
      // 2) その basename と一致する XSL を files から探す
      if (hrefBase) {
        const exact = files.find(f => f.kind === 'xsl' && f.name === hrefBase);
        if (exact) return exact;
      }
      // 3) フォールバック: XML と同じ basename (拡張子違い) を探す
      const xmlBase = xmlEntry.name.replace(/\.xml$/i, '');
      const sameName = files.find(f => f.kind === 'xsl' && f.name.replace(/\.xsl[tx]?$/i, '') === xmlBase);
      if (sameName) return sameName;
      // 4) 最後の保険: XSL がただ 1 つだけならそれを使う
      const xsls = files.filter(f => f.kind === 'xsl');
      if (xsls.length === 1) return xsls[0];
      return null;
    }

    function renderFileList() {
      if (files.length === 0) {
        fileListBox.innerHTML = '';
        return;
      }
      const xmls = files.filter(f => f.kind === 'xml');
      const xsls = files.filter(f => f.kind === 'xsl');
      const others = files.filter(f => f.kind === 'other');
      const rows = [];
      // XML 行 (ペア相手 / 添付の状態を併記)
      for (const f of xmls) {
        const xsl = findXslFor(f);
        const sub = xsl
          ? `<span class="pair">↔ <b>${escapeHtml(xsl.name)}</b></span>`
          : `<span class="badge">XSL 未検出</span>`;
        rows.push(`<div class="fileitem" data-name="${escapeHtml(f.name)}">
          <span class="kind xml">XML</span>
          <span class="name">${escapeHtml(f.name)}</span>
          ${sub}
        </div>`);
      }
      // 単独 XSL (まだ XML にペアされていないもの) も表示
      const usedXslNames = new Set(xmls.map(x => (findXslFor(x) || {}).name).filter(Boolean));
      for (const f of xsls) {
        if (usedXslNames.has(f.name)) continue;
        rows.push(`<div class="fileitem">
          <span class="kind xsl">XSL</span>
          <span class="name">${escapeHtml(f.name)}</span>
          <span class="pair">(待機中)</span>
        </div>`);
      }
      // 添付資料 (PDF/JPG/PNG など)
      for (const f of others) {
        const size = f.blob ? fmtSize(f.blob.size) : '';
        rows.push(`<div class="fileitem" data-attached="${escapeHtml(f.name)}">
          <span class="kind attached">添付</span>
          <span class="name">${escapeHtml(f.name)}</span>
          <span class="size">${size}</span>
          <button class="download-btn" data-dl="${escapeHtml(f.name)}">⬇ DL</button>
        </div>`);
      }
      fileListBox.innerHTML = '<div class="filelist">' + rows.join('') + '</div>';
      // ダウンロードボタンの配線
      fileListBox.querySelectorAll('[data-dl]').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          const name = ev.currentTarget.getAttribute('data-dl');
          const f = files.find(x => x.kind === 'other' && x.name === name);
          if (f && f.blob) download(f.blob, name);
        });
      });
    }

    function renderTabs() {
      const xmls = files.filter(f => f.kind === 'xml');
      if (xmls.length <= 1) {
        docTabs.innerHTML = '';
        return;
      }
      docTabs.innerHTML = xmls.map((f, i) =>
        `<div class="doc-tab ${i === activeDocIdx ? 'active' : ''}" data-idx="${i}">${escapeHtml(f.name)}</div>`
      ).join('');
      docTabs.querySelectorAll('.doc-tab').forEach(t => {
        t.addEventListener('click', () => {
          activeDocIdx = parseInt(t.dataset.idx, 10);
          refreshUI();
        });
      });
    }

    function renderPreview() {
      previewPane.innerHTML = '';
      const xmls = files.filter(f => f.kind === 'xml');
      if (xmls.length === 0) {
        previewPane.innerHTML = '<div class="empty-state">ここにプレビューが表示されます。<br><b>XML + XSL</b> (または ZIP) をドロップしてください。</div>';
        return;
      }
      const xmlEntry = xmls[activeDocIdx] || xmls[0];
      const xslEntry = findXslFor(xmlEntry);
      if (!xslEntry) {
        previewPane.innerHTML = `<div class="empty-state">
          <b>${escapeHtml(xmlEntry.name)}</b> に対応する XSL ファイルが見つかりません。<br>
          公文書 ZIP には通常 同名の .xsl が同梱されています。`
          + (files.some(f => f.kind === 'xsl')
              ? `<br>(現在登録されている XSL: ${files.filter(f => f.kind === 'xsl').map(f => escapeHtml(f.name)).join(', ')})`
              : `<br>該当する .xsl もドロップしてください。`)
          + `</div>`;
        return;
      }
      try {
        const host = applyXslt(xmlEntry.text, xslEntry.text);
        previewPane.appendChild(host);
      } catch (e) {
        previewPane.innerHTML = `<div class="empty-state" style="color:#b91c1c;">変換失敗: ${escapeHtml(e.message || String(e))}</div>`;
      }
    }

    function refreshUI() {
      const xmls = files.filter(f => f.kind === 'xml');
      actionRow.style.display = (files.length > 0) ? '' : 'none';
      document.getElementById('printBtn').disabled = (xmls.length === 0);
      renderFileList();
      renderTabs();
      renderPreview();
    }

    // 起動時 — 空状態を表示
    refreshUI();
  </script>
</body>
</html>
