<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>画像文字抽出 (OCR) | PDFツール</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    .ocr-output {
      width: 100%;
      min-height: 240px;
      max-height: 480px;
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #0f172a;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      -webkit-appearance: none;
    }
    .ocr-output:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }
    .stats { font-size: 0.78rem; color: #64748b; margin-top: 0.4rem; }
  </style>
</head>
<body>
  <header class="site">
    <div class="brand">
      <a class="back-btn" href="../" aria-label="戻る">←</a>
      <div class="logo">TR</div>
      <div class="brand-name">📝 画像文字抽出 (OCR)</div>
    </div>
  </header>

  <main class="container">
    <div class="dropzone" id="dz">
      <input type="file" id="fi" accept="image/*,application/pdf" hidden />
      <div class="icon">📝</div>
      <p><b>タップして画像またはPDFを選択</b></p>
      <p class="sub">JPG / PNG / WebP / HEIC / PDF (スキャンしただけのテキストなしPDFもOK)</p>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <div class="file-item">
        <span class="name" id="srcName"></span>
        <span class="size" id="srcSize"></span>
      </div>
      <div class="field">
        <label>言語</label>
        <div class="radio-row">
          <label><input type="radio" name="lang" value="jpn+eng" checked><span>🇯🇵🇺🇸 日本語+英語 (推奨)</span></label>
          <label><input type="radio" name="lang" value="jpn"><span>🇯🇵 日本語のみ</span></label>
          <label><input type="radio" name="lang" value="eng"><span>🇺🇸 英語のみ</span></label>
        </div>
      </div>
      <div class="field">
        <label>抽出モード</label>
        <div class="radio-row">
          <label><input type="radio" name="psm" value="6" checked><span>📄 標準 (段落)</span></label>
          <label><input type="radio" name="psm" value="3"><span>🔍 自動検出</span></label>
          <label><input type="radio" name="psm" value="11"><span>🧩 散らばった文字</span></label>
        </div>
      </div>
      <button class="btn-primary" id="run">🔎 文字を抽出</button>
      <button class="btn-secondary" id="clear">別のファイルを選ぶ</button>
      <div class="progress" id="prog" style="display:none;">
        <span id="progText">準備中...</span>
        <div class="progress-bar"><span id="progBar" style="width:0%"></span></div>
      </div>
    </div>

    <div id="msg"></div>

    <div id="resultArea" style="display:none;margin-top:1rem;">
      <div class="field">
        <label for="ocrText">📝 抽出結果 <span id="stats" class="stats"></span></label>
        <textarea id="ocrText" class="ocr-output" spellcheck="false"></textarea>
      </div>
      <div class="field">
        <label for="outName">保存ファイル名</label>
        <input type="text" id="outName" value="extracted" />
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button class="btn-primary" id="copyBtn" style="flex:1;min-width:140px;">📋 クリップボードにコピー</button>
        <button class="btn-secondary" id="saveBtn" style="flex:1;min-width:140px;">💾 TXTで保存</button>
      </div>
    </div>

    <p class="info-hint" style="margin-top:1rem;">
      初回のみ OCRエンジン (Tesseract) と言語データ (約8MB / 言語) のダウンロードが発生します。<br>
      手書きや極端にぼやけた文字は抽出精度が落ちます。スキャン解像度は 200dpi 以上を推奨。
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
  <script src="../shared.js"></script>
  <script>
    const { fmtSize, download, safeFilename, bindDropzone, showError, clearBox, setupPdfJs } = PDFApp;
    setupPdfJs();

    // ====== OpenCV + jscanify loader (mirrored from images-to-pdf) ======
    // Lazy: nothing loads until the user actually opts in to OCR pre-prep.
    let cvReady = null;
    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = res; s.onerror = () => rej(new Error('script load failed: ' + src));
        document.head.appendChild(s);
      });
    }
    async function downloadForProgress(url, onProgress) {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) throw new Error('fetch failed ' + res.status + ' ' + url);
      const total = parseInt(res.headers.get('Content-Length'), 10) || 0;
      const reader = res.body && res.body.getReader ? res.body.getReader() : null;
      if (!reader) { await res.arrayBuffer(); if (onProgress) onProgress(1); return; }
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.byteLength;
        if (onProgress && total > 0) onProgress(Math.min(1, received / total));
      }
      if (onProgress) onProgress(1);
    }
    async function loadCvScript(onProgress) {
      const urls = [
        '../images-to-pdf/opencv.js',                                        // local mirror committed under images-to-pdf
        'https://docs.opencv.org/4.10.0/opencv.js',
        'https://docs.opencv.org/4.5.0/opencv.js',
        'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js',
      ];
      let lastErr = null;
      for (const url of urls) {
        const prevModule = window.Module;
        try {
          await downloadForProgress(url, onProgress);
          const initialized = new Promise((res) => {
            window.Module = Object.assign({}, prevModule || {}, {
              onRuntimeInitialized() { res(); },
            });
          });
          await loadScript(url);
          if (onProgress) onProgress(1);
          await Promise.race([
            initialized,
            new Promise((res) => {
              const t = setInterval(() => {
                if (typeof cv !== 'undefined' && cv && cv.Mat) { clearInterval(t); res(); }
              }, 100);
            }),
            new Promise((_, rej) => setTimeout(
              () => rej(new Error('OpenCV initialization timed out (60s)')),
              60000
            )),
          ]);
          if (typeof cv !== 'undefined' && !cv.Mat) {
            if (typeof cv === 'function') {
              const m = await cv();
              if (m && m.Mat) window.cv = m;
            } else if (typeof cv === 'object' && cv && typeof cv.then === 'function') {
              const m = await cv;
              if (m && m.Mat) window.cv = m;
            }
          }
          window.Module = prevModule;
          if (typeof cv === 'undefined' || !cv.Mat) throw new Error('cv.Mat missing');
          return;
        } catch (e) {
          window.Module = prevModule;
          lastErr = e;
          if (onProgress) onProgress(0);
        }
      }
      throw lastErr || new Error('all opencv.js URLs failed');
    }
    async function loadJscanify() {
      if (typeof jscanify !== 'undefined') return;
      const urls = [
        '../images-to-pdf/jscanify.js',
        'https://cdn.jsdelivr.net/npm/jscanify@1.2.0/src/jscanify.js',
        'https://cdn.jsdelivr.net/npm/jscanify@1.2.0',
        'https://unpkg.com/jscanify@1.2.0/src/jscanify.js',
      ];
      let lastErr = null;
      for (const url of urls) {
        try { await loadScript(url); if (typeof jscanify !== 'undefined') return; }
        catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('jscanify load failed');
    }
    async function ensureCv(onProgress) {
      if (cvReady) return cvReady;
      cvReady = (async () => {
        await loadCvScript(onProgress);
        await loadJscanify();
      })();
      return cvReady;
    }

    // ====== OCR pre-pass: rectify + grayscale + CLAHE + unsharp ======
    // Returns a NEW canvas optimized for Tesseract:
    //   - if a paper outline is detected, perspective-corrects to A4
    //     (auto-orientation by detected quad);
    //   - otherwise keeps the source canvas geometry;
    //   - converts to grayscale (Tesseract works on luminance anyway —
    //     dropping the colour channels speeds up internal binarisation);
    //   - CLAHE on the gray channel lifts faint or unevenly-lit text;
    //   - mild unsharp tightens stroke edges so character classification
    //     has cleaner inputs.
    // We deliberately DON'T binarise here — Tesseract has its own Otsu
    // pass and handing it pre-binarised input often loses anti-aliased
    // strokes that would have classified correctly in grayscale.
    function rectifyCanvasIfPossible(srcCanvas) {
      let src = null, contour = null;
      try {
        const scanner = new jscanify();
        src = cv.imread(srcCanvas);
        contour = scanner.findPaperContour(src);
        if (!contour || (typeof contour.empty === 'function' && contour.empty())) return null;
        const corners = scanner.getCornerPoints(contour);
        if (!corners) return null;
        const tl = corners.topLeftCorner, tr = corners.topRightCorner;
        const bl = corners.bottomLeftCorner, br = corners.bottomRightCorner;
        if (!tl || !tr || !bl || !br) return null;
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        const w = Math.max(dist(tl, tr), dist(bl, br));
        const h = Math.max(dist(tl, bl), dist(tr, br));
        if (!isFinite(w) || !isFinite(h) || w < 50 || h < 50) return null;
        const W = srcCanvas.width, H = srcCanvas.height;
        const imgArea = W * H;
        const detectedArea = w * h;
        if (imgArea > 0) {
          if (detectedArea > imgArea * 0.97) return null;   // jscanify fell back to image bounds
          if (detectedArea < imgArea * 0.05) return null;   // tiny noise
        }
        // Same expansion + bleed-then-crop pipeline as images-to-pdf so
        // the rectified canvas matches what the user sees in that tool.
        const A4_LONG = 1754, A4_SHORT = 1240;
        const isLandscape = w > h;
        const outW = isLandscape ? A4_LONG : A4_SHORT;
        const outH = isLandscape ? A4_SHORT : A4_LONG;
        const cx = (tl.x + tr.x + br.x + bl.x) / 4;
        const cy = (tl.y + tr.y + br.y + bl.y) / 4;
        const PAD = 1.025;
        const expand = (p) => ({
          x: Math.max(0, Math.min(W - 1, cx + (p.x - cx) * PAD)),
          y: Math.max(0, Math.min(H - 1, cy + (p.y - cy) * PAD)),
        });
        const expanded = {
          topLeftCorner: expand(tl), topRightCorner: expand(tr),
          bottomRightCorner: expand(br), bottomLeftCorner: expand(bl),
        };
        const BLEED = 1.06;
        const warpW = Math.round(outW * BLEED), warpH = Math.round(outH * BLEED);
        const oversized = scanner.extractPaper(srcCanvas, warpW, warpH, expanded);
        if (!oversized) return null;
        const cropped = document.createElement('canvas');
        cropped.width = outW; cropped.height = outH;
        const cropX = Math.round((warpW - outW) / 2);
        const cropY = Math.round((warpH - outH) / 2);
        cropped.getContext('2d').drawImage(oversized, cropX, cropY, outW, outH, 0, 0, outW, outH);
        return cropped;
      } catch (e) {
        console.warn('rectify failed', e);
        return null;
      } finally {
        if (src && typeof src.delete === 'function') { try { src.delete(); } catch (_) {} }
        if (contour && typeof contour.delete === 'function') { try { contour.delete(); } catch (_) {} }
      }
    }
    function enhanceForOcrInPlace(canvas) {
      let src = null, gray = null, blur = null, clahe = null, rgba = null;
      try {
        src = cv.imread(canvas);
        gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        if (typeof cv.CLAHE === 'function') {
          clahe = new cv.CLAHE(2.5, new cv.Size(8, 8));   // a bit stronger than print mode — Tesseract benefits from sharper local contrast
          clahe.apply(gray, gray);
        }
        blur = new cv.Mat();
        cv.GaussianBlur(gray, blur, new cv.Size(0, 0), 1.4);
        cv.addWeighted(gray, 1.7, blur, -0.7, 0, gray);   // amount 0.7 — borderline halo but Tesseract is tolerant on greyscale
        rgba = new cv.Mat();
        cv.cvtColor(gray, rgba, cv.COLOR_GRAY2RGBA);
        cv.imshow(canvas, rgba);
      } catch (e) {
        console.warn('enhanceForOcr failed', e);
      } finally {
        if (src)   try { src.delete(); }   catch (_) {}
        if (gray)  try { gray.delete(); }  catch (_) {}
        if (blur)  try { blur.delete(); }  catch (_) {}
        if (clahe) try { clahe.delete(); } catch (_) {}
        if (rgba)  try { rgba.delete(); }  catch (_) {}
      }
    }
    async function prepareForOcr(srcCanvas) {
      const rect = rectifyCanvasIfPossible(srcCanvas);
      const target = rect || srcCanvas;
      enhanceForOcrInPlace(target);
      return target;
    }

    // ========================================================================
    // PaddleOCR via ONNX Runtime Web. Optional — runs only if the local
    // model files are committed under ./paddle-ocr-*.onnx + ./paddle-ocr-dict
    // .txt (see update-paddle-ocr.sh in this folder for fetch instructions).
    // When present, every page is OCR'd by Paddle on BOTH the raw and the
    // rectified canvas; results are merged with the Tesseract output by
    // mean-confidence and the winning text per page is what the user sees.
    //
    // Implementation overview:
    //   - PP-OCRv4 mobile pipeline: detection (DBNet) → recognition (CRNN+CTC).
    //   - Detection input  [1,3,H,W] (H,W multiples of 32, capped at 960)
    //               output [1,1,H,W] sigmoid probability map. We threshold,
    //               run cv.findContours, fit min-area boxes, project boxes
    //               back to source coords.
    //   - Recognition input [1,3,48,W] (W rounded up to multiple of 8)
    //                output [1,T,C] softmax. Argmax per timestep, collapse
    //                repeats, drop blanks (idx 0), look up via dict.
    //   - The dict is a UTF-8 line-per-char file. Token 0 is reserved blank.
    // ========================================================================
    let ortReady = null;
    async function ensureOrt() {
      if (ortReady) return ortReady;
      ortReady = (async () => {
        if (typeof ort === 'undefined') {
          // Try same-origin first (won't usually exist), then jsdelivr.
          try {
            await loadScript('./onnxruntime-web.min.js');
          } catch (_) {
            await loadScript('https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js');
          }
        }
        // Tell ORT where to find its own .wasm files (some hosts misroute).
        try {
          ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/';
        } catch (_) {}
      })();
      return ortReady;
    }

    let paddleState = { det: null, rec: null, dict: null, error: null };
    async function ensurePaddle(onProgress) {
      if (paddleState.det && paddleState.rec && paddleState.dict) return paddleState;
      if (paddleState.error) throw paddleState.error;
      await ensureOrt();
      try {
        if (!paddleState.dict) {
          const dictRes = await fetch('./paddle-ocr-dict.txt');
          if (!dictRes.ok) throw new Error('paddle-ocr-dict.txt not found (run ./update-paddle-ocr.sh)');
          const text = await dictRes.text();
          // Token 0 is the CTC blank — prepend an empty placeholder so dict
          // index 1 maps to the first real char (PaddleOCR convention).
          paddleState.dict = ['<blank>', ...text.split(/\r?\n/).filter(s => s.length > 0)];
        }
        if (!paddleState.det) {
          if (onProgress) onProgress(0, 'PaddleOCR 検出モデル読み込み中…');
          paddleState.det = await ort.InferenceSession.create('./paddle-ocr-det.onnx', {
            executionProviders: ['wasm'],
            graphOptimizationLevel: 'all',
          });
        }
        if (!paddleState.rec) {
          if (onProgress) onProgress(0.5, 'PaddleOCR 認識モデル読み込み中…');
          paddleState.rec = await ort.InferenceSession.create('./paddle-ocr-rec.onnx', {
            executionProviders: ['wasm'],
            graphOptimizationLevel: 'all',
          });
        }
        if (onProgress) onProgress(1, 'PaddleOCR 起動完了');
        return paddleState;
      } catch (e) {
        paddleState.error = e;
        throw e;
      }
    }

    // Convert a canvas / drawable to a Float32 NCHW tensor at (outW, outH)
    // with ImageNet-style normalisation (mean [0.485,0.456,0.406], std
    // [0.229,0.224,0.225]). PaddleOCR's training pipeline used this exact
    // normalisation so anything else degrades both det and rec accuracy.
    function canvasToOcrTensor(srcCanvas, outW, outH) {
      const off = document.createElement('canvas');
      off.width = outW; off.height = outH;
      const ctx = off.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, outW, outH);
      ctx.drawImage(srcCanvas, 0, 0, outW, outH);
      const imgData = ctx.getImageData(0, 0, outW, outH).data;
      const N = outW * outH;
      const data = new Float32Array(3 * N);
      const m = [0.485, 0.456, 0.406], s = [0.229, 0.224, 0.225];
      // CHW layout: plane 0 = R, plane 1 = G, plane 2 = B
      for (let i = 0; i < N; i++) {
        const r = imgData[i * 4]     / 255;
        const g = imgData[i * 4 + 1] / 255;
        const b = imgData[i * 4 + 2] / 255;
        data[i]         = (r - m[0]) / s[0];
        data[N + i]     = (g - m[1]) / s[1];
        data[2 * N + i] = (b - m[2]) / s[2];
      }
      return new ort.Tensor('float32', data, [1, 3, outH, outW]);
    }

    // Run DBNet detection. Returns an array of axis-aligned source-coord
    // bboxes [{x0,y0,x1,y1}, ...]. Uses cv.findContours on the binarised
    // probability map — we already have OpenCV loaded for rectify so we
    // don't need a separate CV impl.
    async function paddleDetect(srcCanvas) {
      const session = paddleState.det;
      const inputName = session.inputNames[0];
      const outputName = session.outputNames[0];
      // Resize so max side ≤ 960 and both dims are multiples of 32.
      const MAX_SIDE = 960;
      let scale = 1;
      const longest = Math.max(srcCanvas.width, srcCanvas.height);
      if (longest > MAX_SIDE) scale = MAX_SIDE / longest;
      const round32 = (x) => Math.max(32, Math.round(x / 32) * 32);
      const inW = round32(srcCanvas.width  * scale);
      const inH = round32(srcCanvas.height * scale);
      const tensor = canvasToOcrTensor(srcCanvas, inW, inH);
      const result = await session.run({ [inputName]: tensor });
      const probMap = result[outputName];           // [1, 1, inH, inW]
      const data = probMap.data;                    // Float32Array
      // Binarise + find contours via OpenCV.
      let mask = null, contours = null, hierarchy = null;
      const boxes = [];
      try {
        mask = new cv.Mat(inH, inW, cv.CV_8UC1);
        for (let i = 0; i < inH * inW; i++) {
          mask.data[i] = data[i] > 0.30 ? 255 : 0;
        }
        contours = new cv.MatVector();
        hierarchy = new cv.Mat();
        cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        const sx = srcCanvas.width  / inW;
        const sy = srcCanvas.height / inH;
        const MIN_BOX_PX = 8;          // drop noise specks
        for (let i = 0; i < contours.size(); i++) {
          const c = contours.get(i);
          const r = cv.boundingRect(c);
          c.delete();
          if (r.width < MIN_BOX_PX || r.height < MIN_BOX_PX) continue;
          // Pad ~3 px around each box (in inference coords) before
          // projecting back, otherwise rec sometimes clips ascenders /
          // descenders.
          const pad = 3;
          const x0 = Math.max(0, (r.x - pad) * sx);
          const y0 = Math.max(0, (r.y - pad) * sy);
          const x1 = Math.min(srcCanvas.width,  (r.x + r.width  + pad) * sx);
          const y1 = Math.min(srcCanvas.height, (r.y + r.height + pad) * sy);
          if (x1 - x0 < 4 || y1 - y0 < 4) continue;
          boxes.push({ x0, y0, x1, y1 });
        }
        // Sort top-to-bottom then left-to-right so the output reads in
        // natural document order.
        boxes.sort((a, b) => {
          if (Math.abs(a.y0 - b.y0) > 8) return a.y0 - b.y0;
          return a.x0 - b.x0;
        });
      } finally {
        if (mask)      try { mask.delete(); }      catch (_) {}
        if (contours)  try { contours.delete(); }  catch (_) {}
        if (hierarchy) try { hierarchy.delete(); } catch (_) {}
      }
      return boxes;
    }

    // Crop a region of a source canvas, scale to (outW, outH), return the
    // resulting canvas. Used to feed a single text region to the rec model.
    function cropToCanvas(srcCanvas, x0, y0, x1, y1, outW, outH) {
      const out = document.createElement('canvas');
      out.width = outW; out.height = outH;
      const ctx = out.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, outW, outH);
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(srcCanvas, x0, y0, x1 - x0, y1 - y0, 0, 0, outW, outH);
      return out;
    }

    // CTC decode a [T, C] log-prob (or prob) buffer: per timestep argmax,
    // skip blanks (token 0 in our dict), collapse consecutive repeats.
    // Returns { text, conf } where conf is the mean of selected timestep
    // probabilities (a noisy proxy for line confidence — good enough for
    // mean-confidence merging across engines).
    function ctcDecode(buf, dims, dict) {
      // dims is typically [1, T, C] or [T, C]
      let T, C;
      if (dims.length === 3) { T = dims[1]; C = dims[2]; }
      else                   { T = dims[0]; C = dims[1]; }
      const indices = [];
      const confs = [];
      let last = -1;
      for (let t = 0; t < T; t++) {
        let bestIdx = 0, bestVal = -Infinity;
        for (let c = 0; c < C; c++) {
          const v = buf[t * C + c];
          if (v > bestVal) { bestVal = v; bestIdx = c; }
        }
        if (bestIdx !== 0 && bestIdx !== last) {
          indices.push(bestIdx);
          confs.push(bestVal);
        }
        last = bestIdx;
      }
      const chars = indices.map(i => (dict[i] != null ? dict[i] : '')).join('');
      const meanConf = confs.length ? confs.reduce((a, b) => a + b, 0) / confs.length : 0;
      return { text: chars, conf: meanConf };
    }

    // Recognition pass on a list of bbox crops. Returns { text, meanConf }.
    async function paddleRecognize(srcCanvas, boxes) {
      const session = paddleState.rec;
      const inputName = session.inputNames[0];
      const outputName = session.outputNames[0];
      const lines = [];
      const allConf = [];
      const REC_H = 48;
      const REC_W_MAX = 320;
      for (const box of boxes) {
        const w = box.x1 - box.x0, h = box.y1 - box.y0;
        const aspect = w / h;
        let recW = Math.ceil(REC_H * aspect / 8) * 8;
        if (recW > REC_W_MAX) recW = REC_W_MAX;
        if (recW < 16) recW = 16;
        const crop = cropToCanvas(srcCanvas, box.x0, box.y0, box.x1, box.y1, recW, REC_H);
        const tensor = canvasToOcrTensor(crop, recW, REC_H);
        try {
          const out = await session.run({ [inputName]: tensor });
          const probs = out[outputName];
          const decoded = ctcDecode(probs.data, probs.dims, paddleState.dict);
          if (decoded.text) {
            lines.push(decoded.text);
            allConf.push(decoded.conf);
          }
        } catch (e) { /* skip box on error */ }
      }
      // Convert PaddleOCR conf (0..1 ish probability) to 0..100 to match
      // Tesseract's scale so the merge step compares apples to apples.
      const meanConf = allConf.length
        ? (allConf.reduce((a, b) => a + b, 0) / allConf.length) * 100
        : 0;
      return { text: cleanupOcrText(lines.join('\n')), meanConf, corrections: 0 };
    }

    async function paddleOcrCanvas(canvas) {
      const boxes = await paddleDetect(canvas);
      if (!boxes.length) return { text: '', meanConf: 0, corrections: 0 };
      return paddleRecognize(canvas, boxes);
    }

    const dz = document.getElementById('dz');
    const fi = document.getElementById('fi');
    const controls = document.getElementById('controls');
    const srcName = document.getElementById('srcName');
    const srcSize = document.getElementById('srcSize');
    const msg = document.getElementById('msg');
    const prog = document.getElementById('prog');
    const progText = document.getElementById('progText');
    const progBar = document.getElementById('progBar');
    const resultArea = document.getElementById('resultArea');
    const ocrText = document.getElementById('ocrText');
    const outName = document.getElementById('outName');
    const stats = document.getElementById('stats');

    let currentFile = null;

    bindDropzone(dz, fi, async (fs) => {
      const f = fs[0]; if (!f) return;
      currentFile = f;
      srcName.textContent = f.name;
      srcSize.textContent = fmtSize(f.size);
      const baseName = f.name.replace(/\.[^.]+$/, '') || 'extracted';
      outName.value = safeFilename(baseName + '_text', 'extracted');
      clearBox(msg);
      dz.style.display = 'none';
      controls.style.display = 'flex';
      resultArea.style.display = 'none';
    });

    document.getElementById('clear').addEventListener('click', () => {
      currentFile = null;
      dz.style.display = 'block';
      controls.style.display = 'none';
      resultArea.style.display = 'none';
      ocrText.value = '';
      clearBox(msg);
      prog.style.display = 'none';
    });

    function setProgress(pct, text) {
      prog.style.display = 'block';
      progText.textContent = text;
      progBar.style.width = Math.round(pct) + '%';
    }

    // Render a PDF page (1-indexed) to a canvas at the given DPI.
    async function pdfPageToCanvas(pdf, pageNum, dpi) {
      const page = await pdf.getPage(pageNum);
      const scale = dpi / 72;
      const vp = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = Math.ceil(vp.width);
      canvas.height = Math.ceil(vp.height);
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      return canvas;
    }

    async function imageFileToCanvas(file) {
      const url = URL.createObjectURL(file);
      try {
        const img = await new Promise((res, rej) => {
          const x = new Image();
          x.onload = () => res(x);
          x.onerror = rej;
          x.src = url;
        });
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        return canvas;
      } finally {
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }
    }

    // Crop a sub-region of a source canvas at 2x scale — used for re-OCR of
    // low-confidence words. Higher resolution + tight crop usually unsticks
    // characters that the page-wide pass misread.
    function cropAtHighRes(srcCanvas, x0, y0, x1, y1, padPx) {
      const sw = srcCanvas.width, sh = srcCanvas.height;
      const sx = Math.max(0, Math.floor(x0 - padPx));
      const sy = Math.max(0, Math.floor(y0 - padPx));
      const ex = Math.min(sw, Math.ceil(x1 + padPx));
      const ey = Math.min(sh, Math.ceil(y1 + padPx));
      const cropW = ex - sx, cropH = ey - sy;
      if (cropW <= 1 || cropH <= 1) return null;
      const out = document.createElement('canvas');
      out.width = cropW * 2;
      out.height = cropH * 2;
      const ctx = out.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.drawImage(srcCanvas, sx, sy, cropW, cropH, 0, 0, out.width, out.height);
      return out;
    }

    // Replace the first occurrence of `from` (after `startIdx`) in `text` with
    // `to`. Returns { text, nextIdx } so subsequent replacements skip past it
    // and don't double-substitute the same span.
    function replaceFirstFrom(text, from, to, startIdx) {
      const i = text.indexOf(from, startIdx);
      if (i < 0) return { text, nextIdx: startIdx };
      return {
        text: text.slice(0, i) + to + text.slice(i + from.length),
        nextIdx: i + to.length,
      };
    }

    // Whitespace cleanup tuned for Japanese+English OCR output:
    //   1. Strip control chars and zero-width codepoints Tesseract sometimes
    //      emits.
    //   2. Kill the stray ASCII space Tesseract likes to insert BETWEEN two
    //      adjacent CJK characters ("こ ん に ち は" → "こんにちは"). Same
    //      for spaces between CJK and full-width punctuation.
    //   3. Collapse runs of ideographic (full-width) spaces → single 　.
    //   4. Collapse runs of ASCII spaces/tabs → single space, strip leading/
    //      trailing whitespace on each line, and cap blank-line runs at one.
    function cleanupOcrText(s) {
      const CJK = '[\\u3000-\\u303f\\u3040-\\u309f\\u30a0-\\u30ff\\u3400-\\u4dbf\\u4e00-\\u9fff\\uff00-\\uffef]';
      let out = s
        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '')
        .replace(/[​-‍﻿]/g, '');
      // Drop an ASCII space between two CJK characters. Lookahead so
      // overlapping runs (ascii-space-separated CJK strings) collapse in
      // a single pass.
      out = out.replace(new RegExp('(' + CJK + ')[ \\t]+(?=' + CJK + ')', 'g'), '$1');
      out = out
        .replace(/　{2,}/g, '　')
        .replace(/[ \t]+/g, ' ')
        .replace(/[ \t]+\n/g, '\n')
        .replace(/\n[ \t]+/g, '\n')
        .replace(/\n{3,}/g, '\n\n');
      return out.trim();
    }

    // Run OCR on a canvas and then verify low-confidence words by re-OCRing
    // them on a 2x crop. If the second pass is meaningfully more confident,
    // we substitute it into the page text. Returns { text, corrections }.
    async function recognizeAndVerify(worker, canvas, psm, onProgress) {
      onProgress && onProgress('initial', 0);
      await worker.setParameters({ tessedit_pageseg_mode: psm });
      const initial = await worker.recognize(canvas);
      const data = (initial && initial.data) || {};
      let text = data.text || '';
      const words = (data.words || []).filter(w => w && w.text && w.text.trim());

      // Pick low-confidence, non-trivial words. Cap at MAX_VERIFY so a noisy
      // scan doesn't trigger hundreds of re-OCR calls.
      const LOW_CONF = 65;        // Tesseract returns 0..100
      const MIN_GAIN = 8;         // require at least this much confidence gain to swap
      const MAX_VERIFY = 40;
      const targets = words
        .filter(w => w.confidence < LOW_CONF && w.text.length >= 1)
        .sort((a, b) => a.confidence - b.confidence)
        .slice(0, MAX_VERIFY);

      // Re-OCR each candidate region at 2x with PSM 7 (single line).
      let corrections = 0;
      let cursor = 0; // search position in `text` so we don't re-replace earlier hits
      for (let i = 0; i < targets.length; i++) {
        const w = targets[i];
        onProgress && onProgress('verify', (i + 1) / targets.length);
        const bb = w.bbox || w.box || null;
        if (!bb) continue;
        const x0 = bb.x0 ?? bb.x; const y0 = bb.y0 ?? bb.y;
        const x1 = bb.x1 ?? (bb.x + (bb.w || bb.width || 0));
        const y1 = bb.y1 ?? (bb.y + (bb.h || bb.height || 0));
        const crop = cropAtHighRes(canvas, x0, y0, x1, y1, 6);
        if (!crop) continue;
        try {
          await worker.setParameters({ tessedit_pageseg_mode: '7' });
          const re = await worker.recognize(crop);
          const reText = ((re && re.data && re.data.text) || '').replace(/\n+/g, ' ').trim();
          const reConf = (re && re.data && re.data.confidence) || 0;
          if (reText && reText !== w.text && reConf >= w.confidence + MIN_GAIN) {
            const r = replaceFirstFrom(text, w.text, reText, cursor);
            if (r.text !== text) {
              text = r.text;
              cursor = r.nextIdx;
              corrections++;
            }
          }
        } catch (e) { /* skip this word on error */ }
      }
      // Restore the user-requested PSM for the next page
      await worker.setParameters({ tessedit_pageseg_mode: psm });

      // Mean per-word confidence — reported back so the caller can pick
      // the higher-quality variant when it's run OCR on multiple
      // versions of the same page (raw vs prep'd, Tesseract vs Paddle).
      const meanConf = words.length
        ? words.reduce((s, w) => s + (w.confidence || 0), 0) / words.length
        : 0;
      return { text: cleanupOcrText(text), corrections, meanConf };
    }

    document.getElementById('run').addEventListener('click', async () => {
      if (!currentFile) return;
      const runBtn = document.getElementById('run');
      runBtn.disabled = true;
      const origLabel = runBtn.textContent;
      runBtn.textContent = '抽出中…';
      clearBox(msg);
      ocrText.value = '';
      resultArea.style.display = 'none';

      const lang = document.querySelector('input[name="lang"]:checked').value;
      const psm = document.querySelector('input[name="psm"]:checked').value;

      const isPdf = currentFile.type === 'application/pdf' || /\.pdf$/i.test(currentFile.name);

      try {
        let canvases;
        if (isPdf) {
          setProgress(2, 'PDFを読み込み中…');
          const bytes = new Uint8Array(await currentFile.arrayBuffer());
          let pdf;
          try {
            pdf = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
          } catch (e) {
            if (e && (e.name === 'PasswordException' || /password/i.test(String(e.message || e)))) {
              throw new Error('このPDFはパスワードで保護されています。「🔓 パスワード解除」で解錠してから再度お試しください。');
            }
            throw e;
          }
          canvases = [];
          // Render at 200 DPI so the OCR has enough pixels even for small fonts.
          for (let i = 1; i <= pdf.numPages; i++) {
            setProgress(2 + (i / pdf.numPages) * 18, `PDFをレンダリング中… ${i}/${pdf.numPages}`);
            canvases.push(await pdfPageToCanvas(pdf, i, 200));
          }
        } else {
          setProgress(15, '画像を読み込み中…');
          canvases = [await imageFileToCanvas(currentFile)];
        }

        // Pre-OCR enhancement is now always-on (no UI toggle). We keep
        // BOTH the originals AND the corrected canvases so each page gets
        // OCR'd twice and the higher-confidence reading wins. The user
        // doesn't need to know — they just see the better merged result.
        const enhanced = canvases.map(c => null);
        setProgress(18, '画像処理エンジンを準備中…');
        try {
          await ensureCv((p) => {
            setProgress(18, `画像処理エンジンを準備中… ${Math.round(p * 100)}%`);
          });
          for (let i = 0; i < canvases.length; i++) {
            setProgress(18, `画像補正中… ${i + 1}/${canvases.length}`);
            try {
              // prepareForOcr may rectify into a different geometry; we
              // KEEP canvases[i] as the untouched original so it can be
              // OCR'd separately and merged.
              enhanced[i] = await prepareForOcr(canvases[i]);
            } catch (e) { console.warn('prepareForOcr failed for page', i + 1, e); }
          }
        } catch (e) {
          // Engine load failed — surface a non-blocking warning and let
          // Tesseract run on just the raw canvases (single-pass fallback).
          console.warn('OCR pre-prep skipped', e);
        }

        // Spin a single Tesseract worker so re-OCR of low-confidence words
        // doesn't pay the engine init cost per call.
        setProgress(20, 'OCRエンジンを起動中…');
        const worker = await Tesseract.createWorker(lang, 1, {
          logger: (m) => {
            if (!m.status) return;
            const t = m.status;
            if (t === 'loading language traineddata' || t === 'initializing api' ||
                t === 'loading tesseract core' || t === 'initializing tesseract') {
              const p = typeof m.progress === 'number' ? Math.round(m.progress * 100) : 0;
              setProgress(20, `言語データ/エンジン読込中… ${p}%`);
            }
          },
        });

        // Try to load PaddleOCR. Optional — if model files aren't
        // committed, we keep going with Tesseract-only and skip the
        // Paddle variants of the merge. The page is fine either way.
        let paddleAvailable = false;
        try {
          await ensurePaddle((p, label) => {
            setProgress(22, label || `PaddleOCR 起動中… ${Math.round(p * 100)}%`);
          });
          paddleAvailable = true;
        } catch (e) {
          console.warn('PaddleOCR unavailable — Tesseract only:', e && e.message);
        }

        let totalCorrections = 0;
        const total = canvases.length;
        const parts = [];
        try {
          for (let i = 0; i < total; i++) {
            // Each page can be OCR'd up to FOUR times now:
            //   - Tesseract on raw          (元画像 / Tesseract)
            //   - Tesseract on rectified    (補正 / Tesseract)
            //   - Paddle on raw             (元画像 / Paddle)
            //   - Paddle on rectified       (補正 / Paddle)
            // The variant with highest mean per-word confidence wins.
            // Ties go to "Paddle on rectified" first, then "Tesseract
            // on rectified" — empirically those have the best floor on
            // typical phone-camera scans.
            const variants = [
              { canvas: canvases[i],  label: '元画像',   engine: 'tesseract' },
            ];
            if (enhanced[i]) variants.push({ canvas: enhanced[i], label: '補正画像', engine: 'tesseract' });
            if (paddleAvailable) {
              variants.push({ canvas: canvases[i], label: '元画像',   engine: 'paddle' });
              if (enhanced[i]) variants.push({ canvas: enhanced[i], label: '補正画像', engine: 'paddle' });
            }
            const pageStart = 25 + (i / total) * 70;
            const slotWidth = 70 / total / variants.length;
            const results = [];
            for (let v = 0; v < variants.length; v++) {
              const slotBase = pageStart + slotWidth * v;
              const variantName = `${variants[v].engine === 'paddle' ? 'Paddle' : 'Tesseract'} / ${variants[v].label}`;
              if (variants[v].engine === 'paddle') {
                setProgress(slotBase, total > 1
                  ? `${variantName} 解析中… ${i + 1}/${total} ページ`
                  : `${variantName} 解析中…`);
                try {
                  const r = await paddleOcrCanvas(variants[v].canvas);
                  results.push({ ...r, label: variants[v].label, engine: 'paddle' });
                } catch (e) {
                  console.warn('paddle pass failed', e);
                }
                continue;
              }
              const onProg = (stage, p) => {
                const label = total > 1
                  ? `${variantName} 解析中 (${stage === 'verify' ? '再検査' : '初回'})… ${i + 1}/${total} ページ`
                  : `${variantName} 解析中… (${stage === 'verify' ? '再検査' : '初回'})`;
                const stageBase = stage === 'verify' ? 0.7 : 0;
                const stageWeight = stage === 'verify' ? 0.3 : 0.7;
                setProgress(slotBase + (stageBase + stageWeight * p) * slotWidth, label);
              };
              const r = await recognizeAndVerify(worker, variants[v].canvas, psm, onProg);
              results.push({ ...r, label: variants[v].label, engine: 'tesseract' });
            }
            const TIE_BREAK_BONUS = (engine, label) =>
              (engine === 'paddle'    ? 1.0 : 0) +
              (label  === '補正画像'  ? 0.5 : 0);
            const best = results.reduce((acc, r) => {
              if (!acc) return r;
              const aScore = acc.meanConf + TIE_BREAK_BONUS(acc.engine, acc.label);
              const rScore = r.meanConf   + TIE_BREAK_BONUS(r.engine,   r.label);
              return rScore > aScore ? r : acc;
            }, null) || results[0];
            totalCorrections += (best.corrections || 0);
            parts.push(total > 1 ? `--- ページ ${i + 1} ---\n${best.text.trim()}\n` : best.text);
          }
        } finally {
          try { await worker.terminate(); } catch (e) {}
        }

        const combined = cleanupOcrText(parts.join('\n'));
        setProgress(100, '✅ 抽出完了');
        ocrText.value = combined;
        const charCount = combined.length;
        const lineCount = combined ? combined.split(/\n/).length : 0;
        const corrTag = totalCorrections > 0 ? ` ・🔁 自動修正 ${totalCorrections}箇所` : '';
        stats.textContent = `(${charCount.toLocaleString()}文字 / ${lineCount}行${corrTag})`;
        resultArea.style.display = 'block';
        if (!combined) {
          showError(msg, '文字を検出できませんでした。解像度の高い画像で再度お試しください。');
        }
      } catch (e) {
        showError(msg, '失敗: ' + (e.message || e));
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = origLabel;
        setTimeout(() => { prog.style.display = 'none'; }, 1200);
      }
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const text = ocrText.value;
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          ocrText.focus(); ocrText.select();
          document.execCommand('copy');
        }
        btn.textContent = '✅ コピーしました';
      } catch (e) {
        btn.textContent = '⚠ 失敗 (テキストを長押しでコピー)';
      }
      setTimeout(() => { btn.textContent = orig; }, 1800);
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const blob = new Blob([ocrText.value], { type: 'text/plain;charset=utf-8' });
      const base = safeFilename(outName.value, 'extracted');
      download(blob, base + '.txt');
    });
  </script>
</body>
</html>
