<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>パスワード解除 | PDFツール</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <a class="back" href="../">← PDFツール</a>
      <div class="title-bar"><h1 class="grad-green">🔓 パスワード解除</h1></div>
      <div class="spacer"></div>
    </header>

    <div class="dropzone" id="dz">
      <input type="file" id="fi" accept="application/pdf" hidden />
      <div class="icon">🔓</div>
      <p><b>タップしてPDFを選択</b></p>
      <p class="sub">既知のパスワードで解錠します</p>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <div class="file-item">
        <span class="name" id="srcName"></span>
        <span class="size" id="srcSize"></span>
      </div>
      <div class="field">
        <label for="pw">パスワード</label>
        <input type="password" id="pw" autocomplete="current-password" />
      </div>
      <div class="field">
        <label for="fname">出力ファイル名</label>
        <input type="text" id="fname" value="unlocked" />
      </div>
      <button class="btn-primary green" id="run">🔓 解除してダウンロード</button>
      <button class="btn-secondary" id="clear">別のPDFを選ぶ</button>
    </div>

    <div id="msg"></div>
    <p class="info-hint">自分が権利を持つPDFに限ってご利用ください。パスワードがわからないPDFの総当たり解除はできません。</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@cantoo/pdf-lib@2.3.0/dist/pdf-lib.min.js"></script>
  <script src="../shared.js"></script>
  <script>
    const { fmtSize, download, safeFilename, bindDropzone, showError, clearBox, appendPrintButton } = PDFApp;
    const dz = document.getElementById('dz');
    const fi = document.getElementById('fi');
    const controls = document.getElementById('controls');
    const srcName = document.getElementById('srcName');
    const srcSize = document.getElementById('srcSize');
    const fname = document.getElementById('fname');
    const msg = document.getElementById('msg');

    let bytes = null;

    bindDropzone(dz, fi, async (fs) => {
      const f = fs[0]; if (!f) return;
      bytes = new Uint8Array(await f.arrayBuffer());
      srcName.textContent = f.name;
      srcSize.textContent = fmtSize(f.size);
      fname.value = safeFilename(f.name.replace(/\.pdf$/i, '') + '_unlocked', 'unlocked');
      clearBox(msg);
      dz.style.display = 'none';
      controls.style.display = 'flex';
    });

    document.getElementById('clear').addEventListener('click', () => {
      bytes = null;
      dz.style.display = 'block';
      controls.style.display = 'none';
      clearBox(msg);
    });

    document.getElementById('run').addEventListener('click', async () => {
      if (!bytes) return;
      const pw = document.getElementById('pw').value;
      const runBtn = document.getElementById('run');
      runBtn.disabled = true;
      const orig = runBtn.textContent;
      runBtn.textContent = '解除中...';
      clearBox(msg);
      try {
        let doc;
        try {
          doc = await PDFLib.PDFDocument.load(bytes, { password: pw });
        } catch (e) {
          throw new Error('パスワードが違うか、暗号化形式 (AES-256/256R6 など) に対応していません');
        }
        const copy = await PDFLib.PDFDocument.create();
        const pages = await copy.copyPages(doc, doc.getPageIndices());
        pages.forEach(p => copy.addPage(p));
        const out = await copy.save();
        const outBlob = new Blob([out], { type: 'application/pdf' });
        download(outBlob, safeFilename(fname.value, 'unlocked') + '.pdf');
        appendPrintButton(msg, outBlob);
      } catch (e) {
        showError(msg, '失敗: ' + (e.message || e));
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = orig;
      }
    });
  </script>
</body>
</html>
