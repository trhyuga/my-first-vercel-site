<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0c29" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>HTMLゲームランナー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .home-link {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      text-decoration: none;
      padding: 0.3rem 0.5rem;
    }
    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.75rem;
      gap: 0.75rem;
      min-height: 0;
    }
    textarea {
      flex: 1;
      width: 100%;
      background: rgba(0,0,0,0.35);
      color: #e8e8e8;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.75rem;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.55;
      resize: none;
      -webkit-appearance: none;
      appearance: none;
      min-height: 0;
    }
    textarea:focus {
      outline: none;
      border-color: rgba(240,147,251,0.55);
      box-shadow: 0 0 0 3px rgba(240,147,251,0.12);
    }
    .buttons {
      display: flex;
      gap: 0.5rem;
      flex: 0 0 auto;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 0.9rem 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      transition: transform 0.08s ease, opacity 0.15s ease;
      min-height: 48px;
    }
    button:active { transform: scale(0.96); opacity: 0.9; }
    .btn-run {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      flex: 2;
      box-shadow: 0 4px 14px rgba(245,87,108,0.35);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      flex: 1;
    }
    .hint {
      font-size: 0.72rem;
      opacity: 0.45;
      text-align: center;
      padding: 0 0.5rem;
      flex: 0 0 auto;
    }
    .runner {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
      display: none;
      flex-direction: column;
    }
    .runner.active { display: flex; }
    .runner-header {
      padding: calc(env(safe-area-inset-top) + 0.5rem) 0.75rem 0.5rem;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
    }
    .runner-header .title {
      font-size: 0.85rem;
      opacity: 0.7;
      padding-left: 0.25rem;
    }
    .runner-header .actions {
      display: flex;
      gap: 0.4rem;
    }
    .runner-header button {
      padding: 0.5rem 0.85rem;
      font-size: 0.85rem;
      min-height: 38px;
      flex: 0 0 auto;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
      display: block;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎮 HTMLゲームランナー</h1>
      <a class="home-link" href="./">← ホーム</a>
    </header>
    <div class="editor">
      <textarea id="code" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="ここにHTMLコードを貼り付けてね！

<!DOCTYPE html>
<html>
  <body>
    <h1>Hello game!</h1>
    <script>
      // your game code here
    &lt;/script&gt;
  </body>
</html>"></textarea>
      <div class="buttons">
        <button class="btn-secondary" id="paste">📋 貼付</button>
        <button class="btn-secondary" id="clear">🗑 消去</button>
        <button class="btn-run" id="run">▶ 実行</button>
      </div>
      <p class="hint">コードは自動で保存されます</p>
    </div>
  </div>

  <div class="runner" id="runner">
    <div class="runner-header">
      <span class="title">実行中</span>
      <div class="actions">
        <button class="btn-secondary" id="reload">🔄 再実行</button>
        <button class="btn-secondary" id="close">✕ 閉じる</button>
      </div>
    </div>
    <iframe
      id="frame"
      sandbox="allow-scripts allow-forms allow-pointer-lock allow-modals allow-popups allow-same-origin allow-orientation-lock"
      allow="accelerometer; gyroscope; autoplay; fullscreen; gamepad"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const runBtn = document.getElementById('run');
    const pasteBtn = document.getElementById('paste');
    const clearBtn = document.getElementById('clear');
    const closeBtn = document.getElementById('close');
    const reloadBtn = document.getElementById('reload');
    const runner = document.getElementById('runner');
    const frame = document.getElementById('frame');

    const STORAGE_KEY = 'html-runner-code';

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) codeEl.value = saved;

    codeEl.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, codeEl.value);
    });

    function run() {
      const code = codeEl.value.trim();
      if (!code) {
        alert('HTMLコードを貼り付けてください');
        return;
      }
      frame.srcdoc = codeEl.value;
      runner.classList.add('active');
    }

    runBtn.addEventListener('click', run);

    reloadBtn.addEventListener('click', () => {
      const code = codeEl.value;
      frame.srcdoc = '';
      requestAnimationFrame(() => { frame.srcdoc = code; });
    });

    closeBtn.addEventListener('click', () => {
      runner.classList.remove('active');
      frame.srcdoc = '';
    });

    pasteBtn.addEventListener('click', async () => {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        codeEl.focus();
        alert('この端末ではワンタップ貼付が使えません。テキスト欄を長押しして貼り付けてください。');
        return;
      }
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          codeEl.value = text;
          localStorage.setItem(STORAGE_KEY, text);
        }
      } catch (e) {
        codeEl.focus();
        alert('クリップボードへのアクセスができませんでした。テキスト欄を長押しして貼り付けてください。');
      }
    });

    clearBtn.addEventListener('click', () => {
      if (codeEl.value && !confirm('コードを消去しますか？')) return;
      codeEl.value = '';
      localStorage.removeItem(STORAGE_KEY);
      codeEl.focus();
    });
  </script>
</body>
</html>
