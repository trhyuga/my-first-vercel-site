<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0c29" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GameRunner" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>HTMLゲームランナー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .home-link {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      text-decoration: none;
      padding: 0.3rem 0.5rem;
    }
    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.75rem;
      gap: 0.75rem;
      min-height: 0;
    }
    textarea {
      flex: 1;
      width: 100%;
      background: rgba(0,0,0,0.35);
      color: #e8e8e8;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.75rem;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.55;
      resize: none;
      -webkit-appearance: none;
      appearance: none;
      min-height: 0;
    }
    textarea:focus {
      outline: none;
      border-color: rgba(240,147,251,0.55);
      box-shadow: 0 0 0 3px rgba(240,147,251,0.12);
    }
    .buttons {
      display: flex;
      gap: 0.5rem;
      flex: 0 0 auto;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 0.9rem 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      transition: transform 0.08s ease, opacity 0.15s ease;
      min-height: 48px;
    }
    button:active { transform: scale(0.96); opacity: 0.9; }
    .btn-run {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      flex: 2;
      box-shadow: 0 4px 14px rgba(245,87,108,0.35);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      flex: 1;
    }
    .hint {
      font-size: 0.72rem;
      opacity: 0.45;
      text-align: center;
      padding: 0 0.5rem;
      flex: 0 0 auto;
    }
    .runner {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
      display: none;
      flex-direction: column;
    }
    .runner.active { display: flex; }
    .runner-header {
      padding: calc(env(safe-area-inset-top) + 0.5rem) 0.75rem 0.5rem;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
    }
    .runner-header .title {
      font-size: 0.85rem;
      opacity: 0.7;
      padding-left: 0.25rem;
    }
    .runner-header .actions {
      display: flex;
      gap: 0.4rem;
    }
    .runner-header button {
      padding: 0.5rem 0.85rem;
      font-size: 0.85rem;
      min-height: 38px;
      flex: 0 0 auto;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
      display: block;
    }
    .runner.maximized .runner-header { display: none; }
    .runner:fullscreen,
    .runner:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
    }
    .runner:fullscreen .runner-header,
    .runner:-webkit-full-screen .runner-header { display: none; }
    :fullscreen .runner-header,
    :-webkit-full-screen .runner-header { display: none; }
    .exit-max {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 0.4rem);
      right: calc(env(safe-area-inset-right) + 0.4rem);
      z-index: 20;
      display: none;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      font-family: inherit;
    }
    .exit-max:active { transform: scale(0.92); }
    .runner.maximized .exit-max { display: flex; align-items: center; justify-content: center; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      padding: 0.3rem 0.5rem;
      min-height: auto;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { transform: scale(0.92); }

    .panel {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      z-index: 15;
      display: none;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .panel.active { display: flex; }
    .panel-header {
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    .panel-header h2 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .panel-header button {
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
      min-height: 36px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: white;
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      -webkit-overflow-scrolling: touch;
    }
    .save-current {
      width: 100%;
      padding: 0.85rem;
      margin-bottom: 1.25rem;
      background: rgba(245,87,108,0.18);
      border: 1px solid rgba(245,87,108,0.4);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 48px;
    }
    .panel section { margin-bottom: 1.5rem; }
    .panel h3 {
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.7;
      margin-bottom: 0.6rem;
      letter-spacing: 0.02em;
    }
    .snap-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .snap {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .snap-meta {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }
    .snap-title {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .snap-time {
      font-size: 0.72rem;
      opacity: 0.5;
    }
    .snap-actions {
      display: flex;
      gap: 0.4rem;
    }
    .snap-actions button {
      flex: 1;
      padding: 0.55rem;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: white;
      min-height: 40px;
      font-weight: 500;
    }
    .snap-actions .snap-load {
      flex: 2;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none;
      font-weight: 600;
    }
    .snap-actions .snap-fav.on {
      background: rgba(255,200,0,0.2);
      border-color: rgba(255,200,0,0.5);
    }
    .empty {
      opacity: 0.4;
      font-size: 0.85rem;
      text-align: center;
      padding: 1rem 0;
    }

    .runner-header .debug-btn {
      position: relative;
      padding: 0.5rem 0.75rem;
    }
    .runner-header .debug-btn.has-errors {
      background: rgba(245,87,108,0.25);
      border-color: rgba(245,87,108,0.6);
      animation: pulse 1.2s ease-in-out 2;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,87,108,0.6); }
      50% { box-shadow: 0 0 0 6px rgba(245,87,108,0); }
    }
    .badge-count {
      display: none;
      background: #f5576c;
      color: white;
      font-size: 0.68rem;
      border-radius: 10px;
      padding: 0 5px;
      min-width: 16px;
      height: 16px;
      line-height: 16px;
      margin-left: 3px;
      font-weight: 700;
    }
    .badge-count.visible { display: inline-block; }

    .debug-panel {
      position: fixed;
      inset: 0;
      background: #0b0b12;
      z-index: 25;
      display: none;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      color: #e8e8e8;
    }
    .debug-panel.active { display: flex; }
    .debug-panel-header {
      padding: 0.6rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex: 0 0 auto;
      flex-wrap: wrap;
    }
    .debug-panel-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      flex: 1 1 auto;
    }
    .debug-panel-header button {
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      min-height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      flex: 0 0 auto;
      font-weight: 500;
    }
    .debug-panel-header .copy-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none;
      font-weight: 600;
    }
    .debug-log {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0.75rem;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      -webkit-overflow-scrolling: touch;
    }
    .debug-entry {
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      margin-bottom: 0.35rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 3px solid transparent;
      background: rgba(255,255,255,0.03);
    }
    .debug-entry.error { border-left-color: #ff5c7a; background: rgba(245,87,108,0.08); color: #ffb4bf; }
    .debug-entry.warn { border-left-color: #ffc857; background: rgba(255,200,87,0.08); color: #ffe1a0; }
    .debug-entry.info { border-left-color: #5bc0eb; color: #c3e4f5; }
    .debug-entry.log { border-left-color: rgba(255,255,255,0.25); }
    .debug-entry .ts { opacity: 0.5; font-size: 11px; margin-right: 0.5rem; }
    .debug-entry .lvl { font-weight: 700; margin-right: 0.4rem; text-transform: uppercase; font-size: 11px; }
    .debug-empty { opacity: 0.4; text-align: center; padding: 2rem 1rem; font-family: inherit; font-size: 0.85rem; }
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 1rem);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,20,30,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎮 HTMLゲームランナー</h1>
      <div class="header-actions">
        <button class="icon-btn" id="openHistory" aria-label="履歴">📚</button>
        <a class="home-link" href="./">← ホーム</a>
      </div>
    </header>
    <div class="editor">
      <textarea id="code" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="ここにHTMLコードを貼り付けてね！

<!DOCTYPE html>
<html>
  <body>
    <h1>Hello game!</h1>
    <script>
      // your game code here
    &lt;/script&gt;
  </body>
</html>"></textarea>
      <div class="buttons">
        <button class="btn-secondary" id="paste">📋 貼付</button>
        <button class="btn-secondary" id="clear">🗑 消去</button>
        <button class="btn-run" id="run">▶ 実行</button>
      </div>
      <p class="hint">コードは自動で保存されます<br>URLバーも消したいときは、ブラウザの共有メニューから「ホーム画面に追加」でアプリ化できます</p>
    </div>
  </div>

  <div class="runner" id="runner">
    <div class="runner-header">
      <span class="title">実行中</span>
      <div class="actions">
        <button class="btn-secondary debug-btn" id="debug">🐛<span class="badge-count" id="debugBadge">0</span></button>
        <button class="btn-secondary" id="maximize">⤢ 最大化</button>
        <button class="btn-secondary" id="reload">🔄 再実行</button>
        <button class="btn-secondary" id="close">✕ 閉じる</button>
      </div>
    </div>
    <iframe
      id="frame"
      sandbox="allow-scripts allow-forms allow-pointer-lock allow-modals allow-popups allow-same-origin allow-orientation-lock"
      allow="accelerometer; gyroscope; autoplay; fullscreen; gamepad"
      allowfullscreen
    ></iframe>
    <button class="exit-max" id="exitMax" aria-label="最大化を解除">⤡</button>
  </div>

  <div class="debug-panel" id="debugPanel">
    <div class="debug-panel-header">
      <h2>🐛 デバッグログ</h2>
      <button class="copy-btn" id="copyLogs">📋 コピー</button>
      <button id="clearLogs">消去</button>
      <button id="closeDebug">✕</button>
    </div>
    <div class="debug-log" id="debugLog"></div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="panel" id="historyPanel">
    <div class="panel-header">
      <h2>📚 履歴・お気に入り</h2>
      <button id="closePanel">✕ 閉じる</button>
    </div>
    <div class="panel-body">
      <button class="save-current" id="saveCurrent">⭐ 今のコードをお気に入りに保存</button>
      <section>
        <h3>⭐ お気に入り (無制限)</h3>
        <div id="favList" class="snap-list"></div>
      </section>
      <section>
        <h3>🕒 最近の実行 (最新3件)</h3>
        <div id="recentList" class="snap-list"></div>
      </section>
    </div>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const runBtn = document.getElementById('run');
    const pasteBtn = document.getElementById('paste');
    const clearBtn = document.getElementById('clear');
    const closeBtn = document.getElementById('close');
    const reloadBtn = document.getElementById('reload');
    const maxBtn = document.getElementById('maximize');
    const exitMaxBtn = document.getElementById('exitMax');
    const runner = document.getElementById('runner');
    const frame = document.getElementById('frame');
    const openHistoryBtn = document.getElementById('openHistory');
    const closePanelBtn = document.getElementById('closePanel');
    const historyPanel = document.getElementById('historyPanel');
    const saveCurrentBtn = document.getElementById('saveCurrent');
    const favListEl = document.getElementById('favList');
    const recentListEl = document.getElementById('recentList');
    const debugBtn = document.getElementById('debug');
    const debugBadge = document.getElementById('debugBadge');
    const debugPanel = document.getElementById('debugPanel');
    const debugLogEl = document.getElementById('debugLog');
    const copyLogsBtn = document.getElementById('copyLogs');
    const clearLogsBtn = document.getElementById('clearLogs');
    const closeDebugBtn = document.getElementById('closeDebug');
    const toastEl = document.getElementById('toast');

    const STORAGE_KEY = 'html-runner-code';
    const SNAPSHOTS_KEY = 'html-runner-snapshots';
    const MAX_RECENT = 3;

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) codeEl.value = saved;

    codeEl.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, codeEl.value);
    });

    const LOG_SCRIPT = `<script>
(function(){
  function safeStr(v){
    if(v===undefined)return'undefined';
    if(v===null)return'null';
    if(typeof v==='function')return'[Function'+(v.name?' '+v.name:'')+']';
    if(v instanceof Error)return(v.stack||(v.name+': '+v.message));
    if(typeof v!=='object')return String(v);
    try{
      var seen=new WeakSet();
      return JSON.stringify(v,function(k,val){
        if(typeof val==='object'&&val!==null){
          if(seen.has(val))return'[Circular]';
          seen.add(val);
          if(val instanceof Element){return'<'+val.tagName.toLowerCase()+(val.id?' id="'+val.id+'"':'')+'>';}
        }
        if(typeof val==='function')return'[Function'+(val.name?' '+val.name:'')+']';
        if(typeof val==='bigint')return val.toString()+'n';
        return val;
      });
    }catch(e){try{return String(v);}catch(e2){return'[Unstringifiable]';}}
  }
  function post(level,msg){
    try{parent.postMessage({__runner:true,type:'log',level:level,message:msg,time:Date.now()},'*');}catch(e){}
  }
  ['log','info','warn','error','debug'].forEach(function(level){
    var orig=console[level];
    console[level]=function(){
      var args=Array.prototype.slice.call(arguments);
      try{orig.apply(console,args);}catch(e){}
      post(level,args.map(safeStr).join(' '));
    };
  });
  window.addEventListener('error',function(e){
    var err=e.error;
    var msg=(err&&err.stack)?err.stack:(e.message||'Error');
    var loc=(e.filename||'about:srcdoc').replace(/^about:srcdoc/,'(game)');
    msg+='\\n  at '+loc+':'+(e.lineno||'?')+':'+(e.colno||'?');
    post('error',msg);
  });
  window.addEventListener('unhandledrejection',function(e){
    var r=e.reason;
    var msg='Unhandled Promise Rejection: '+((r&&r.stack)?r.stack:safeStr(r));
    post('error',msg);
  });
  post('info','ゲーム起動');
})();
<\/script>`;

    const FIT_SCRIPT = `<script>
(function(){
  function fit(){
    var b=document.body;if(!b)return;
    b.style.transformOrigin='0 0';
    b.style.transform='none';
    var w=Math.max(b.scrollWidth,b.offsetWidth,1);
    var h=Math.max(b.scrollHeight,b.offsetHeight,1);
    var vw=window.innerWidth||document.documentElement.clientWidth;
    var vh=window.innerHeight||document.documentElement.clientHeight;
    var s=Math.min(vw/w,vh/h,1);
    var ox=(vw-w*s)/2, oy=(vh-h*s)/2;
    b.style.transform='translate('+ox+'px,'+oy+'px) scale('+s+')';
    document.documentElement.style.overflow='hidden';
  }
  function schedule(){setTimeout(fit,0);setTimeout(fit,120);setTimeout(fit,600);}
  if(document.readyState!=='loading')schedule();
  else document.addEventListener('DOMContentLoaded',schedule);
  window.addEventListener('load',schedule);
  window.addEventListener('resize',fit);
  window.addEventListener('orientationchange',function(){setTimeout(fit,300);});
})();
<\/script>`;

    const VIEWPORT_META = '<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">';

    function prepareCode(code) {
      let out = code;
      if (!/name=["']?viewport["']?/i.test(out)) {
        if (/<head[^>]*>/i.test(out)) {
          out = out.replace(/<head[^>]*>/i, m => m + VIEWPORT_META);
        } else if (/<html[^>]*>/i.test(out)) {
          out = out.replace(/<html[^>]*>/i, m => m + '<head>' + VIEWPORT_META + '</head>');
        } else {
          out = VIEWPORT_META + out;
        }
      }
      const INJECTION = LOG_SCRIPT + FIT_SCRIPT;
      if (/<\/body>/i.test(out)) {
        out = out.replace(/<\/body>/i, INJECTION + '</body>');
      } else {
        out = out + INJECTION;
      }
      return out;
    }

    function loadSnapshots() {
      try {
        const raw = localStorage.getItem(SNAPSHOTS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) { return []; }
    }

    function saveSnapshots(list) {
      localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(list));
    }

    function extractTitle(code) {
      const m = code.match(/<title[^>]*>([^<]+)<\/title>/i);
      if (m && m[1].trim()) return m[1].trim().slice(0, 60);
      const stripped = code.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      return stripped.slice(0, 40) || '(無題)';
    }

    function newId() {
      return 'snap_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function pruneRecents(list) {
      const favorites = list.filter(s => s.favorite);
      const recents = list.filter(s => !s.favorite)
        .sort((a, b) => b.savedAt - a.savedAt)
        .slice(0, MAX_RECENT);
      return [...favorites, ...recents];
    }

    function addSnapshot(code, { favorite = false } = {}) {
      const trimmed = code.trim();
      if (!trimmed) return null;
      const list = loadSnapshots();
      const existing = list.find(s => s.code === code);
      if (existing) {
        existing.savedAt = Date.now();
        if (favorite) existing.favorite = true;
        saveSnapshots(pruneRecents(list));
        return existing;
      }
      const snap = {
        id: newId(),
        code,
        title: extractTitle(code),
        savedAt: Date.now(),
        favorite,
      };
      list.push(snap);
      saveSnapshots(pruneRecents(list));
      return snap;
    }

    function toggleFavorite(id) {
      const list = loadSnapshots();
      const snap = list.find(s => s.id === id);
      if (!snap) return;
      snap.favorite = !snap.favorite;
      saveSnapshots(pruneRecents(list));
    }

    function deleteSnapshot(id) {
      saveSnapshots(loadSnapshots().filter(s => s.id !== id));
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getMonth() + 1}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderSnap(s) {
      return `
        <div class="snap" data-id="${s.id}">
          <div class="snap-meta">
            <div class="snap-title">${escapeHtml(s.title)}</div>
            <div class="snap-time">${formatTime(s.savedAt)}</div>
          </div>
          <div class="snap-actions">
            <button class="snap-load" data-action="load" data-id="${s.id}">📥 読込</button>
            <button class="snap-fav ${s.favorite ? 'on' : ''}" data-action="fav" data-id="${s.id}">${s.favorite ? '★' : '☆'}</button>
            <button class="snap-del" data-action="del" data-id="${s.id}">🗑</button>
          </div>
        </div>
      `;
    }

    function renderLists() {
      const list = loadSnapshots();
      const favorites = list.filter(s => s.favorite).sort((a, b) => b.savedAt - a.savedAt);
      const recents = list.filter(s => !s.favorite).sort((a, b) => b.savedAt - a.savedAt).slice(0, MAX_RECENT);
      favListEl.innerHTML = favorites.length ? favorites.map(renderSnap).join('') : '<p class="empty">まだお気に入りはありません</p>';
      recentListEl.innerHTML = recents.length ? recents.map(renderSnap).join('') : '<p class="empty">まだ履歴はありません</p>';
    }

    function loadSnapshotIntoEditor(id) {
      const snap = loadSnapshots().find(s => s.id === id);
      if (!snap) return;
      codeEl.value = snap.code;
      localStorage.setItem(STORAGE_KEY, snap.code);
      historyPanel.classList.remove('active');
    }

    function handleSnapAction(e) {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const { action, id } = btn.dataset;
      if (action === 'load') {
        loadSnapshotIntoEditor(id);
      } else if (action === 'fav') {
        toggleFavorite(id);
        renderLists();
      } else if (action === 'del') {
        if (!confirm('この項目を削除しますか？')) return;
        deleteSnapshot(id);
        renderLists();
      }
    }
    favListEl.addEventListener('click', handleSnapAction);
    recentListEl.addEventListener('click', handleSnapAction);

    openHistoryBtn.addEventListener('click', () => {
      renderLists();
      historyPanel.classList.add('active');
    });
    closePanelBtn.addEventListener('click', () => {
      historyPanel.classList.remove('active');
    });
    saveCurrentBtn.addEventListener('click', () => {
      const code = codeEl.value;
      if (!code.trim()) {
        alert('コードが空です');
        return;
      }
      addSnapshot(code, { favorite: true });
      renderLists();
    });

    const logs = [];
    const MAX_LOGS = 500;

    function pad2(n) { return String(n).padStart(2, '0'); }
    function pad3(n) { return String(n).padStart(3, '0'); }
    function tsStr(ts) {
      const d = new Date(ts);
      return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds()) + '.' + pad3(d.getMilliseconds());
    }

    function renderLogs() {
      if (!logs.length) {
        debugLogEl.innerHTML = '<div class="debug-empty">ログはまだありません。<br>実行中にconsole.log / エラー / 例外が出るとここに表示されます。</div>';
        return;
      }
      debugLogEl.innerHTML = logs.map(l => (
        '<div class="debug-entry ' + escapeHtml(l.level) + '">' +
          '<span class="ts">' + tsStr(l.time) + '</span>' +
          '<span class="lvl">' + escapeHtml(l.level) + '</span>' +
          escapeHtml(l.message) +
        '</div>'
      )).join('');
      debugLogEl.scrollTop = debugLogEl.scrollHeight;
    }

    function updateBadge() {
      const errs = logs.filter(l => l.level === 'error' || l.level === 'warn').length;
      if (errs > 0) {
        debugBadge.textContent = errs > 99 ? '99+' : String(errs);
        debugBadge.classList.add('visible');
      } else {
        debugBadge.classList.remove('visible');
      }
      const hasErr = logs.some(l => l.level === 'error');
      debugBtn.classList.toggle('has-errors', hasErr);
    }

    function clearLogs() {
      logs.length = 0;
      renderLogs();
      updateBadge();
    }

    window.addEventListener('message', (e) => {
      const data = e.data;
      if (!data || !data.__runner || data.type !== 'log') return;
      logs.push({ level: data.level || 'log', message: String(data.message || ''), time: data.time || Date.now() });
      if (logs.length > MAX_LOGS) logs.splice(0, logs.length - MAX_LOGS);
      if (debugPanel.classList.contains('active')) renderLogs();
      updateBadge();
      if (data.level === 'error') {
        debugBtn.classList.remove('has-errors');
        void debugBtn.offsetWidth;
        debugBtn.classList.add('has-errors');
      }
    });

    debugBtn.addEventListener('click', () => {
      renderLogs();
      debugPanel.classList.add('active');
    });
    closeDebugBtn.addEventListener('click', () => debugPanel.classList.remove('active'));
    clearLogsBtn.addEventListener('click', clearLogs);

    function buildCopyText() {
      const header = [
        '# HTMLゲームランナー デバッグログ',
        '# 取得日時: ' + new Date().toLocaleString('ja-JP'),
        '# UserAgent: ' + navigator.userAgent,
        '# 総数: ' + logs.length + ' (エラー: ' + logs.filter(l => l.level === 'error').length +
          ', 警告: ' + logs.filter(l => l.level === 'warn').length + ')',
        ''
      ].join('\n');
      const body = logs.map(l =>
        '[' + tsStr(l.time) + '] [' + l.level.toUpperCase() + '] ' + l.message
      ).join('\n\n');
      const sourceHeader = '\n\n# --- 実行中のコード ---\n';
      const source = '```html\n' + codeEl.value + '\n```\n';
      return header + body + sourceHeader + source;
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('visible');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove('visible'), 1800);
    }

    copyLogsBtn.addEventListener('click', async () => {
      const text = buildCopyText();
      try {
        await navigator.clipboard.writeText(text);
        showToast('📋 コピーしました');
      } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('📋 コピーしました'); }
        catch (e2) { showToast('コピー失敗。ログを長押しで選択してください'); }
        document.body.removeChild(ta);
      }
    });

    function run() {
      const code = codeEl.value.trim();
      if (!code) {
        alert('HTMLコードを貼り付けてください');
        return;
      }
      addSnapshot(codeEl.value);
      clearLogs();
      frame.srcdoc = prepareCode(codeEl.value);
      runner.classList.add('active');
    }

    runBtn.addEventListener('click', run);

    reloadBtn.addEventListener('click', () => {
      const code = codeEl.value;
      frame.srcdoc = '';
      clearLogs();
      requestAnimationFrame(() => { frame.srcdoc = prepareCode(code); });
    });

    closeBtn.addEventListener('click', async () => {
      await exitFullscreen();
      runner.classList.remove('active');
      runner.classList.remove('maximized');
      frame.srcdoc = '';
    });

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    async function enterFullscreen() {
      const targets = [runner, document.documentElement];
      for (const el of targets) {
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (!req) continue;
        try {
          await req.call(el);
          return;
        } catch (e) { /* try next target */ }
      }
    }

    async function exitFullscreen() {
      if (!isFullscreen()) return;
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (!exit) return;
      try { await exit.call(document); } catch (e) {}
    }

    maxBtn.addEventListener('click', async () => {
      runner.classList.add('maximized');
      await enterFullscreen();
    });

    exitMaxBtn.addEventListener('click', async () => {
      await exitFullscreen();
      runner.classList.remove('maximized');
    });

    function onFsChange() {
      if (!isFullscreen()) runner.classList.remove('maximized');
    }
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    pasteBtn.addEventListener('click', async () => {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        codeEl.focus();
        alert('この端末ではワンタップ貼付が使えません。テキスト欄を長押しして貼り付けてください。');
        return;
      }
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          codeEl.value = text;
          localStorage.setItem(STORAGE_KEY, text);
        }
      } catch (e) {
        codeEl.focus();
        alert('クリップボードへのアクセスができませんでした。テキスト欄を長押しして貼り付けてください。');
      }
    });

    clearBtn.addEventListener('click', () => {
      if (codeEl.value && !confirm('コードを消去しますか？')) return;
      codeEl.value = '';
      localStorage.removeItem(STORAGE_KEY);
      codeEl.focus();
    });
  </script>
</body>
</html>
