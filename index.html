<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ひゅうがのページ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container { text-align: center; padding: 2rem; }
    .avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 2.5rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p.subtitle { font-size: 1.1rem; opacity: 0.7; margin-bottom: 2rem; }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 1.5rem 2rem;
      max-width: 400px; margin: 0 auto 2rem;
      backdrop-filter: blur(10px);
    }
    .card p { font-size: 1rem; line-height: 1.8; opacity: 0.85; }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white; padding: 0.4rem 1rem;
      border-radius: 999px; font-size: 0.85rem; font-weight: bold; margin: 0.3rem;
    }
    .footer { margin-top: 2rem; opacity: 0.4; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">🌊</div>
    <h1>ひゅうが</h1>
    <p class="subtitle">My first Vercel site</p>
    <div class="card">
      <p>GitHubとVercelを連携して、<br>初めてデプロイしたページです！</p>
    </div>
    <div>
      <span class="badge">GitHub</span>
      <span class="badge">Vercel</span>
      <span class="badge">HTML</span>
    </div>
    <p class="footer">Deployed with Vercel 🚀</p>
  </div>
</body>
</html>
