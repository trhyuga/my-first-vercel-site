<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0c29" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>背景透過ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .home-link {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      text-decoration: none;
      padding: 0.3rem 0.5rem;
    }
    .main {
      flex: 1;
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .dropzone {
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 2.5rem 1rem;
      text-align: center;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .dropzone:active,
    .dropzone.drag {
      background: rgba(79,172,254,0.1);
      border-color: rgba(79,172,254,0.6);
    }
    .dropzone .icon { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .dropzone p { opacity: 0.85; line-height: 1.5; font-size: 0.95rem; }
    .dropzone .sub { opacity: 0.55; font-size: 0.8rem; margin-top: 0.35rem; }
    .preview-box {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background-color: #fff;
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, 10px 0;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-box img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .progress-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,12,41,0.85);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.9rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #4facfe;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .field label {
      font-size: 0.8rem;
      opacity: 0.7;
      padding-left: 0.25rem;
    }
    .field-row {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      overflow: hidden;
    }
    .field-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      min-width: 0;
    }
    .field-row input:focus {
      outline: none;
    }
    .field-row .suffix {
      padding: 0 0.75rem;
      opacity: 0.55;
      font-size: 0.9rem;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      transition: transform 0.08s ease, opacity 0.15s ease;
      min-height: 48px;
    }
    button:active { transform: scale(0.97); opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #0b3a5e;
      box-shadow: 0 4px 14px rgba(79,172,254,0.35);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .info {
      font-size: 0.78rem;
      opacity: 0.6;
      line-height: 1.55;
      padding: 0 0.25rem;
    }
    .info b { color: rgba(255,255,255,0.85); }
    .meta {
      font-size: 0.75rem;
      opacity: 0.55;
      padding: 0 0.25rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .error {
      background: rgba(245,87,108,0.15);
      border: 1px solid rgba(245,87,108,0.4);
      color: #ffb4bf;
      padding: 0.75rem;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎨 背景透過ツール</h1>
      <a class="home-link" href="../">← ホーム</a>
    </header>
    <div class="main">
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" hidden />
        <div class="icon">📸</div>
        <p><b>タップして画像を選択</b></p>
        <p class="sub">または画像をドラッグ&ドロップ<br>JPEG / PNG / WebP など</p>
      </div>

      <div id="previewArea" style="display:none;">
        <div class="preview-box">
          <img id="previewImg" alt="preview" />
          <div class="progress-overlay" id="progress">
            <div class="spinner"></div>
            <div id="progressText">準備中...</div>
          </div>
        </div>
        <div class="meta" id="meta"></div>
      </div>

      <div class="controls" id="controls" style="display:none;">
        <div class="field">
          <label for="filename">ファイル名</label>
          <div class="field-row">
            <input type="text" id="filename" placeholder="transparent" />
            <span class="suffix">.png</span>
          </div>
        </div>
        <button class="btn-primary" id="download" disabled>💾 透過PNGをダウンロード</button>
        <button class="btn-secondary" id="reset">🔄 別の画像を選ぶ</button>
      </div>

      <div id="errorBox"></div>

      <p class="info">
        処理は <b>全てこの端末の中</b> で完結します (画像はサーバーに送信されません)。<br>
        初回のみAIモデル (約数十MB) のダウンロードが発生するので、<b>Wi-Fi推奨</b>です。<br>
        元画像の解像度・アスペクト比は保ったまま、背景のみ透過されます。
      </p>
    </div>
  </div>

  <script type="module">
    import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';

    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const previewArea = document.getElementById('previewArea');
    const previewImg = document.getElementById('previewImg');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const controls = document.getElementById('controls');
    const filenameInput = document.getElementById('filename');
    const downloadBtn = document.getElementById('download');
    const resetBtn = document.getElementById('reset');
    const errorBox = document.getElementById('errorBox');
    const metaEl = document.getElementById('meta');

    let resultBlob = null;
    let resultUrl = null;

    dropzone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(evt =>
      dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); })
    );
    ['dragleave', 'drop'].forEach(evt =>
      dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('drag'); })
    );
    dropzone.addEventListener('drop', (e) => {
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) handleFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('画像ファイルを選択してください');
        return;
      }
      errorBox.innerHTML = '';
      dropzone.style.display = 'none';
      previewArea.style.display = 'block';
      controls.style.display = 'flex';
      downloadBtn.disabled = true;

      const baseName = (file.name.replace(/\.[^.]+$/, '') || 'transparent') + '_transparent';
      filenameInput.value = baseName;

      const srcUrl = URL.createObjectURL(file);
      previewImg.src = srcUrl;

      const sizeKb = (file.size / 1024).toFixed(1);
      metaEl.textContent = `元ファイル: ${file.name} (${sizeKb} KB)`;

      progress.style.display = 'flex';
      progressText.textContent = 'モデルを準備中...';

      try {
        const blob = await removeBackground(file, {
          progress: (key, current, total) => {
            if (total) {
              const pct = Math.min(100, Math.round((current / total) * 100));
              progressText.textContent = `${formatStage(key)} ${pct}%`;
            } else {
              progressText.textContent = formatStage(key);
            }
          },
          output: {
            format: 'image/png',
            quality: 1.0,
          }
        });

        if (resultUrl) URL.revokeObjectURL(resultUrl);
        resultBlob = blob;
        resultUrl = URL.createObjectURL(blob);
        previewImg.src = resultUrl;
        progress.style.display = 'none';
        downloadBtn.disabled = false;

        const outKb = (blob.size / 1024).toFixed(1);
        const img = new Image();
        img.onload = () => {
          metaEl.textContent = `${img.naturalWidth} × ${img.naturalHeight} px / ${outKb} KB / PNG`;
        };
        img.src = resultUrl;
      } catch (e) {
        progress.style.display = 'none';
        showError('処理に失敗しました: ' + (e && e.message ? e.message : String(e)));
      }
    }

    function formatStage(key) {
      if (!key) return '処理中...';
      if (key.startsWith('fetch') || key.includes('download')) return 'モデルをダウンロード中...';
      if (key.includes('compute') || key.includes('inference')) return '背景を分析中...';
      return '処理中... (' + key + ')';
    }

    function showError(msg) {
      errorBox.innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      let name = filenameInput.value.trim() || 'transparent';
      name = name.replace(/\.png$/i, '');
      name = name.replace(/[\\/:*?"<>|]/g, '_');
      const a = document.createElement('a');
      a.href = resultUrl;
      a.download = name + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    resetBtn.addEventListener('click', () => {
      if (resultUrl) URL.revokeObjectURL(resultUrl);
      resultBlob = null;
      resultUrl = null;
      previewImg.src = '';
      fileInput.value = '';
      dropzone.style.display = 'block';
      previewArea.style.display = 'none';
      controls.style.display = 'none';
      errorBox.innerHTML = '';
      metaEl.textContent = '';
      downloadBtn.disabled = true;
    });
  </script>
</body>
</html>
